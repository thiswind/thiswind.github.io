source_summary: 'ผู้เขียนเล่าว่าใช่มะนาวที่ตัวใหญ่มากใส่ไป 2 ลูกจนเปรี้ยวเกินไป ครั้งหน้าจะใส่มะนาวเพียงครึ่งลูกเท่านั้น
  ส่วนกลิ่น/รสของสะระแหน่สดชื่นมาก และผู้เขียนชอบมาก

  '
literal_layer: '“柠檬很大，放了2个，实在太酸了。下次我只能放半个柠檬。” คือสรุปประสบการณ์การใส่มะนาว 2 ลูกแล้วเปรี้ยวมาก
  จึงปรับเป็นครึ่งลูกในครั้งหน้า

  “薄荷的味道非常清新，我很喜欢。” คือชื่นชมรส/กลิ่นของมินต์ว่าให้ความสดชื่นและตนชอบ

  '
implicit_layer: 'ตั้งใจสื่อสารคำแนะนำเชิงประสบการณ์ (ปรับปริมาณให้พอดี) และให้ความรู้สึกเชิงบวกต่อมินต์
  โดยน้ำเสียงเป็นส่วนตัวแบบบันทึกเล็ก ๆ ไม่ได้ลงรายละเอียดทางเทคนิค

  '
cross_cultural_layer: 'ในภาษาเป้าหมายควรรักษาโทนเป็นบล็อกส่วนตัวที่สุภาพและธรรมชาติ
  รวมถึงปรับถ้อยคำให้สอดคล้องกับธรรมเนียมการเขียนบล็อกในแต่ละภาษา (เช่น การใช้ถ้อยคำให้คำแนะนำแบบ
  “ครั้งหน้า…คงจะ…” และการชมความสดชื่นของมินต์)

  มักไม่จำเป็นต้องแปลคำว่า “味道” แบบเทคนิคเกินไป สามารถเลือกคำที่สื่อ “กลิ่น/รส/รสสัมผัส”
  ตามธรรมชาติของภาษา

  '
retelling_strategy: '- คงโครงเรื่องเดิมเป็น 2 ย่อหน้า: (1) ปริมาณมะนาวกับความเปรี้ยว
  + แผนครั้งหน้า (2) ชื่นชมมินต์ว่าฉุนสดชื่น

  - คง placeholder แบบไม่เปลี่ยน: `__I18N_IMAGE_0000__`

  - เลือกสำนวนทางธรรมชาติของแต่ละภาษา โดยรักษาเจตนา “ประสบการณ์ส่วนตัว + ข้อแนะนำ”

  '
terminology_policy: '- ใช้คำเรียกผลไม้/สมุนไพรให้ตรงและเป็นที่คุ้น: มะนาว (lemon),
  สะระแหน่/มินต์ (mint)

  - แปล “清新” ให้เป็นคำที่สื่อ “สดชื่น/หอมสด/โปร่งเบา” ตามธรรมชาติของภาษาเป้าหมาย

  - ไม่เพิ่มคำใหม่ที่เปลี่ยนความหมาย และไม่ทำให้เป็นคำเฉพาะทางเกินจำเป็น

  '
forbidden_styles: '- ห้ามแปลแบบคำต่อคำ

  - ห้ามเปลี่ยนโทนให้เป็นวิชาการหรือเชิงโฆษณาเกินจริง

  - ห้ามเพิ่มรายละเอียดที่ไม่มีในต้นฉบับ (ปริมาณเป็น “ครึ่งลูก” เท่านั้น ไม่กล่าวอย่างอื่น)

  - ห้ามแก้ไขหรือแทนที่ placeholder: `__I18N_IMAGE_0000__`

  '
