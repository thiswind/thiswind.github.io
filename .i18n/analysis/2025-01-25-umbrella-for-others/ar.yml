source_summary: 'คนคนหนึ่งมีคุณค่าไม่ได้อยู่ที่เขามีอะไรมากแค่ไหน แต่ขึ้นอยู่กับว่าเขาสามารถมอบให้ผู้อื่นได้มากเพียงใด

  '
literal_layer: '“คุณค่าของคนไม่ได้วัดจากจำนวนสิ่งที่เขามี” และ “วัดจากจำนวนที่เขาให้ได้”

  '
implicit_layer: 'ผู้เขียนต้องการสื่อถึงทัศนคติเรื่องคุณค่าเชิงจิตใจและการเอื้อเฟื้อ
  โดยชี้ว่าการให้/การช่วยเหลือผู้อื่นสำคัญกว่าสิ่งของหรือความมั่งคั่ง และเชื่อมโยงกับแรงจูงใจเชิงประสบการณ์ส่วนตัว
  (เคยถูกฝนสาด) ในการอยากคอยคุ้มครองคนอื่น

  '
cross_cultural_layer: 'แนวคิดเรื่อง “ความหมายของการให้” เป็นสากลและเหมาะกับงานเขียนเชิงให้กำลังใจ/คุณธรรมในหลายวัฒนธรรม
  จำเป็นต้องเรียบเรียงให้เป็นภาษาทางการนุ่มนวลในแต่ละภาษา โดยยังคงโครงสร้างเปรียบเทียบ
  (คุณค่าอยู่ที่การให้) ให้ชัดเจน

  '
retelling_strategy: 'รักษาแก่นให้เหมือนเดิม: (1) ปฏิเสธการนิยามคุณค่าด้วยสิ่งที่มี
  (2) ยืนยันคุณค่าด้วยสิ่งที่สามารถมอบให้ผู้อื่นได้มากเพียงใด และ (3) ใช้ถ้อยคำทางการที่ลื่นไหลตามสำนวนของแต่ละภาษา

  '
terminology_policy: '- ไม่ใช้คำเฉพาะทางหรือคำยืมเทคนิค

  - ใช้คำเทียบเท่าทั่วไปสำหรับ “คุณค่า/ความหมาย/การมี” และ “ให้/มอบให้” ในแต่ละภาษา

  - คงรูปแบบบรรทัด/ย่อหน้าใน Markdown body ตามต้นฉบับ (สองประโยค)

  '
forbidden_styles: '- หลีกเลี่ยงโทนก้าวร้าว เย้ยหยัน หรือการบรรยายเชิงตลกประชด

  - หลีกเลี่ยงการใช้ภาษาศาสนาหนักเกินจำเป็นหรือถ้อยคำที่อาจตีความได้เฉพาะนิกาย

  - หลีกเลี่ยงการแปลแบบตรงตัวคำต่อคำที่ทำให้สำนวนไม่เป็นธรรมชาติในภาษาเป้าหมาย

  '
