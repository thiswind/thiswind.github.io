source_summary: 'นี่เป็นบทความภาษาไทย/จีนลำดับแรกของระบบบล็อก โดยผู้เขียนกล่าวว่าเว็บไซต์นี้ไม่ใช่เพียงหน้าโชว์
  แต่ตั้งใจให้เป็นพื้นที่สะสมบันทึกด้านวิศวกรรมซอฟต์แวร์ระยะยาว รวมถึงการทดลองและการใช้งานเครื่องมือด้าน
  AI ตลอดจนพื้นที่สำหรับความคิดส่วนตัว นอกจากนี้ยังระบุแนวทางการทำ i18n ว่าเมื่อบทความภาษาจีนมีการเปลี่ยนแปลง
  เวอร์ชันภาษาอื่นควรซิงก์โดยอัตโนมัติ ไม่ใช่แปลแบบแทนคำต่อคำ แต่ต้องเข้าใจเจตนาที่แท้จริงของต้นฉบับแล้วเรียบเรียงใหม่ให้เป็นธรรมชาติในภาษาเป้าหมาย
  ตัวอย่างโค้ดบล็อกควรรักษาไว้ไม่เปลี่ยนแปลงระหว่างการแปล

  '
literal_layer: "• “บทความภาษาจีนแหล่งแรก” ของระบบบล็อก • ผู้เขียนต้องการให้เว็บไซต์เป็นที่สะสมความรู้และบันทึกงานเชิงวิศวกรรมอย่างต่อเนื่อง\n\
  \  รวมถึงการปฏิบัติจริงกับเครื่องมือ AI และการคิดทบทวนส่วนตัว\n• เมื่อบทความจีนเปลี่ยน\
  \ ทุกภาษาควรซิงก์อัตโนมัติ\n  การแปลไม่ใช่คำต่อคำ แต่ต้องตีความความหมายที่แท้จริงแล้วเขียนใหม่ให้ลื่นไหล\n\
  \  และให้โค้ดบล็อก “print('hello, multilingual blog')” คงรูปเดิม\n"
implicit_layer: '• ตั้งเจตนาระดับ “การสื่อสารระยะยาว” มากกว่าเป็นหน้าแนะนำชั่วคราว
  • เน้นคุณภาพของการแปลแบบมีความเข้าใจ (semantic/intent-driven) เพื่อให้ผู้อ่านต่างภาษาได้อรรถรสเทียบเท่า
  • วางกรอบการดูแลความสอดคล้องของเนื้อหาในระบบหลายภาษาเพื่อความน่าเชื่อถือของไซต์
  • การคงโค้ดไว้ไม่เปลี่ยนสะท้อนความเอาใจใส่ต่อความถูกต้องเชิงเทคนิค

  '
cross_cultural_layer: "• ภาษาไทยนิยมภาษาทางการสุภาพและเป็นธรรมชาติ\n  ควรใช้ถ้อยคำเชิญชวน/แนะนำเชิงรับรองคุณภาพ\
  \ เช่น “มุ่งหวัง”, “ตั้งใจ”, “เพื่อให้”\n• การกล่าวถึง i18n ควรหลีกเลี่ยงสำนวนเทคนิคที่ดูตรงตัวเกินไป\n\
  \  แต่สามารถใช้คำอย่าง “การแปล” “การซิงก์เนื้อหา” และ “การเรียบเรียงใหม่” ให้ชัดเจน\n\
  • เรื่องศาสนา/การเมืองไม่มี จึงเน้นกรอบการเขียนบล็อกและวัตถุประสงค์ส่วนบุคคล\n \
  \ ให้เหมาะกับบรรยากาศสาธารณะของบล็อก\n• โค้ดสั้น ๆ ควรคงรูปแบบเดิมและเว้นบรรทัดให้เห็นชัดตามธรรมเนียมบล็อก\n"
retelling_strategy: "• แปลงประโยคเปิดให้เป็นภาษาไทยทางการแบบเป็นกันเอง (formal blog\
  \ prose)\n  โดยคงความหมายว่าเป็นบทความภาษาไทย/จีนชุดแรกของระบบ\n• ยกสาระ “ความตั้งใจของผู้เขียน”\
  \ ให้เป็นลำดับตรรกะ: เป้าหมายของไซต์ → ชนิดของเนื้อหาที่จะสะสม →\n  หลักการแปล/ซิงก์ระหว่างภาษา\
  \ → หมายเหตุเรื่องการคงโค้ด\n• ปรับถ้อยคำไม่ให้เป็นการแปลตรงคำ\n  เช่น “不仅仅…而是…”\
  \ ให้เป็น “มิใช่เพียง…แต่มีเป้าหมายให้เป็น…”\n• รักษาบล็อกโค้ดและข้อความในโค้ดไว้เหมือนเดิมทั้งหมด\
  \ • ใช้คำเชื่อมที่เป็นธรรมชาติของภาษาไทยเพื่อให้ภาพรวมอ่านลื่น\n"
terminology_policy: "• รักษา “AI”, “software engineering” ในรูปที่เหมาะสมกับภาษาไทย\n\
  \  เช่น “วิศวกรรมซอฟต์แวร์” และ “เครื่องมือด้าน AI”\n• คำว่า “多语言/其他语言版本” ให้เป็น\
  \ “เวอร์ชันหลายภาษา/เวอร์ชันภาษาอื่น” • “i18n” อาจคงไว้ในวงเล็บหลังคำอธิบายได้ แต่ไม่จำเป็นต้องใช้ตัวย่อซ้ำบ่อย\
  \ • “自动同步/逐字替换/理解真正想表达的意思/自然地重新讲述”\n  ให้ตีความเป็น “ซิงก์อัตโนมัติ” / “ไม่ใช่แปลแบบแทนคำต่อคำ”\
  \ /\n  “ทำความเข้าใจเจตนาหรือความหมาย” / “เรียบเรียงใหม่ให้เป็นธรรมชาติ”\n"
forbidden_styles: "• ห้ามแปลแบบคำต่อคำที่ทำให้ประโยคไทยแข็งหรือผิดธรรมชาติ • ห้ามเปลี่ยนเนื้อหาเชิงเจตนา\
  \ (เช่น ทำให้เป็นประกาศเชิงโฆษณาหรือสรรเสริญเกินจริง) • ห้ามดัดแปลง/สรุป/ลบส่วนประกอบที่เป็นข้อกำหนดระบบ\n\
  \  โดยเฉพาะข้อกำหนดเรื่องการซิงก์และการคงโค้ด\n• ห้ามใส่อารมณ์ก้าวร้าว หยาบคาย หรือสำนวนไม่เป็นทางการมากเกินไป\
  \ • ห้ามแตะต้องรูปแบบโค้ดบล็อก (ตัวอักษร เครื่องหมายวรรคตอน ข้อความในสตริง)"
