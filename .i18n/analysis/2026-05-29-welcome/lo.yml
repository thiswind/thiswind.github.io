source_summary: 'ນີ້ແມ່ນບົດຄວາມພາສາຈີນບົດທຳອິດຂອງລະບົບ blog ນີ້. ຜູ້ຂຽນຢາກໃຫ້ແວບໄຊບ໌ບໍ່ແມ່ນພຽງແຕ່ເປັນໜ້າສະແດງຜົນງານ,
  ແຕ່ເປັນສະຖານທີ່ສະສົມບັນທຶກດ້ານວິສະວະກຳຊອບແວຢ່າງຍາວນານ, ບັນທຶກການລອງໃຊ້ເຄື່ອງມື AI,
  ແລະພື້ນທີ່ສຳລັບຄວາມຄິດຂອງຕົນເອງ. ຖ້າບົດຄວາສະບັບພາສາຈີນປ່ຽນແປງ, ລຸ້ນພາສາອື່ນຄວນຈະຊິງຄອນອັດຕະໂນມັດ.
  ການແປບໍ່ຄວນເປັນການປ່ຽນຄຳຕໍ່ຄຳແບບຕາມຕົວ, ແຕ່ຄວນເຂົ້າໃຈເຈດຈຳນົງຂອງຂໍ້ຄວາມແລ້ວຖ່າຍເວົ້າໃໝ່ໃຫ້ທຳມະຊາດໃນພາສາເປົ້າໝາຍ.
  ສ່ວນ block ລະຫັດຈະຕ້ອງຄົງໄວ້ເຫມືອນເກົ່າໃນຂະນະການແປ.

  '
literal_layer: '- ກ່າວຕ້ອນຮັບ/ບອກວ່ານີ້ແມ່ນ blog ຂອງຕົນເອງ. - ບົດຄວາມພາສາຈີນບົດທຳອິດຂອງລະບົບນີ້.
  - ສະຫຼຸບທິດທາງ: ບໍ່ແມ່ນແຕ່ໜ້າສະແດງ, ແຕ່ເປັນຄັງສະສົມບັນທຶກ (software engineering
  notes, AI tool practice, personal thinking). - ເວົ້າເຖິງ i18n: ຖ້າບົດຄວາພາສາຈີນປ່ຽນ,
  ພາສາອື່ນຄວນຊິງຄອນອັດຕະໂນມັດ. - ເນັ້ນວ່າການແປບໍ່ແມ່ນປ່ຽນຄຳຕໍ່ຄຳ, ແຕ່ແມ່ນເຂົ້າໃຈເນື້ອຄວາມແທ້
  ແລ້ວບອກໃໝ່ໃຫ້ທຳມະຊາດໃນພາສາເປົ້າໝາຍ. - ລະຫັດໃນ ```python ...``` ຕ້ອງຮັກສາຄືນເດີມ,
  ບໍ່ໃຫ້ແປ/ດັດແກ້.

  '
implicit_layer: '- ຄວາມຈົງໃຈທີ່ບໍ່ໄດ້ເວົ້າໂດຍກົງ: ຜູ້ຂຽນຢາກສ້າງຊຸດບົດຄວາມທີ່ “ຍືນຍົງ”
  ແລະມີຄຸນຄ່າທາງດ້ານຄວາມຮູ້, ເນັ້ນຄວາມຕໍ່ເນື່ອງຂອງເນື້ອຫາ. - ເຈດຈຳນົງດ້ານການສື່ສານ:
  ໃຫ້ຜູ້ອ່ານຂ້າມພາສາໄດ້ “ເຂົ້າໃຈຈຸດປະສົງ” ບໍ່ແມ່ນແຕ່ເຫັນການປ່ຽນຄຳ. - ສະແດງການເນັ້ນຄວາມຖືກຕ້ອງທາງວິທີພິມ:
  code block ຕ້ອງຄົງຮູບແບບ ແລະບໍ່ໃຫ້ຖືກປັບແຕ່ງເວລາແປ. - ສື່ອອກຄວາມຕ້ອງການລະບົບ i18n
  ແບບອັດຕະໂນມັດ (ບໍ່ລົງມື) ເພື່ອລົດການຜິດພາດ.

  '
cross_cultural_layer: '- ພາສາແລະການພິມ: ບົດນີ້ຂຽນແບບເປັນທາງການຂອງ blog ທຳອິດ; ການຖ່າຍໃນພາສາລາວຄວນໃຊ້ຖ້ອຍຄຳທີ່ສຸພາບ
  ແລະລະບຽບການບອກຈຸດປະສົງ. - ການກ່າວເຖິງຊອບແວ/AI: ສະຫຼຸບຄວາມໝາຍໃນແບບທີ່ຄົນອ່ານທຳມະຊາດໃນຂອງລາວຮູ້ຈັກ,
  ບໍ່ຕ້ອງມີພາສາທາງວິຊາການເກີນຈຳເປັນ ແຕ່ຍັງຮັກສາຄວາມຊັດເຈນ. - ມຸມມອງຄຸນຄ່າ: ເນັ້ນການສະສົມຄວາມຮູ້
  ແລະຄວາມສອດຄ່ອງຂອງເນື້ອຫາຂ້າມພາສາ; ບໍ່ມີປະເດັນສາສະໜາ ຫຼືການເມືອງທີ່ຕ້ອງລະວັງ.

  '
retelling_strategy: '- ແປຢ່າງເປັນທາງການແຕ່ອ່ານສະບາຍ ໃຫ້ຕົງຕາມໂຕນ blog ທຳອິດ. - ຮັກສາໂຄງສ້າງຄວາມ:
  1) ກ່າວເລີ່ມຕົ້ນ, 2) ຈຸດປະສົງຂອງ blog, 3) ນະໂຍບາຍ i18n ແລະການແປ, 4) ຂໍ້ຄວນຮັກສາ
  code block. - ບໍ່ແປຄຳຕໍ່ຄຳ; ເນັ້ນຄວາມໝາຍ: “auto sync / not word-for-word / understand
  then retell naturally”. - ຮັກສາ code block ແບບເດີມທັງໝົດ (ບໍ່ແກ້ຕົວອັກສອນ, ບໍ່ແປຂໍ້ຄວາມຢູ່ໃນ
  code). - ສຳລັບຄຳທີ່ເປັນທັກສະ/ເຕັກນິກ: ຖ້າມີຄຳຍອມຮັບໃນລາວໃຊ້ທົ່ວໄປໃຫ້ໃຊ້, ຖ້າບໍ່ມີໃຫ້ຂຽນປະກອບແບບປະມວນ
  (ເຊັ່ນ AI, software engineering) ໃຫ້ອ່ານເຂົ້າໃຈ.

  '
terminology_policy: '- ຮັກສາຄຳທີ່ເປັນຄຳທັກສະສາກົນເຊັ່ນ: AI, software engineering,
  blog, i18n. - ຄຳທີ່ເປັນກົດລະບຽບການແປ: “ແປບໍ່ແມ່ນຕາມຄຳ/逐字替换” ໃຫ້ຖ່າຍຄວາມໝາຍໃຫ້ເຫັນວ່າບໍ່ຄວນ
  word-for-word. - ຄຳວ່າ “synchronize automatically / automatic sync” ໃຫ້ຖ່າຍເວົ້າທີ່ສື່ຄວາມໝາຍເຖິງກົນໄກຊິງຄອນ
  (ບໍ່ລົງມື).

  '
forbidden_styles: '- ຫ້າມໃຊ້ພາສາກະທົບ, ຫຍາບຄາຍ, ຫຼື slang. - ຫ້າມປ່ຽນ/ແປເນື້ອໃນ code
  block ຫຼື ປ່ຽນຮູບແບບ fencing ຂອງ code block. - ຫ້າມຄວາມເຂັ້ມທາງອາລົມເກີນ (ບໍ່ເນັ້ນໂຄສະນາ
  ຫຼື ແບບໄລ່ຄວາມຮູ້ເກີນຄວາມຈຳເປັນ). - ຫ້າມໃສ່ເນື້ອຫາໃໝ່ທີ່ບໍ່ມີໃນຕົ້ນສະບັບ (ບໍ່ເພີ່ມຊີວະປະຫວັດ,
  ບໍ່ເພີ່ມคำຄຳເຕືອນສະເພາະ).'
