source_summary: 'المنشور الصيني الأول يقدّم هدف المدونة: ليست مجرد صفحة عرض، بل مساحة
  لتجميع ملاحظات هندسة البرمجيات وتوثيق تجارب أدوات الذكاء الاصطناعي وتأملات شخصية
  طويلة الأمد. كذلك يطلب أن تتم مزامنة النسخ المترجمة تلقائيًا عند تغيير المقالات
  الصينية، مع التأكيد أن الترجمة ليست حرفية بل إعادة سرد تعكس المعنى المقصود بشكل
  طبيعي في لغة الهدف.

  '
literal_layer: 'النص يقول: "هذه أول مشاركة كمصدر صيني في هذا نظام المدونات." ثم يعبّر
  عن رغبة: أن يكون الموقع مكانًا للتراكم طويل المدى لمذكرات برمجية وتجارب أدوات AI
  وأفكار شخصية. ثم يذكر: عند تغيّر المقالات الصينية يجب أن تتزامن النسخ الأخرى تلقائيًا،
  وأن لا تكون الترجمة مجرد استبدال كلمة بكلمة؛ بل فهم المقصود ثم إعادة صياغته طبيعيًا.
  يوجد عنصر وصفي داخل صيغة Markdown، وموضع placeholder: __I18N_CODE_BLOCK_0000__ ويجب
  إبقاؤه كما هو.

  '
implicit_layer: 'النبرة تحمل نية لاختبار/تحسين نظام الترجمة متعدد اللغات: توجيه للمحرّك
  أو المترجم ليعطي ترجمة "مناسبة ثقافيًا" وليس مجرد مطابقة لغوية. كما يوحي بأن المحتوى
  يجب أن يحافظ على هدف المؤسسة (تجميع المعرفة) وأن تُراعي الترجمات أسلوب المدونات
  في كل لغة.

  '
cross_cultural_layer: 'المطلوب هو إعادة صياغة أسلوب تقني/مدون طبيعي في كل لغة:  -
  الروسية بصياغة تقنية مألوفة وإيقاع رسمي. - الفارسية بروح نشر رسمية وطبيعية مع تعبيرات
  شائعة في المدونات التقنية. - العربية باللهجة الشامية (دمشق) وبأسلوب مدونة محلي،
  مع تجنّب العربية الفصحى القياسية. - التركية بلغة تقنية سلسة. كما يجب المحافظة على
  اصطلاحات مثل "مذكرات/ملاحظات هندسة البرمجيات" و"أدوات الذكاء الاصطناعي" بصياغة تعكس
  الاستخدام الشائع في كل ثقافة.

  '
retelling_strategy: 'استخدام إعادة سرد بمعنى متسق:  أ) الحفاظ على بنيّة Markdown كما
  في المصدر (السطور والفاصل والمسافة البادئة) ب) ترجمة المعاني العامة (هدف المدونة
  + مبدأ التزامن + عدم الحرفية) ج) صياغة جمل افتتاحية وخاتمية بأسلوب طبيعي في كل لغة
  د) إبقاء placeholder __I18N_CODE_BLOCK_0000__ دون تغيير حرفي هـ) عدم إنشاء محتوى
  إضافي أو تغيير نية الطلبات.

  '
terminology_policy: '- "软件工程笔记" تُترجم إلى مكافئ طبيعي: ملاحظات/دفاتر/Notlar في كل
  لغة. - "AI 工具实践记录" تُترجم كممارسة/تجارب أدوات الذكاء الاصطناعي/AI. - "个人思考空间" تُترجم
  كمساحة للتأملات الشخصية/الأفكار. - "自动同步" تُترجم كمزامنة تلقائية عند التغيّر. -
  "逐字替换" تُترجم كمطابقة حرفية/استبدال كلمة بكلمة/حرفيًا. - لا تُغيَّر المعرّفات التقنية
  أو placeholder.

  '
forbidden_styles: 'ممنوع: - الترجمة الحرفية حرفًا-بحرف التي تضر بأسلوب المدونات. -
  استخدام العربية الفصحى القياسية أو اللهجة السعودية في قسم ar. - إدخال عبارات ترويجية
  أو دينية أو سياسية غير موجودة. - كسر Markdown أو تعديل placeholder __I18N_CODE_BLOCK_0000__
  أو تغيير هيكله.

  '
