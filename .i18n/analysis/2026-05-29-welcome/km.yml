source_summary: 'អត្ថបទនេះជាការស្វាគមន៍សម្រាប់ប្លុកផ្ទាល់ខ្លួន។ វាបញ្ជាក់ថា​អត្ថបទចិននេះជាអត្ថបទប្រភពដំបូងសម្រាប់សាកល្បងប្រព័ន្ធប្លុកពហុភាសា
  ហើយអ្នកនិពន្ធចង់ឲ្យគេហទំព័រនេះមិនមែនគ្រាន់តែជាទំព័របង្ហាញទេ តែជា​កន្លែងប្រមូលយូរអង្វែងនូវកំណត់ត្រាវិស្វកម្មកម្មវិធី
  ការអនុវត្តឧបករណ៍ AI និងការគិតផ្ទាល់ខ្លួន។ អត្ថបទក៏ស្នើឲ្យពេលអត្ថបទចិនផ្លាស់ប្តូរ
  កំណែភាសាផ្សេងទៀតត្រូវធ្វើសមកាលកម្មដោយស្វ័យប្រវត្តិ ដោយការបកប្រែមិនមែនគ្រាន់តែជំនួសពាក្យតាមពាក្យ
  ប៉ុន្តែត្រូវយល់អត្ថន័យពិតនៃដើម ហើយរៀបរាប់ឡើងវិញជាភាសាគោលដៅឲ្យសមធម្មជាតិ។ រួមមាន
  code block Python ដែលត្រូវរក្សាទុកមិនផ្លាស់ប្តូរ។

  '
literal_layer: "- ប្រាប់ថានេះជាអត្ថបទប្រភពចិនដំបូងនៃប្រព័ន្ធប្លុក។ - បំណងបង្កើតគេហទំព័រជាកន្លែងសម្រាប់កំណត់ត្រាវិស្វកម្មកម្មវិធីយូរអង្វែង\n\
  \  បទពិសោធន៍/កំណត់ហេតុការអនុវត្តឧបករណ៍ AI និងចន្លោះសម្រាប់ការគិតផ្ទាល់ខ្លួន។\n-\
  \ ពេលអត្ថបទចិនផ្លាស់ប្តូរ កំណែភាសាផ្សេងត្រូវសមកាលកម្មដោយស្វ័យប្រវត្តិ\n  ហើយការបកប្រែត្រូវយល់ន័យស្នូល\
  \ មិនមែនប្តូរពាក្យតាមពាក្យ។\n- Code block មិនត្រូវបម្លែង/កែប្រែ (ឲ្យដូចដើម)។\n"
implicit_layer: '- ចេតនាផ្សព្វផ្សាយនូវទស្សនៈគុណភាពក្នុងការបកប្រែ៖ “យល់អត្ថន័យ—រៀបរាប់ឡើងវិញ”
  ដើម្បីរក្សាស្មារតី និងភាពអាចអានបាន។ - ចេតនាអះអាងថាប្លុកជាផលិតផលឥតឈប់ឈរ (long-term
  knowledge base) មិនមែនត្រឹមតែទំព័របង្ហាញបណ្តោះអាសន្ន។ - ចេតនាបង្ហាញវិស័យបច្ចេកទេស
  និងការរំពឹងទុកអំពីការរក្សារចនាសម្ព័ន្ធបច្ចេកទេសក្នុងការបកប្រែ (ឧ. code block)។ -
  ការប្រើប្រាស់ការសមកាលកម្មពហុភាសា សំដៅលើការងាយស្រួលថែទាំ និងភាពស៊ីសង្វាក់គ្នានៃមាតិកា។

  '
cross_cultural_layer: '- ក្នុងទម្រង់បោះពុម្ពជាភាសាខ្មែរ គួរប្រើសម្លេងផ្លូវការ សុភាព
  និងសមស្របសម្រាប់ការស្វាគមន៍/ណែនាំគេហទំព័រ។ - ការនិយាយអំពី “កំណត់ត្រា/ចន្លោះគិត”
  ត្រូវរៀបរាប់ឲ្យស្របនឹងរបៀបខ្មែរ ដោយរក្សាទំនាក់ទំនងផ្នែកបច្ចេកទេស (software engineering,
  AI tools) តាមពាក្យបច្ចេកទេស។ - ការចង្អុលបង្ហាញអំពី “សមកាលកម្មដោយស្វ័យប្រវត្តិ” គួរបង្ហាញថាជាគោលការណ៍ប្រព័ន្ធ/សេវាកម្ម
  បែបជាផ្លូវការ មិនមើលទៅដូចការបង្ហាញផ្ទាល់ខ្លួនច្រើនពេក។ - Code block ត្រូវរក្សាទម្រង់និងមាតិកា
  ដើម្បីមិនប៉ះពាល់ភាពត្រឹមត្រូវបច្ចេកទេស និងជឿជាក់លើការប្រើប្រាស់របស់អ្នកអាន។

  '
retelling_strategy: '- ចាប់ផ្តើមដោយប្រយោគស្វាគមន៍សង្ខេប និងបញ្ជាក់ថានេះជាអត្ថបទប្រភពចិនដំបូងសម្រាប់ប្លុកពហុភាសា។
  - បន្តបង្កើតសេចក្តីថ្លែងបំណងចម្បង: គេហទំព័រជាកន្លែងសម្រាប់ចងក្រងចំណេះដឹងយូរអង្វែង
  (កំណត់ត្រាវិស្វកម្មកម្មវិធី, ការអនុវត្ត AI, ការគិតផ្ទាល់ខ្លួន)។ - បញ្ចូលចំណុចគោលការណ៍បកប្រែ៖
  កុំបកប្រែតាមពាក្យតែប៉ុណ្ណោះ ត្រូវយល់ន័យ និងនិយាយឡើងវិញឲ្យធម្មជាតិនៅក្នុងភាសាខ្មែរ។
  - រក្សា code block ដោយមិនបកប្រែអ្វីទាំងអស់ និងមិនផ្លាស់ប្តូររចនាប័ទ្ម (រក្សា indentation
  និងសញ្ញា backticks ប្រសិនបើប្រព័ន្ធអនុញ្ញាត)។

  '
terminology_policy: "- ប្រើពាក្យបច្ចេកទេសសមស្របជាភាសាខ្មែរ ដោយរក្សាន័យដើម៖\n  - “软件工程笔记”\
  \ => កំណត់ត្រាវិស្វកម្មកម្មវិធី\n  - “AI 工具实践记录” => កំណត់ហេតុ/កំណត់ត្រាការអនុវត្តឧបករណ៍\
  \ AI\n  - “个人思考空间” => កន្លែងសម្រាប់គំនិត/ការគិតផ្ទាល់ខ្លួន\n  - “自动同步” => សមកាលកម្មដោយស្វ័យប្រវត្តិ\n\
  - “翻译不应该只是逐字替换” => “ការបកប្រែមិនគួរជាការជំនួសពាក្យតាមពាក្យ” (រក្សាស្មារតីការព្រមានអំពីគុណភាពបកប្រែ)។\
  \ - “代码块” ត្រូវរក្សារចនាសម្ព័ន្ធជា code ដោយមិនប្តូរអត្ថបទក្នុង block។\n"
forbidden_styles: '- កុំប្រើភាសាវិជ្ជមាន/លើសលប់ ឬទម្រង់និយាយជិតខ្លួនច្រើន (conversational/colloquial)
  ពេក។ - កុំបកប្រែតាមពាក្យតែប៉ុណ្ណោះ ឬរក្សារចនាសម្ព័ន្ធប្រយោគដើមឲ្យខូចភាពធម្មជាតិនៃភាសាខ្មែរ។
  - កុំកែប្រែ/បកប្រែខ្លឹមសារក្នុង code block ឬបន្ថែមអត្ថាធិប្បាយក្នុង block។ - មិនប្រើសញ្ញាសម្គាល់អារម្មណ៍
  (emoticons) ឬពាក្យស្លោកមិនសមស្របសម្រាប់បោះពុម្ពផ្លូវការ។'
