source_summary: 'ဤဘလော့ခ်စနစ်၏ ပထမဆုံးသော တရုတ်ဘာသာ မူရင်းစာမျက်နှာဖြစ်သည်။ စာဖတ်သူများအတွက်
  ရိုးရိုးပြသမှုတင်မက၊ ဆော့ဖ်ဝဲအင်ဂျင်နီယာမှတ်စုများကို အချိန်ကြာမြင့်စွာ စုဆောင်းနိုင်မည့်အပြင်
  AI ကိရိယာများကို လက်တွေ့အသုံးချမှတ်တမ်းများနှင့် ကိုယ်ပိုင်အတွေးအမြင်များ ထားရှိနိုင်သည့်
  နေရာတစ်ခုဖြစ်လိုကြောင်း ရည်ရွယ်ထားသည်။ တရုတ်စာသား ပြောင်းလဲသွားပါက အခြားဘာသာဗားရှင်းများက
  အလိုအလျောက် တူညီစေရန်၊ စာသားကို စကားလုံးတစ်လုံးချင်း အစားထိုးခြင်းသာမဟုတ်ဘဲ မူလရည်ရွယ်ချက်ကို
  နားလည်ပြီး ပစ်မှတ်ဘာသာဖြင့် သဘာဝကျကျ ပြန်ပြောရန် အလေးပေးထားသည်။ Python ကုဒ်ဘလော့ခ်ကို
  ဘာသာပြန်စဉ်အတွင်း မပြောင်းလဲဘဲ ထိန်းသိမ်းရမည်ဟု ဆိုထားသည်။

  '
literal_layer: '- “这是这个博客系统的第一篇中文源文章。” → ပထမဆုံး တရုတ်မူရင်းဆောင်းပါးဖြစ်ကြောင်း။

  - “欢迎来到我的个人博客” ဆိုသည့် ခေါင်းစဉ်အောက်တွင် ဘလော့ခ်သို့ စတင်ကြိုဆိုခြင်းအကြောင်း။

  - ဘလော့ခ်သည် ပြသရုံသာမဟုတ်ဘဲ နည်းပညာမှတ်စု၊ AI tool လက်တွေ့မှတ်တမ်း၊ ကိုယ်ပိုင်အတွေးအမြင်များကို
  ရေရှည်စုစည်းနိုင်သည့်နေရာဖြစ်လိုကြောင်း ဆန္ဒဖော်ပြ။

  - “当中文文章发生变化时，其它语言版本应该自动同步。” → တရုတ်ဆောင်းပါးပြောင်းလဲလျှင် အခြားဘာသာဗားရှင်းများ
  အလိုအလျောက်တူအောင်လုပ်ရန်။

  - “翻译不应该只是逐字替换……” → စာသားကို တစ်လုံးချင်း အစားထိုးခြင်းမျိုးမဟုတ်ဘဲ အဓိပ္ပာယ်ကို
  နားလည်ပြီး သဘာဝကျအောင် ပြန်ရေးရန်။

  - ```python ...``` ကုဒ်ဘလော့ခ်အား ဘာသာပြန်စဉ်အတွင်း မပြောင်းလဲထားရန် အမိန့်ပေးသကဲ့သို့
  ဖော်ပြ။

  '
implicit_layer: '- စနစ်တကျ i18n/ဘက်စုံဘာသာပြန်စနစ်တည်ဆောက်ရာတွင် “အဓိပ္ပာယ်ထိန်းထားမှု”
  နှင့် “အလိုအလျောက် ထပ်တူပြုလုပ်မှု” ကို အဓိကတန်ဖိုးထားကြောင်း ပြောလိုသည့်ရည်ရွယ်ချက်။

  - ဘလော့ခ်ကို ရေရှည်သင်ယူ/မှတ်တမ်းရေးရာ အဖွဲ့အစည်းတစ်ခုလို သဘောထားရန်၊ “ပုဂ္ဂိုလ်ရေး
  but engineering/AI oriented knowledge base” ဖြစ်လာစေချင်သည့် စိတ်ရင်း။

  - ကုဒ်များကဲ့သို့ တိုက်ရိုက်အသုံးပြုနိုင်သည့် အချက်အလက်များကို ဘာသာပြန်မလုပ်ဘဲ ထိန်းသိမ်းခြင်းဖြင့်
  ပေါင်းစပ်ထုတ်ဝေမှု၏ ယုံကြည်နိုင်စွမ်းကို ထိန်းချုပ်လိုခြင်း။

  '
cross_cultural_layer: '- ပစ်မှတ်ဘာသာ (မြန်မာ) စာစောင်ထုတ်ဝေရေး အလေ့အထအရ “အင်ဂျင်နီယာမှတ်စု၊
  လက်တွေ့မှတ်တမ်း” စသည့် စကားလုံးများကို သင်္ကေတမကျော်ဘဲ သဘာဝကျ/တရားဝင်သံစဉ်ဖြင့်
  ပြောရန်လိုအပ်သည်။

  - ဘာသာပြန်စနစ်ဆိုင်ရာ စကားရပ်များ (sync, i18n,逐字) ကို “အလိုအလျောက် ထပ်တူပြုလုပ်ခြင်း/တစ်လုံးချင်း
  မဟုတ်ဘဲ အဓိပ္ပာယ်အရ လိုက်လျောပြန်ဆိုခြင်း” ကဲ့သို့ မြန်မာစာစကားအလေ့အထနှင့် ကိုက်ညီအောင်
  ဖော်ပြရန်လိုသည်။

  - ကုဒ်ဘလော့ခ်ကို စာသားဘာသာပြန်မဟုတ်ဘဲ “ထိန်းသိမ်းထားရမည်” ဟု တရားဝင်အမိန့်သံဖြင့်
  ပြန်ရေးရန် သင့်လျော်သည်။

  '
retelling_strategy: "- အဓိကအကြောင်းအရာ ၃ ခုကို တစ်ခုချင်းစီ သဘာဝကျစွာ ချိတ်ဆက်ပြန်ရေးမည်—\n\
  \  1) ပထမဆုံးတရုတ်မူရင်းဆောင်းပါးဆိုသော နိဒါန်း\n  2) ဘလော့ခ်၏ ရည်မှန်းချက် (ရေရှည်မှတ်စု/AI\
  \ tool လက်တွေ့/ကိုယ်ပိုင်အတွေး)\n  3) i18n ဆိုင်ရာ လုပ်ဆောင်ရေးမူ (အပြောင်းအလဲနောက်လိုက်တူညီ၊\
  \ စကားလုံးတစ်လုံးချင်း မဟုတ်ဘဲ အဓိပ္ပာယ်အရ ပြန်ရေး) နှင့် ကုဒ်ဘလော့ခ်ကို မပြောင်းလဲထားမည်ဆိုသည့်\
  \ စည်းမျဉ်း။\n- “翻译不应该只是逐字替换” ကို မြန်မာဘာသာတွင် “စကားလုံးတစ်လုံးတစ်လုံးအတိုင်း\
  \ လဲမထိုးဘဲ အဓိပ္ပာယ်ကို နားလည်၍ သဘာဝကျအောင် ပြန်ဆိုရမည်” ဟု စာစောင်ထုတ်ဝေရေးသံစဉ်ဖြင့်\
  \ ဖော်ပြမည်။\n- ကုဒ်ဘလော့ခ်အတွင်းရှိ စာသားအား လုံးဝမပြောင်းဘဲ တူညီစွာ ထားမည်။\n"
terminology_policy: '- “博客系统” → “ဘလော့ဂ်စနစ်” (သို့) “ဘလော့ခ်စနစ်”

  - “多语言/其它语言版本” → “အခြားဘာသာဗားရှင်းများ” (သို့) “အခြားဘာသာများ”

  - “自动同步” → “အလိုအလျောက် တူညီ/ထပ်တူပြုလုပ်”

  - “逐字替换” → “စကားလုံးတစ်လုံးချင်း အစားထိုးခြင်း/တစ်လုံးချင်း လဲလှယ်ခြင်း”

  - “目标语言自然地重新讲述” → “ပစ်မှတ်ဘာသာဖြင့် သဘာဝကျစွာ ပြန်လည်ရေးသား”

  - “代码块保持不变” → “ကုဒ်ဘလော့ခ်ကို မပြောင်းလဲဘဲ ထိန်းသိမ်း”

  '
forbidden_styles: '- စကားပြောပုံစံ (conversational) သို့ အလွန်ရင်းနှီးသော သုံးစွဲမှု
  (ဥပမာ “မိတ်ဆွေတို့/ကြိုတင်ပြောလိုက်မယ်” စသည်) များကိုရှောင်ရန်။

  - ရုပ်ပုံယောင်ယမ်း/လွန်ကဲသော အလှဆင်စာပေသံ (overly poetic, hype) မျိုး မသုံးရန်။

  - ကုဒ်ဘလော့ခ်အတွင်း စာလုံးများ/အင်ဒင်/အရောင်/ဖော်မတ်ကို မပြောင်းလဲရေးရမည် (ကုဒ်ကို
  ဘာသာပြန်စာသားဖြင့် မထိမခိုက်ရန်)။

  - နည်းပညာအသုံးအနှုန်းများကို မလိုအပ်ဘဲ တီထွင်အသစ်တီထွင်ထားသော စကားလုံးများ (သို့)
  အဓိပ္ပာယ်လွဲနိုင်သည့် အတိုကောက်အသစ်များ မသုံးရန်။'
