source_summary: 'บทความนำเสนอ “นิพจน์ทางคณิตศาสตร์” แบบตัวอย่างหลายรูปแบบ ได้แก่ สมการแบบบรรทัดเดียว,
  สมการอินไลน์, สมการหลายบรรทัดในรูปแบบบล็อก และสมการเกี่ยวกับความสัมพันธ์มวล–พลังงานในทฤษฎีสัมพัทธภาพอย่างย่อ
  โดยคงรูปแบบมาร์กดาวน์และสัญลักษณ์ไว้

  '
literal_layer: 'มีข้อความจีนอธิบายประเภทของสมการ (หนึ่งบรรทัด / อินไลน์ / หลายบรรทัด)
  ตามด้วยเนื้อหาคณิตศาสตร์:

  - “一个单行的数学表达式” ตามด้วย “一个单行的数学表达式” (บรรทัดเดียว)

  - อินไลน์: \(a = b + c\)

  - “一个多行的数学表达式” ตามด้วยสมการอนุพันธ์ย่อยหลายบรรทัดใน \[ ... \]

  - “狭义相对论质能方程” ตามด้วย \(E = m * c^2\)

  '
implicit_layer: 'เจตนาที่ไม่ปรากฏชัดคือการ “สาธิตการแสดงผล” ของสูตรคณิตศาสตร์ในเอกสาร/บล็อก
  โดยเลือกตัวอย่างที่ครอบคลุมทั้ง inline และ block math และมีชื่อเรื่องเชิงวิชาการสั้น
  ๆ เพื่อให้ผู้อ่านเข้าใจว่ากำลังดูรูปแบบใดอยู่

  '
cross_cultural_layer: 'ไม่ต้องปรับเชิงศาสนาหรือสังคมมากนัก แต่ต้องใช้สำนวนเชิงวิชาการที่เหมาะกับแต่ละภาษา
  และจัดคำอธิบายประเภทของสมการให้เป็นธรรมชาติสำหรับผู้อ่านในวงกว้าง เช่น “สมการบรรทัดเดียว”,
  “สมการอินไลน์”, “สมการหลายบรรทัด” และ “สมการมวล–พลังงานของสัมพัทธภาพพิเศษ”

  '
retelling_strategy: '- รักษาโครงสร้างมาร์กดาวน์และสมการทั้งหมดแบบเดิม (รวมเครื่องหมายและช่องว่างรอบเครื่องหมายที่อยู่ในต้นฉบับ)

  - แปลเฉพาะข้อความบรรยายประเภทสมการให้เข้ากับสำนวนทางวิชาการของแต่ละภาษา

  - คงรูปแบบ \( ... \) และ \[ ... \] รวมถึงขึ้นบรรทัดภายในบล็อกคณิตศาสตร์ตามต้นฉบับ

  '
terminology_policy: 'ใช้ศัพท์ฟิสิกส์ที่สอดคล้องกับภาษาปลายทาง:

  - “狭义相对论” = สัมพัทธภาพพิเศษ

  - “质能方程” = สมการมวล–พลังงาน

  สำหรับสัญลักษณ์คณิตศาสตร์ ให้คงไว้ตามเดิม เช่น \(E = m * c^2\) โดยไม่ปรับเป็นรูปแบบอื่น

  '
forbidden_styles: '- ห้ามแปลแบบคำต่อคำที่ทำให้สำนวนแปลดูผิดธรรมชาติ

  - ห้ามเปลี่ยนหรือทำให้สมการเปลี่ยนความหมาย/รูปแบบ

  - ห้ามเพิ่มคำอธิบายเชิงยาวเกินจำเป็นนอกเหนือจากการบรรยายประเภทตัวอย่างสูตร

  '
