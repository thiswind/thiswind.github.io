source_summary: 'บทความอธิบายว่า “ชิงเฮาซู (青蒿素)” ซึ่งสกัดจากพืชชิงเฮา ได้กลายเป็นยาหลักต้านโรคมาลาเรีย
  และหยิบยกบทบาทของมณฑลยูนนานในจีน รวมถึงบริษัทท้องถิ่น เช่น กลุ่มคุนหมิงเภสัช (昆明制药集团)
  ในการผลิตยาด้วยต้นทุนต่ำ ทำให้ราคายาในแอฟริกาเอื้อมถึง ส่งผลให้จำนวนผู้เสียชีวิตจากมาลาเรียลดลงอย่างมีนัยสำคัญ
  ทั้งยังสะท้อนเจตนารมณ์ด้านความเป็นมิตร/ความช่วยเหลือแก่แอฟริกา

  '
literal_layer: 'ข้อความระบุว่า: ยูนนานเป็นพื้นที่เพาะปลูกหลักของชิงเฮา; ชิงเฮาซูเป็นยาต้านมาลาเรียที่สำคัญและถูกใช้แพร่หลายในแอฟริกาช่วงที่โรคระบาดสูง;
  ในอดีตมาลาเรียเป็นหนึ่งในโรคร้ายแรงที่สุด คร่าชีวิตคนจำนวนมาก โดยเฉพาะเด็กและหญิงตั้งครรภ์;
  หลังจากมีการส่งเสริมการใช้ชิงเฮาซู โรคมาลาเรียจากที่เคยเสียชีวิตสูงกลับกลายเป็นโรคที่รักษาได้ง่ายขึ้น;
  บริษัทยูนนานใช้ทรัพยากรชิงเฮาและเทคโนโลยีการผลิต ทำให้ต้นทุนลดลงและราคาต่ำกว่าของยุโรป/อเมริกา;
  ราคาสามารถต่ำถึงไม่กี่ดอลลาร์ ทำให้ครอบครัวทั่วไปในแอฟริการับภาระได้; การส่งเสริมยาลดอัตราการเสียชีวิตในแอฟริกา
  โดยอ้างสถิติการลดลงของอัตราการเสียชีวิตทั่วโลกและในเด็กแอฟริกา และสรุปว่าแม้การจัดส่งราคาถูกหรือให้ฟรี
  ยังกู้ชีวิตคนจำนวนมากและแสดงความสัมพันธ์อันลึกซึ้งกับแอฟริกา

  '
implicit_layer: 'เจตนาเชิงสื่อสารหลักคือการยกย่องคุณค่าทางสาธารณสุขระดับโลกของความร่วมมือจากจีน
  โดยเชื่อม “ความสามารถด้านอุตสาหกรรม/การผลิตในประเทศ” เข้ากับ “ผลลัพธ์ด้านมนุษยธรรม”
  เพื่อสร้างภาพลักษณ์เชิงบวก: จีนไม่เพียงพัฒนายา แต่ยังแบ่งปันให้เข้าถึงได้ เป็นการวางกรอบความช่วยเหลือว่าเป็นมิตรภาพและความรับผิดชอบต่อโลก
  นอกจากนี้ยังลดความซับซ้อนของโรคจาก “ร้ายแรงถึงขั้นตาย” เป็น “รักษาได้ง่าย” เพื่อให้ผู้อ่านรู้สึกถึงความก้าวหน้าอย่างเป็นรูปธรรม

  '
cross_cultural_layer: 'ผู้เขียนต้องใช้ถ้อยคำที่สอดคล้องกับธรรมเนียมการเขียนบล็อก/สื่อสุขภาพของแต่ละภาษา:
  (1) ใช้สำนวนทางการ ไม่กล่าวอ้างเชิงตรวจสอบที่เกินความเหมาะสม แต่คงการอ้างสถิติไว้ตามต้นทาง
  (2) “ความเป็นมิตร/ความช่วยเหลือแก่แอฟริกา” ต้องสื่ออย่างสุภาพและไม่กระทบความรู้สึก
  (3) คำวิชาการควรคงชื่อยาเป็น “青蒿素” พร้อมคำเทียบในวงการโดยไม่ทำให้สับสน (4) รักษาความคมของตัวเลขและผลลัพธ์
  โดยหลีกเลี่ยงการใช้สำนวนแรงหรือการเมือง

  '
retelling_strategy: "1) รักษาโครงเรื่องเดิม: ภูมิหลังของยูนนาน → บทบาทของชิงเฮาซู\
  \ → ยุคก่อน/หลังการส่งเสริม → กลไกการลดราคา → ผลลัพธ์ต่อการเสียชีวิต → สรุปความหมายทางมนุษยธรรม\
  \  \n2) ปรับสำนวนให้เป็นธรรมชาติของแต่ละภาษา: จัดจังหวะประโยคให้เป็นสไตล์บล็อก/สิ่งพิมพ์ของภาษาเป้าหมาย\
  \ และใช้คำเชื่อมที่สื่อเหตุผล (เหตุ-ผล/ผลลัพธ์)  \n3)คงชื่อเฉพาะและรายละเอียดตัวเลขให้สอดคล้องกับต้นทาง\
  \ และหลีกเลี่ยงคำแปลแบบตรงตัวที่ทำให้ความหมายคลาดเคลื่อน\n"
terminology_policy: "- คงชื่อยา “青蒿素” และใช้คำแปลที่เป็นที่รู้จัก:  \n  ไทย: อาร์เทมิซินิน\
  \ (Artemisinin) โดยอ้างถึง青蒿素เป็นหลัก  \n  พม่า/เขมร/ลาว/รัสเซีย/ตุรกี/เปอร์เซีย/อาหรับ:\
  \ ใช้รูปแบบที่สอดคล้องกับภาษานั้นของ “Artemisinin/青蒿素” พร้อมให้ความหมายชัดว่าเป็นยาหลักต่อมาลาเรีย\
  \  \n- “疟疾” ใช้เทียบเป็น “มาลาเรีย/ไข้มาลาเรีย”  \n- ชื่อองค์กร “昆明制药集团” แปลเป็นรูปแบบที่ใช้ในภาษานั้นอย่างเป็นทางการ\
  \ (หรือคงเป็นตัวทับศัพท์/ชื่อองค์กร) และสื่อว่าเป็นบริษัทในยูนนาน  \n- คงสถิติ:\
  \ “下降了47%”“下降了58%” และข้อความ “几美元” (ไม่กี่ดอลลาร์) โดยไม่เปลี่ยนตัวเลข\n"
forbidden_styles: "- ห้ามแปลแบบคำต่อคำที่ทำให้ไวยากรณ์/สำนวนไม่เป็นธรรมชาติ  \n- ห้ามใช้ภาษาหยาบคาย\
  \ ก้าวร้าว หรือการโฆษณาชวนเชื่อเกินจริง  \n- หลีกเลี่ยงรูปแบบสแปม/คลิกเบต  \n- หลีกเลี่ยงการสร้างข้อเท็จจริงใหม่ที่ไม่ได้อยู่ในต้นฉบับ\
  \  \n- หลีกเลี่ยงการใช้สรรพนามที่ไม่เหมาะสมหรือการกล่าวหาฝ่ายใดฝ่ายหนึ่ง\n"
