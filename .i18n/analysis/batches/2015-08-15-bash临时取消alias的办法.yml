analysis:
  source_summary: 'เนื้อหากล่าวว่าโดยทั่วไปในไฟล์/ส่วนกำหนด __I18N_INLINE_CODE_0001__
    มักมีการตั้ง “alias” ไว้หลายแบบ และหากต้องการใช้ alias แบบชั่วคราวเพียงบางคำสั่งในบรรทัดคำสั่ง
    สามารถทำได้ด้วย __I18N_INLINE_CODE_0003__ เพื่อยกเลิกหรือไม่ใช้ alias ชั่วคราวตามต้องการ

    '
  literal_layer: 'ผู้เขียนอธิบายเป็นลำดับ: (1) ภายใน __I18N_INLINE_CODE_0001__ โดยทั่วไปจะกำหนด
    alias ไว้ (เช่น __I18N_INLINE_CODE_0002__) (2) บางครั้งใน command line ต้องการอาศัย
    alias เฉพาะชั่วคราว (3) ใช้คำสั่ง __I18N_INLINE_CODE_0003__ เพื่อให้เกิดพฤติกรรมดังกล่าว

    '
  implicit_layer: 'ความตั้งใจแฝงคือการช่วยผู้อ่านที่เจอปัญหา “ต้องการใช้คำสั่งดั้งเดิมแทน
    alias ที่ตั้งไว้” หรือ “ต้องการเลี่ยง alias ในช่วงสั้น ๆ” โดยไม่ต้องแก้ configuration
    ถาวร

    '
  cross_cultural_layer: 'โทนและศัพท์เกี่ยวกับระบบปฏิบัติการ/เชลล์ควรใช้ภาษาทางเทคนิคที่คุ้นเคยของแต่ละภาษา
    พร้อมคงรูปแบบคำสั่งและ placeholder ไว้อย่างเคร่งครัด และหลีกเลี่ยงการแปลที่ทำให้ความหมายเชิงเทคนิคคลาดเคลื่อน

    '
  retelling_strategy: '- รักษาโครงสร้างย่อหน้าเดิม: อธิบายว่า alias ถูกกำหนดไว้ที่ไหน
    → อธิบายสถานการณ์ที่ต้องการ “ชั่วคราว” → แนะนำการใช้ __I18N_INLINE_CODE_0003__

    - คง placeholder ทั้งหมดไม่เปลี่ยนรูป

    - ใช้ภาษาทางการธรรมชาติของแต่ละภาษา โดยเน้นความหมาย “ยกเลิก/หลีกเลี่ยง alias ชั่วคราวใน
    command line”

    '
  terminology_policy: '- คงคำว่า alias ในเชิงเทคนิคเป็นคำยืมที่เหมาะกับแต่ละภาษา (หรือเทียบเท่าที่ใช้ในวงการ)
    แต่ให้สอดคล้องกับบริบทเชลล์

    - คำว่า command line/คำสั่งบรรทัดคำสั่ง แปลให้เหมาะกับภาษาเป้าหมาย

    - Placeholder และตัวระบุทางเทคนิค (เช่น __I18N_INLINE_CODE_0001__) ต้องคงรูปเดิมทุกครั้ง

    '
  forbidden_styles: '- ห้ามแปลแบบคำต่อคำที่ทำให้ความหมายทางเทคนิคผิด

    - ห้ามใช้ภาษาพูด/กันเองเกินไปในสไตล์บล็อกที่เป็นทางการ

    - ห้ามเปลี่ยนเครื่องหมาย/โค้ด/placeholder

    - สำหรับอาหรับ: ห้ามใช้ Modern Standard Arabic และห้ามใช้สำเนียงซาอุดี; ต้องเป็น
    Damascus Levantine Arabic เท่านั้น

    '
translations:
  th:
    title: วิธีปิดใช้งาน alias ชั่วคราวใน bash
    description: 'โดยทั่วไป alias จะถูกกำหนดไว้ภายใน __I18N_INLINE_CODE_0001__ และหากต้องการใช้คำสั่งโดยไม่ใช้
      alias นั้นชั่วคราวในบรรทัดคำสั่ง สามารถทำได้ด้วย __I18N_INLINE_CODE_0003__

      '
    excerpt: 'หากต้องการ “ปิด alias” ชั่วคราวในบรรทัดคำสั่ง สามารถใช้คำสั่ง __I18N_INLINE_CODE_0003__
      ได้

      '
    body: 'โดยทั่วไป ใน __I18N_INLINE_CODE_0001__ มักมีการกำหนด alias ไว้หลายแบบ (เช่น
      __I18N_INLINE_CODE_0002__) อย่างไรก็ตาม หากคุณต้องการใช้คำสั่งในบรรทัดคำสั่งโดย
      “เลี่ยง” alias เฉพาะชั่วคราว ก็สามารถใช้คำสั่ง __I18N_INLINE_CODE_0003__ เพื่อทำตามที่ต้องการได้


      __I18N_CODE_BLOCK_0000__

      '
  my:
    title: bash တွင် alias ကို ယာယီ ပိတ်နည်း
    description: 'အများအားဖြင့် alias များကို __I18N_INLINE_CODE_0001__ အတွင်းတွင်
      သတ်မှတ်ထားတတ်သည်။ command line ထဲမှာ alias ကို ခဏသာ ယာယီ မသုံးချင်ရင် __I18N_INLINE_CODE_0003__
      ကို အသုံးပြုနိုင်သည်။

      '
    excerpt: 'command line ထဲမှာ alias ကို ယာယီ ပိတ်/ရှောင်ချင်ရင် __I18N_INLINE_CODE_0003__
      ကို သုံးပါ။

      '
    body: 'အများအားဖြင့် __I18N_INLINE_CODE_0001__ ထဲမှာ alias တချို့ကို သတ်မှတ်ထားတတ်ပါတယ်
      (__I18N_INLINE_CODE_0002__)။ တခါတရံ command line ထဲမှာ alias တစ်ခုခုကို ယာယီသာ
      သုံးချင်ရင် __I18N_INLINE_CODE_0003__ ဆိုတဲ့ command ကို အသုံးပြုနိုင်ပါတယ်။


      __I18N_CODE_BLOCK_0000__

      '
  km:
    title: វិធីបិទ alias ជាបណ្តោះអាសន្ននៅ bash
    description: 'ជាទូទៅ alias ត្រូវបានកំណត់នៅខាងក្នុង __I18N_INLINE_CODE_0001__ ហើយពេលខ្លះអ្នកចង់ប្រើនៅលើ
      command line ដោយបិទ alias ជាបណ្តោះអាសន្ន អាចប្រើ __I18N_INLINE_CODE_0003__ បាន។

      '
    excerpt: 'ចង់បិទ/រំលង alias ជាបណ្តោះអាសន្ននៅ command line? ប្រើ __I18N_INLINE_CODE_0003__។

      '
    body: 'ជាទូទៅ នៅក្នុង __I18N_INLINE_CODE_0001__ ជាធម្មតាត្រូវបានកំណត់នូវ alias
      មួយចំនួន (__I18N_INLINE_CODE_0002__)។ ពេលខ្លះ នៅពេលប្រើ command line អ្នកចង់ប្រើ
      alias តែមួយចំនួនជាបណ្តោះអាសន្ន អាចធ្វើបានដោយប្រើពាក្យបញ្ជា __I18N_INLINE_CODE_0003__។


      __I18N_CODE_BLOCK_0000__

      '
  lo:
    title: วิธีปิด alias ชั่วคราวใน bash
    description: 'โดยทั่วไปภายใน __I18N_INLINE_CODE_0001__ จะมีการกำหนด alias ไว้หลายอย่าง
      และหากต้องการใช้คำสั่งในบรรทัดคำสั่งแบบชั่วคราวโดยไม่ใช้งาน alias นั้น สามารถทำได้ด้วย
      __I18N_INLINE_CODE_0003__

      '
    excerpt: 'ต้องการปิด/เลี่ยง alias แบบชั่วคราวใน command line ใช้คำสั่ง __I18N_INLINE_CODE_0003__
      ได้

      '
    body: 'โดยทั่วไปแล้ว ใน __I18N_INLINE_CODE_0001__ มักจะมีการกำหนด alias บางอย่างเอาไว้
      (__I18N_INLINE_CODE_0002__)។ บางครั้งเวลาที่ใช้งานในบรรทัดคำสั่ง จำเป็นต้องใช้คำสั่งโดยอาศัย
      alias เพียงชั่วคราว ก็สามารถใช้คำสั่ง __I18N_INLINE_CODE_0003__ ได้


      __I18N_CODE_BLOCK_0000__

      '
  ru:
    title: Как временно отключить alias в bash
    description: 'Обычно алиасы задаются внутри __I18N_INLINE_CODE_0001__ (например,
      __I18N_INLINE_CODE_0002__). Если нужно временно использовать команду, не полагаясь
      на алиас, в командной строке можно воспользоваться командой __I18N_INLINE_CODE_0003__.

      '
    excerpt: 'Хотите временно отключить алиас в командной строке? Используйте __I18N_INLINE_CODE_0003__.

      '
    body: 'Как правило, внутри __I18N_INLINE_CODE_0001__ обычно определяют несколько
      алиасов (__I18N_INLINE_CODE_0002__). Иногда в командной строке требуется временно
      обойти один конкретный алиас — в этом случае можно использовать команду __I18N_INLINE_CODE_0003__.


      __I18N_CODE_BLOCK_0000__

      '
  fa:
    title: روش غیرفعال‌کردن موقت alias در bash
    description: 'معمولاً در داخل __I18N_INLINE_CODE_0001__ چندین alias تعریف می‌شود
      (مثل __I18N_INLINE_CODE_0002__). گاهی لازم است در خط فرمان، فقط به‌صورت موقت
      از یک alias استفاده نکنید یا آن را دور بزنید؛ در این حالت می‌توانید از دستور
      __I18N_INLINE_CODE_0003__ استفاده کنید.

      '
    excerpt: 'برای اینکه alias را موقتاً در خط فرمان غیرفعال کنید، از __I18N_INLINE_CODE_0003__
      استفاده کنید.

      '
    body: 'به‌طور معمول، داخل __I18N_INLINE_CODE_0001__ چند alias تعریف می‌شود (__I18N_INLINE_CODE_0002__).
      گاهی هم وقتی در خط فرمان کار می‌کنید، لازم است موقتاً فقط همان alias مشخص را
      کنار بگذارید؛ در چنین حالتی می‌توانید از دستور __I18N_INLINE_CODE_0003__ استفاده
      کنید.


      __I18N_CODE_BLOCK_0000__

      '
  ar:
    title: كيف بتلغي alias مؤقتًا في bash
    description: 'عادةً من جوا __I18N_INLINE_CODE_0001__ بيتعمل تعريف كم alias (مثلاً
      __I18N_INLINE_CODE_0002__). وأحيانًا على سطر الأوامر بدّك تستخدم أمر معيّن بشكل
      مؤقت من غير ما يعتمد على alias—وقتها بتقدر تستخدم الأمر __I18N_INLINE_CODE_0003__.

      '
    excerpt: 'لإلغاء/تجاوز alias بشكل مؤقت على سطر الأوامر استخدم __I18N_INLINE_CODE_0003__.

      '
    body: 'بشكل عام، جوا __I18N_INLINE_CODE_0001__ عم يتم تعريف شوية alias (مثل __I18N_INLINE_CODE_0002__)
      . أحيانًا بعندك شغل على سطر الأوامر وبدّك تستخدم alias معيّن بشكل مؤقت فقط،
      ممكن تعمل هيك باستخدام الأمر __I18N_INLINE_CODE_0003__.


      __I18N_CODE_BLOCK_0000__

      '
  tr:
    title: bash’te alias’ı geçici olarak kapatma yöntemi
    description: 'Genellikle __I18N_INLINE_CODE_0001__ içinde bazı alias’lar tanımlanır
      (__I18N_INLINE_CODE_0002__). Komut satırında ise bir alias’ı yalnızca geçici
      olarak kullanmak/atlamak istediğinizde __I18N_INLINE_CODE_0003__ komutunu kullanabilirsiniz.

      '
    excerpt: 'Komut satırında alias’ı geçici olarak kapatmak için __I18N_INLINE_CODE_0003__
      kullanın.

      '
    body: 'Genelde __I18N_INLINE_CODE_0001__ içinde birkaç alias tanımlanır (__I18N_INLINE_CODE_0002__).
      Bazen komut satırında sadece belirli bir alias’ı geçici olarak kullanmak istersiniz;
      bunu __I18N_INLINE_CODE_0003__ komutuyla yapabilirsiniz.


      __I18N_CODE_BLOCK_0000__'
