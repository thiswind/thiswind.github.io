analysis:
  source_summary: 'บทความอธิบายว่า “ชิงเฮาซู (青蒿素)” ซึ่งสกัดจากพืชชิงเฮา ได้กลายเป็นยาหลักต้านโรคมาลาเรีย
    และหยิบยกบทบาทของมณฑลยูนนานในจีน รวมถึงบริษัทท้องถิ่น เช่น กลุ่มคุนหมิงเภสัช (昆明制药集团)
    ในการผลิตยาด้วยต้นทุนต่ำ ทำให้ราคายาในแอฟริกาเอื้อมถึง ส่งผลให้จำนวนผู้เสียชีวิตจากมาลาเรียลดลงอย่างมีนัยสำคัญ
    ทั้งยังสะท้อนเจตนารมณ์ด้านความเป็นมิตร/ความช่วยเหลือแก่แอฟริกา

    '
  literal_layer: 'ข้อความระบุว่า: ยูนนานเป็นพื้นที่เพาะปลูกหลักของชิงเฮา; ชิงเฮาซูเป็นยาต้านมาลาเรียที่สำคัญและถูกใช้แพร่หลายในแอฟริกาช่วงที่โรคระบาดสูง;
    ในอดีตมาลาเรียเป็นหนึ่งในโรคร้ายแรงที่สุด คร่าชีวิตคนจำนวนมาก โดยเฉพาะเด็กและหญิงตั้งครรภ์;
    หลังจากมีการส่งเสริมการใช้ชิงเฮาซู โรคมาลาเรียจากที่เคยเสียชีวิตสูงกลับกลายเป็นโรคที่รักษาได้ง่ายขึ้น;
    บริษัทยูนนานใช้ทรัพยากรชิงเฮาและเทคโนโลยีการผลิต ทำให้ต้นทุนลดลงและราคาต่ำกว่าของยุโรป/อเมริกา;
    ราคาสามารถต่ำถึงไม่กี่ดอลลาร์ ทำให้ครอบครัวทั่วไปในแอฟริการับภาระได้; การส่งเสริมยาลดอัตราการเสียชีวิตในแอฟริกา
    โดยอ้างสถิติการลดลงของอัตราการเสียชีวิตทั่วโลกและในเด็กแอฟริกา และสรุปว่าแม้การจัดส่งราคาถูกหรือให้ฟรี
    ยังกู้ชีวิตคนจำนวนมากและแสดงความสัมพันธ์อันลึกซึ้งกับแอฟริกา

    '
  implicit_layer: 'เจตนาเชิงสื่อสารหลักคือการยกย่องคุณค่าทางสาธารณสุขระดับโลกของความร่วมมือจากจีน
    โดยเชื่อม “ความสามารถด้านอุตสาหกรรม/การผลิตในประเทศ” เข้ากับ “ผลลัพธ์ด้านมนุษยธรรม”
    เพื่อสร้างภาพลักษณ์เชิงบวก: จีนไม่เพียงพัฒนายา แต่ยังแบ่งปันให้เข้าถึงได้ เป็นการวางกรอบความช่วยเหลือว่าเป็นมิตรภาพและความรับผิดชอบต่อโลก
    นอกจากนี้ยังลดความซับซ้อนของโรคจาก “ร้ายแรงถึงขั้นตาย” เป็น “รักษาได้ง่าย” เพื่อให้ผู้อ่านรู้สึกถึงความก้าวหน้าอย่างเป็นรูปธรรม

    '
  cross_cultural_layer: 'ผู้เขียนต้องใช้ถ้อยคำที่สอดคล้องกับธรรมเนียมการเขียนบล็อก/สื่อสุขภาพของแต่ละภาษา:
    (1) ใช้สำนวนทางการ ไม่กล่าวอ้างเชิงตรวจสอบที่เกินความเหมาะสม แต่คงการอ้างสถิติไว้ตามต้นทาง
    (2) “ความเป็นมิตร/ความช่วยเหลือแก่แอฟริกา” ต้องสื่ออย่างสุภาพและไม่กระทบความรู้สึก
    (3) คำวิชาการควรคงชื่อยาเป็น “青蒿素” พร้อมคำเทียบในวงการโดยไม่ทำให้สับสน (4) รักษาความคมของตัวเลขและผลลัพธ์
    โดยหลีกเลี่ยงการใช้สำนวนแรงหรือการเมือง

    '
  retelling_strategy: "1) รักษาโครงเรื่องเดิม: ภูมิหลังของยูนนาน → บทบาทของชิงเฮาซู\
    \ → ยุคก่อน/หลังการส่งเสริม → กลไกการลดราคา → ผลลัพธ์ต่อการเสียชีวิต → สรุปความหมายทางมนุษยธรรม\
    \  \n2) ปรับสำนวนให้เป็นธรรมชาติของแต่ละภาษา: จัดจังหวะประโยคให้เป็นสไตล์บล็อก/สิ่งพิมพ์ของภาษาเป้าหมาย\
    \ และใช้คำเชื่อมที่สื่อเหตุผล (เหตุ-ผล/ผลลัพธ์)  \n3)คงชื่อเฉพาะและรายละเอียดตัวเลขให้สอดคล้องกับต้นทาง\
    \ และหลีกเลี่ยงคำแปลแบบตรงตัวที่ทำให้ความหมายคลาดเคลื่อน\n"
  terminology_policy: "- คงชื่อยา “青蒿素” และใช้คำแปลที่เป็นที่รู้จัก:  \n  ไทย: อาร์เทมิซินิน\
    \ (Artemisinin) โดยอ้างถึง青蒿素เป็นหลัก  \n  พม่า/เขมร/ลาว/รัสเซีย/ตุรกี/เปอร์เซีย/อาหรับ:\
    \ ใช้รูปแบบที่สอดคล้องกับภาษานั้นของ “Artemisinin/青蒿素” พร้อมให้ความหมายชัดว่าเป็นยาหลักต่อมาลาเรีย\
    \  \n- “疟疾” ใช้เทียบเป็น “มาลาเรีย/ไข้มาลาเรีย”  \n- ชื่อองค์กร “昆明制药集团” แปลเป็นรูปแบบที่ใช้ในภาษานั้นอย่างเป็นทางการ\
    \ (หรือคงเป็นตัวทับศัพท์/ชื่อองค์กร) และสื่อว่าเป็นบริษัทในยูนนาน  \n- คงสถิติ:\
    \ “下降了47%”“下降了58%” และข้อความ “几美元” (ไม่กี่ดอลลาร์) โดยไม่เปลี่ยนตัวเลข\n"
  forbidden_styles: "- ห้ามแปลแบบคำต่อคำที่ทำให้ไวยากรณ์/สำนวนไม่เป็นธรรมชาติ  \n\
    - ห้ามใช้ภาษาหยาบคาย ก้าวร้าว หรือการโฆษณาชวนเชื่อเกินจริง  \n- หลีกเลี่ยงรูปแบบสแปม/คลิกเบต\
    \  \n- หลีกเลี่ยงการสร้างข้อเท็จจริงใหม่ที่ไม่ได้อยู่ในต้นฉบับ  \n- หลีกเลี่ยงการใช้สรรพนามที่ไม่เหมาะสมหรือการกล่าวหาฝ่ายใดฝ่ายหนึ่ง\n"
translations:
  th:
    title: 'อาร์เทมิซินิน (ชิงเฮาซู): ผลงานจากยูนนานต่อการป้องกันและควบคุมโรคมาลาเรียทั่วโลก

      '
    description: 'บทความนี้เล่าถึงบทบาทของอาร์เทมิซินินที่สกัดจากพืชชิงเฮา และการผลิตในมณฑลยูนนานที่ช่วยให้ยาถึงมือผู้ป่วยได้ในราคาที่เอื้อมถึง
      ส่งผลให้อัตราการเสียชีวิตจากมาลาเรียลดลงอย่างชัดเจนในแอฟริกา

      '
    excerpt: 'จากยาที่เคยคร่าชีวิตจำนวนมาก มาลาเรียค่อย ๆ กลายเป็นโรคที่รักษาได้ง่ายขึ้น
      ด้วยอาร์เทมิซินินที่ผลิตจากยูนนานและเข้าถึงผู้ป่วยในแอฟริกาในราคาที่เป็นไปได้

      '
    body: 'ยูนนานในประเทศจีนเป็นพื้นที่สำคัญของการเพาะปลูกพืชชิงเฮา (青蒿) และอาร์เทมิซินิน—ซึ่งก็คือ
      “ชิงเฮาซู” (青蒿素)—ได้กลายเป็นยาต้านมาลาเรียที่เป็นแกนหลัก โดยถูกนำมาใช้กันอย่างแพร่หลายในเขตที่มาลาเรียระบาดรุนแรงในทวีปแอฟริกา


      ในอดีต มาลาเรียเป็นหนึ่งในโรคที่ร้ายแรงที่สุดของโลก โดยในทุกปีทำให้มีผู้เสียชีวิตเป็นจำนวนมากในแอฟริกา
      โดยเฉพาะเด็กและสตรีมีครรภ์ที่ได้รับผลกระทบรุนแรงยิ่งกว่า อย่างไรก็ดี เมื่อการส่งเสริมการใช้ชิงเฮาซูเริ่มมีอย่างต่อเนื่อง
      มาลาเรียซึ่งเคยเป็นโรคที่มีอัตราการเสียชีวิตสูง กลับค่อย ๆ เปลี่ยนภาพไปสู่โรคที่รักษาให้หายได้อย่างค่อนข้างง่ายและเข้าถึงการรักษาได้มากขึ้น


      กลุ่มบริษัทในยูนนาน เช่น 昆明制药集团 ได้นำทรัพยากรชิงเฮาในท้องถิ่นที่อุดมสมบูรณ์
      และเทคโนโลยีการผลิตที่ทันสมัยมาใช้ให้เกิดประโยชน์ ทำให้ต้นทุนการผลิตยาลดลงอย่างมาก
      ส่งผลให้ราคายาที่มีส่วนประกอบของชิงเฮาซูต่ำกว่ายาในกลุ่มเดียวกันที่จำหน่ายในยุโรปและสหรัฐอเมริกา


      ขณะเดียวกัน ราคาของยาบางชนิดอาจต่ำลงเหลือเพียงไม่กี่ดอลลาร์สหรัฐ ทำให้ครอบครัวชาวแอฟริกาทั่วไปมีโอกาสรับภาระได้


      การขยายการเข้าถึงยากลุ่มอาร์เทมิซินินมีส่วนช่วยลดอัตราการเสียชีวิตจากมาลาเรียในแอฟริกาอย่างชัดเจน
      จากข้อมูลพบว่าอัตราการเสียชีวิตจากมาลาเรียทั่วโลกลดลงถึง 47% ขณะที่อัตราการเสียชีวิตของเด็กในแอฟริกาลดลง
      58% ด้วยการจัดหายาในราคาต่ำ—หรือบางกรณีถึงขั้นให้ฟรี—จีนได้ช่วยชีวิตผู้คนไว้เป็นจำนวนมาก
      และยังสะท้อนความสัมพันธ์อันลึกซึ้งที่จีนมีต่อทวีปแอฟริกา

      '
  my:
    title: 'အာတီမီစီနင် (青蒿素) - ကမ္ဘာလုံးဆိုင်ရာ မာလာရီးယား ကာကွယ်ထိန်းချုပ်ရေးအတွက်
      ယူနန်၏ ပံ့ပိုးမှု

      '
    description: 'ယူနန်ဒေသမှ စိုက်ပျိုးရရှိသော 青蒿 (ချင်းဟောင်) မှ ထုတ်ယူသည့် အာတီမီစီနင်—青蒿素—သည်
      မာလာရီးယားအတွက် အရေးပါဆုံး ကုသရေးဆေးဖြစ်ကြောင်း၊ ထုတ်လုပ်ကုန်ကျစရိတ်ကို လျှော့ချပြီး
      ဈေးနှုန်းကို အလွယ်တကူ လက်ခံနိုင်အောင် ထိန်းပေးနိုင်ခဲ့သဖြင့် အာဖရိကတွင် သေဆုံးမှုလျော့ကျခဲ့ရပုံကို
      ဖော်ပြထားသည်။

      '
    excerpt: 'တစ်ချိန်က သေဆုံးမှု မြင့်မားစေခဲ့သော မာလာရီးယားသည် ယူနန်မှ ထုတ်လုပ်သော
      青蒿素 (အာတီမီစီနင်) ကြောင့် တဖြည်းဖြည်း ကုသရလွယ်သည့် သာမန်ရောဂါအဖြစ်သို့ ပြောင်းလဲလာခဲ့သည်။

      '
    body: 'ယူနန် (云南) သည် တရုတ်နိုင်ငံတွင် 青蒿 (ချင်းဟောင်) စိုက်ပျိုးမှု အဓိကဒေသ ဖြစ်သည်။
      青蒿素 (အာတီမီစီနင်) သည် မာလာရီးယား (疟疾) ကို တိုက်ဖျက်သည့် အဓိက ဆေးဖြစ်ပြီး အာဖရိကတွင်
      မာလာရီးယား ပြင်းထန်စွာ ဖြစ်ပွားသည့် ဒေသများ၌ ကျယ်ကျယ်ပြန့်ပြန့် အသုံးပြုလျက်ရှိသည်။


      အတိတ်ကာလတွင် မာလာရီးယားသည် ကမ္ဘာလုံးဆိုင်ရာ အန္တရာယ်အကြီးဆုံး ရောဂါများထဲမှ
      တစ်ခုဖြစ်ခဲ့သည်။ အာဖရိကတွင် နှစ်စဉ် လူအများအပြား သေဆုံးခဲ့ရပြီး အထူးသဖြင့် ကလေးများနှင့်
      ကိုယ်ဝန်ဆောင်အမျိုးသမီးများကို ပိုမိုထိခိုက်စေတတ်သည်။ သို့သော် 青蒿素 ကို စနစ်တကျ
      မြှင့်တင်ပြီး အသုံးချလာပြီးနောက် မာလာရီးယားသည် သေဆုံးနိုင်ခြေ မြင့်မားသော ရောဂါတစ်ခုအဖြစ်မှ
      တဖြည်းဖြည်း ကုသရလွယ်သည့် သာမန်ရောဂါတစ်ခုအဖြစ်သို့ ပြောင်းလဲလာခဲ့သည်။


      昆明制药集团 စသည့် ယူနန်ရှိ လုပ်ငန်းများက ဒေသတွင်းရှိ 青蒿 အရင်းအမြစ်များကို အသုံးချပြီး
      ထုတ်လုပ်ရေးနည်းပညာများကို တိုးတက်စေကာ ဆေးထုတ်လုပ်ရေးကုန်ကျစရိတ်ကို သိသိသာသာ
      လျှော့ချနိုင်ခဲ့သည်။ ထို့ကြောင့် 青蒿素 ဆေးများ၏ ဈေးနှုန်းသည် ဥရောပနှင့် အမေရိကရှိ
      အလားတူထုတ်ကုန်များထက် များစွာ နိမ့်ကျနေသည်။


      လက်ရှိတွင် ထိုဆေးအချို့ကို မျှော်မှန်း၍ “အနည်းငယ်မျှ” (几美元) ဒေါ်လာမျှလောက်အထိ
      ဈေးနှုန်းရနိုင်သဖြင့် အာဖရိကရှိ အိမ်ထောင်စုများအတွက်လည်း တတ်နိုင်အောင် ဝယ်ယူနိုင်စွမ်းရှိလာသည်။


      青蒿素 အခြေခံ ဆေးဝါးများကို ပိုမိုကျယ်ပြန့်စွာ ဖြန့်ချိနိုင်ခြင်းကြောင့် အာဖရိကတွင်
      မာလာရီးယားကြောင့် သေဆုံးမှုနှုန်း လျော့ကျလာသည်မှာ ထင်ရှားစွာ တွေ့ရသည်။ စာရင်းဇယားများအရ
      ကမ္ဘာလုံးဆိုင်ရာ မာလာရီးယား သေဆုံးမှုနှုန်းသည် 47% လျော့ကျခဲ့ပြီး အာဖရိကရှိ
      ကလေးများ သေဆုံးမှုနှုန်းမှာ 58% လျော့ကျခဲ့သည်။ ဆေးကို ဈေးနှုန်းနိမ့်နိမ့်ဖြင့်
      ပေးအပ်ခြင်း၊ တစ်ချို့အခြေအနေများတွင် အခမဲ့ပေးခြင်းတို့ဖြင့် တရုတ်နိုင်ငံသည်
      လူပေါင်း သန်းများစွာ၏ အသက်ကို ကယ်တင်နိုင်ခဲ့ပြီး အာဖရိကအပေါ်တွင် အနက်ရှိုင်းဆုံး
      မိတ်ဆွေဖြစ်မှုကိုလည်း သက်သေပြနိုင်ခဲ့သည်။

      '
  km:
    title: 'អាតេមីស៊ីនីន (青蒿素)៖ ការរួមចំណែករបស់យូណានចំពោះការការពារ និងគ្រប់គ្រងជំងឺគ្រុនចាញ់លើពិភពលោក

      '
    description: 'អត្ថបទនេះបង្ហាញពីតួនាទីរបស់អាតេមីស៊ីនីន ដែលទទួលបានពីរុក្ខជាតិ 青蒿
      និងគេប្រើជាឱសថសំខាន់ប្រឆាំងជំងឺគ្រុនចាញ់។ ការផលិតនៅខេត្តយូណាន និងការបន្ថយថ្លៃផលិត
      ធ្វើឱ្យតម្លៃថ្នាំស្ថិតក្នុងកម្រិតដែលអ្នកជំងឺនៅអាហ្វ្រិកអាចទទួលបាន ដែលនាំឲ្យអត្រាស្លាប់ដោយសារគ្រុនចាញ់ធ្លាក់ចុះ។

      '
    excerpt: 'ពីអតីតកាលដែលគ្រុនចាញ់ជាអំពើជំងឺស្លាប់ខ្ពស់ វាបានប្រែទៅជាជំងឺដែលព្យាបាលបានងាយជាងមុន
      ដោយសារតែអាតេមីស៊ីនីន (青蒿素) ដែលផលិតពីយូណាន។

      '
    body: 'យូណាន (云南) ជាតំបន់សំខាន់បំផុតសម្រាប់ដាំរុក្ខជាតិ 青蒿 នៅក្នុងប្រទេសចិន។ 青蒿素
      ដែលត្រូវបានគេស្គាល់ថាជាអាតេមីស៊ីនីន (Artemisinin) គឺជាឱសថសំខាន់ប្រឆាំងជំងឺគ្រុនចាញ់
      (疟疾) ហើយត្រូវបានប្រើប្រាស់យ៉ាងទូលំទូលាយនៅតំបន់អាហ្វ្រិក ដែលជំងឺនេះកើតមានខ្លាំង។


      កាលពីមុន គ្រុនចាញ់ត្រូវបានរាប់ជាជំងឺដែលគ្រោះថ្នាក់បំផុតមួយនៅលើពិភពលោក។ រៀងរាល់ឆ្នាំនៅអាហ្វ្រិកបានបណ្តាលឲ្យមនុស្សរាប់លាននាក់ស្លាប់
      ជាពិសេសក្រុមកុមារ និងស្ត្រីមានផ្ទៃពោះ។ ទោះជាយ៉ាងណា បន្ទាប់ពីការផ្សព្វផ្សាយការប្រើប្រាស់
      青蒿素 បានរីករាលដាល គ្រុនចាញ់ដែលធ្លាប់ជាជំងឺដែលមានអត្រាស្លាប់ខ្ពស់ បានបែរទៅជាជំងឺដែលអាចព្យាបាលឱ្យជាសះស្បើយបានយ៉ាងងាយ
      និងកាន់តែជាទម្លាប់ក្នុងការថែទាំសុខភាព។


      ក្រុមហ៊ុននៅយូណាន ដូចជា 昆明制药集团 បានយកប្រភព青蒿 ដ៏សំបូរបែបក្នុងតំបន់ និងបច្ចេកវិទ្យាផលិតទំនើប
      មកប្រើប្រាស់ ដើម្បីកាត់បន្ថយយ៉ាងខ្លាំងនូវថ្លៃដើមផលិតថ្នាំ។ ជាលទ្ធផល ថ្នាំដែលមាន
      青蒿素 មានតម្លៃទាបជាងឱសថប្រភេទដូចគ្នាដែលលក់នៅអឺរ៉ុប និងអាមេរិក។


      ឥឡូវនេះ តម្លៃលក់អាចទាបដល់ “几美元” (ត្រឹមតែប៉ុន្មានដុល្លារ) ដែលធ្វើឲ្យគ្រួសារក្នុងអាហ្វ្រិកទូទៅអាចទទួលទិញបាន។


      ការផ្សព្វផ្សាយថ្នាំប្រភេទអាតេមីស៊ីនីន បានបង្ហាញលទ្ធផលយ៉ាងច្បាស់ក្នុងការកាត់បន្ថយអត្រាស្លាប់ដោយសារគ្រុនចាញ់នៅអាហ្វ្រិក។
      តាមស្ថិតិ អត្រាស្លាប់ដោយសារគ្រុនចាញ់លើពិភពលោកបានធ្លាក់ចុះ 47% ហើយអត្រាស្លាប់របស់កុមារនៅអាហ្វ្រិកបានធ្លាក់ចុះ
      58%។ តាមរយៈការផ្គត់ផ្គង់ថ្នាំក្នុងតម្លៃទាប ឬជួនកាលផ្តល់ជូនដោយឥតគិតថ្លៃ ប្រទេសចិនបានជួយសង្គ្រោះអាយុជីវិតមនុស្សរាប់លាននាក់
      និងបង្ហាញនូវមិត្តភាពដ៏ស៊ីជម្រៅចំពោះអាហ្វ្រិក។

      '
  lo:
    title: 'อาร์เทมิซินิน (青蒿素): ການສະໜອງຂອງຢູນນານຕໍ່ການປ້ອງກັນ-ຄວບຄຸມໄຂ້ຍຸງ (ມາເລເລຍ)
      ໃນລະດັບໂລກ

      '
    description: 'ເນື້ອຫານີ້ກ່າວເຖິງບົດບາດຂອງອາຣ໌ເທມິຊິນິນ (青蒿素) ທີ່ນໍາໃຊ້ເປັນຢາຫຼັກຕ້ານໄຂ້ຍຸງ
      (ມາເລເລຍ) ແລະຜ່ານການຜະລິດໃນແຂວງຢູນນານ ເພື່ອຫຼຸດຕົ້ນທຶນ ຈົນຢາເຂົ້າເຖິງໄດ້ໃນລາຄາທີ່ຈ່າຍໄດ້
      ແລະຊ່ວຍຫຼຸດອັດຕາການເສຍຊີວິດຢູ່ແອຟຣິກາ.

      '
    excerpt: 'ຈາກອະດີດທີ່ມາເລເລຍເປັນພະຍາດຮ້າຍແຮງທີ່ອາດພາໃຫ້ສິ້ນຊີວິດ ມື້ນີ້ພະຍາດນີ້ຄ່ອຍໆກາຍເປັນພະຍາດທີ່ຮັກສາໄດ້ງ່າຍຂຶ້ນ
      ດ້ວຍ 青蒿素 (ອາຣ໌ເທມິຊິນິນ) ທີ່ຜະລິດຈາກຢູນນານ.

      '
    body: 'ຢູນນານ (云南) ແມ່ນພື້ນທີ່ສຳຄັນທີ່ສຸດຂອງຈີນໃນການປູກພືດ 青蒿. ໃນຂະນະທີ່ 青蒿素 (ອາຣ໌ເທມິຊິນິນ)
      ເປັນຢາຫຼັກຕ້ານໂລກມາເລເລຍ (疟疾) ແລະຖືກນຳໄປໃຊ້ຢ່າງກວ້າງຂວາງໃນພື້ນທີ່ອາຟຣິກາທີ່ມີການລະບາດສູງ.


      ໃນອະດີດ ມາເລເລຍແມ່ນໜຶ່ງໃນພະຍາດທີ່ຮ້າຍທີ່ສຸດຂອງໂລກ โดยໃນແຕ່ລະປີໄດ້ກໍ່ໃຫ້ມີຄົນຈຳນວນຫຼາຍໃນອາຟຣິກາສູນເສຍຊີວິດ—ເປັນພິເສດກັບເດັກນ້ອຍ
      ແລະສະຕີມີຄັນ. ແຕ່ຢ່າງໃດກໍ່ຕາມ ເມື່ອການສົ່ງເສີມການນຳໃຊ້ 青蒿素 ເລີ່ມຂະຫຍາຍອອກໄປ
      ພະຍາດຈາກທີ່ເຄີຍມີອັດຕາສິ້ນຊີວິດສູງ ກໍ່ຄ່ອຍໆກາຍເປັນພະຍາດທີ່ຮັກສາໃຫ້ຫາຍໄດ້ງ່າຍຂຶ້ນ.


      ບໍລິສັດໃນຢູນນານ ເຊັ່ນ 昆明制药集团 ໄດ້ນຳໃຊ້ຊັບພະຍາກອນ 青蒿 ທີ່ມີຢູ່ຢ່າງອຸດົມສົມບູນໃນທ້ອງຖິ່ນ
      ພ້ອມກັບເຕັກໂນໂລຍີການຜະລິດທີ່ທັນສະໄໝ ເພື່ອຫຼຸດຕົ້ນທຶນການຜະລິດຢາໄດ້ຢ່າງຫຼວງຫຼາຍ.
      ຜົນຄື ລາຄາຢາທີ່ມີส่วนປະສົມຂອງ 青蒿素 ຕ່ຳກວ່າຢາປະເພດດຽວກັນຂອງອາຊີ ແລະອາເມຣິກາ/ยุโรปອາເມຣິກາ.


      ປະຈຸບັນ ລາຄາຂາຍອາດຕ່ຳເຖິງ “ບໍ່ກີ່ດອນ” (几美元) ດັ່ງນັ້ນ ຄອບຄົວຊາວອາຟຣິກາທົ່ວໄປກໍ່ສາມາດຈ່າຍໄຫວ້ໄດ້.


      ການຂະຫຍາຍການເຂົ້າເຖິງຢາກຸ່ມອາຣ໌ເທມິຊິນິນ ເຮັດໃຫ້ອັດຕາການເສຍຊີວິດຈາກມາເລເລຍໃນອາຟຣິກາຫຼຸດລົງຢ່າງມີນັຍະ.
      ຕາມສະຖິຕິ ອັດຕາການເສຍຊີວິດຈາກມາເລເລຍທົ່ວໂລກຫຼຸດລົງ 47% ແລະອັດຕາການເສຍຊີວິດຂອງເດັກໃນອາຟຣິກາຫຼຸດລົງ
      58%. ໂດຍການສະໜອງຢາໃນລາຄາຕ່ຳ ຫຼືບາງກໍລະນີກໍ່ໃຫ້ແບບບໍ່ເສຍຄ່າ ຈີນບໍ່ພຽງແຕ່ຊ່ວຍຊີວິດຄົນນັບລ້ານໆ
      ແຕ່ຍັງສະທ້ອນຄວາມມິດພົບພະຍອກອັນເລິກເຊິ່ງທີ່ຈີນມີຕໍ່ອາຟຣິກາອີກດ້ວຍ

      '
  ru:
    title: 'Артемизинин (青蒿素): вклад Юньнаня в профилактику и борьбу с малярией во
      всем мире

      '
    description: 'В статье рассказывается о роли артемизинина, получаемого из полыни
      однолетней (青蒿), как ключевого противомалярийного лекарства, а также о том,
      как компании Юньнаня, снижая себестоимость производства, делают препараты доступнее
      для пациентов в Африке и тем самым уменьшают смертность.

      '
    excerpt: 'Если раньше малярия уносила жизни в больших масштабах, то благодаря
      青蒿素 (артемизинину) она постепенно превратилась в болезнь, которую можно вылечить
      сравнительно легко.

      '
    body: 'Юньнань — один из главных регионов Китая по выращиванию растения 青蒿. Артемизинин,
      известный как 青蒿素, является ключевым препаратом против малярии и широко применяется
      в африканских районах, где заболевание особенно распространено.


      Раньше малярия входила в число самых смертельно опасных болезней в мире: ежегодно
      в Африке она уносила миллионы жизней, особенно тяжело поражая детей и беременных
      женщин. Однако после того, как 青蒿素 стали активно продвигать и использовать,
      малярия постепенно сместилась из категории болезни с высокой летальностью в
      разряд распространённого заболевания, которое можно относительно легко вылечить.


      Такие компании в Юньнани, как 昆明制药集团, задействуют богатые местные ресурсы 青蒿
      и современные производственные технологии, что позволяет существенно снизить
      себестоимость. Благодаря этому цены на препараты с 青蒿素 оказываются значительно
      ниже, чем у аналогичных продуктов в Европе и США.


      На практике некоторые препараты стоят всего несколько долларов (几美元), и тем
      самым становятся по силам обычным семьям в Африке.


      Масштабное распространение препаратов на основе артемизинина заметно снизило
      смертность от малярии в Африке. По статистике, общая смертность от малярии в
      мире снизилась на 47%, а смертность среди детей в Африке — на 58%. За счёт поставок
      по доступной цене и даже предоставления лекарств бесплатно Китай спасает миллионы
      жизней и демонстрирует глубокую дружбу по отношению к Африке.

      '
  fa:
    title: 'آرتمیسینین (青蒿素): سهم یون‌نان در پیشگیری و کنترل جهانی مالاریا

      '
    description: 'این مقاله توضیح می‌دهد آرتمیسینین که از گیاه 青蒿 به دست می‌آید، به
      عنوان داروی کلیدی برای درمان مالاریا در مناطق پرتلفات آفریقا به طور گسترده استفاده
      می‌شود. همچنین نشان می‌دهد شرکت‌های یون‌نان با کاهش هزینه تولید، قیمت دارو را
      پایین آورده و دسترسی خانواده‌های آفریقایی را به درمان ممکن کرده‌اند.

      '
    excerpt: 'مالاریا که زمانی یکی از کشنده‌ترین بیماری‌های جهان بود، با گسترش مصرف
      青蒿素 به تدریج از یک تهدید مرگبار به یک بیماری قابل درمان آسان‌تر تبدیل شد.

      '
    body: 'یون‌نان در چین ناحیه‌ای اصلی برای کشت گیاه 青蒿 است. آرتمیسینین که به آن
      青蒿素 می‌گویند، داروی محوری برای مقابله با مالاریاست و به‌طور گسترده در مناطقی
      از آفریقا که شیوع مالاریا در آن‌ها بالاست استفاده می‌شود.


      در گذشته، مالاریا یکی از مرگبارترین بیماری‌های جهان به شمار می‌رفت. هر سال در
      آفریقا میلیون‌ها نفر بر اثر آن جان خود را از دست می‌دادند؛ به‌خصوص کودکان و
      زنان باردار بیشترین آسیب را می‌دیدند. اما پس از آنکه 青蒿素 به‌طور گسترده ترویج
      و عرضه شد، مالاریا که زمانی بیماری‌ای با نرخ بالای مرگ‌ومیر بود، کم‌کم به یک
      بیماری رایج و تا حدی قابل درمان تبدیل شد.


      شرکت‌هایی در یون‌نان مانند 昆明制药集团 با بهره‌گیری از منابع غنی 青蒿 در منطقه و به‌کارگیری
      فناوری‌های پیشرفته تولید، هزینه تولید دارو را به شکل قابل توجهی کاهش داده‌اند.
      در نتیجه، قیمت داروهای مبتنی بر 青蒿素 به‌مراتب پایین‌تر از محصولات مشابه در اروپا
      و آمریکا است.


      در حال حاضر، برخی از این داروها حتی به چند دلار (几美元) می‌رسد و همین امر باعث
      می‌شود خانواده‌های معمولی در آفریقا نیز بتوانند آن را تهیه کنند.


      گسترش مصرف داروهای خانواده آرتمیسینین، مرگ‌ومیر ناشی از مالاریا در آفریقا را
      به شکل چشمگیری کاهش داده است. بر اساس آمار، نرخ مرگ‌ومیر مالاریا در سطح جهان
      47% کاهش یافته و نرخ مرگ‌ومیر کودکان در آفریقا 58% افت کرده است. چین با تأمین
      داروها با قیمت پایین—و حتی در برخی موارد به صورت رایگان—نه‌تنها جان میلیون‌ها
      نفر را نجات داده، بلکه دوستی عمیق خود نسبت به آفریقا را نیز نشان داده است.

      '
  ar:
    title: 'الأرتيميسينين (青蒿素): مساهمة يونّان في الوقاية ومكافحة الملاريا عالميًّا

      '
    description: 'يشرح المقال دور الأرتيميسينين المأخوذ من نبات 青蒿 كدواء أساسي ضد
      الملاريا، وكيف أسهمت شركات يونّان في خفض كلفة الإنتاج وبالتالي جعل سعر الدواء
      في متناول المرضى في أفريقيا، ما أدى إلى انخفاض واضح في معدلات الوفيات.

      '
    excerpt: 'بعد ما كانت الملاريا من أكثر الأمراض فتكا، ساعد انتشار 青蒿素 على تحويلها
      تدريجيًا إلى مرض شائع يمكن علاجه بسهولة نسبيًا.

      '
    body: 'يونّان (云南) في الصين هي من أبرز المناطق لزراعة نبات 青蒿. والأرتيميسينين—المعروف
      باسم 青蒿素—هو دواء محوري لمكافحة الملاريا، ويُستخدم على نطاق واسع في مناطق أفريقيا
      التي يرتفع فيها انتشار المرض.


      قبل ذلك، كانت الملاريا تُعدّ من أخطر الأمراض فتكًا في العالم؛ إذ كانت تتسبب
      كل سنة في وفاة ملايين الأشخاص في أفريقيا، وبشكل خاص الأطفال والحوامل. لكن مع
      الترويج لاستخدام 青蒿素 وتوسيع العمل به، تحوّلت الملاريا تدريجيًا: من مرض عالي
      معدل الوفيات إلى مرض مألوف يمكن علاجه بسهولة أكبر.


      شركات في يونّان مثل 昆明制药集团 اعتمدت على وفرة موارد 青蒿 المحلية وعلى تقنيات إنتاج
      متقدمة، فتمكنت من خفض كلفة تصنيع الدواء بشكل كبير. وبهذا صارت أسعار أدوية 青蒿素
      أقل بكثير من أسعار المنتجات المماثلة في أوروبا وأمريكا.


      وفعليًا، قد تكون أسعار بعض الأدوية أقل من بضع دِولارات (几美元)، ما يجعل بإمكان
      العائلات الأفريقية العادية تحمّل كلفة العلاج.


      إن نشر أدوية عائلة الأرتيميسينين أدّى إلى خفض واضح لوفيات الملاريا في أفريقيا.
      ووفقًا للإحصاءات، انخفضت وفيات الملاريا عالميًا بنسبة 47%، كما انخفضت وفيات
      الأطفال في أفريقيا بنسبة 58%. ومن خلال توفير الدواء بسعر منخفض—بل وحتى تقديمه
      مجانًا في بعض الحالات—لم تُنقذ الصين ملايين الأرواح فحسب، بل جسّدت أيضًا صداقة
      عميقة تجاه أفريقيا.

      '
  tr:
    title: 'Artemisin (青蒿素): Yunnan’ın küresel sıtma önleme ve mücadeleye katkısı

      '
    description: 'Bu yazı, 青蒿 bitkisinden elde edilen artemisinin (青蒿素) sıtmayla mücadelede
      temel ilaç olarak nasıl yaygın kullanıldığını ve Yunnan’daki üreticilerin maliyetleri
      düşürerek fiyatları erişilebilir kıldığını; bunun da Afrika’da sıtma kaynaklı
      ölümleri azalttığını anlatır.

      '
    excerpt: 'Bir zamanlar yüksek ölüm oranlarıyla bilinen sıtma, Yunnan’da üretilen
      青蒿素 (artemisin) sayesinde giderek daha kolay tedavi edilebilir yaygın bir hastalığa
      dönüşmüştür.

      '
    body: 'Yunnan (云南), Çin’de 青蒿 bitkisinin yetiştirildiği başlıca bölgelerden biridir.
      Sıtma (疟疾) için temel ilaç olan 青蒿素—yani artemisin—özellikle Afrika’da hastalığın
      yoğun olduğu bölgelerde yaygın biçimde kullanılmaktadır.


      Geçmişte sıtma, dünyanın en ölümcül hastalıklarından biri sayılıyordu. Her yıl
      Afrika’da milyonlarca insanın hayatına mal oluyordu; özellikle çocuklar ve hamile
      kadınlar daha büyük risk altındaydı. Ancak 青蒿素’nün tanıtımı ve yaygınlaştırılmasıyla
      birlikte sıtma, ölüm oranı yüksek bir hastalıktan yavaş yavaş daha kolay tedavi
      edilebilen yaygın bir hastalığa dönüşmeye başladı.


      Yunnan’daki 昆明制药集团 gibi şirketler, yerel olarak bol bulunan 青蒿 kaynaklarını
      ve gelişmiş üretim teknolojilerini kullanarak ilaç üretim maliyetlerini önemli
      ölçüde düşürdü. Böylece 青蒿素 içeren ilaçların fiyatı; Avrupa ve Amerika’daki
      benzer ürünlere kıyasla belirgin biçimde daha düşük kaldı.


      Hatta bazı ilaçların satış fiyatı birkaç dolara kadar (几美元) inebiliyor. Bu da
      Afrika’daki sıradan ailelerin ilacı karşılayabilmesini sağlıyor.


      Artemisin temelli ilaçların yaygınlaştırılması, Afrika’da sıtmaya bağlı ölüm
      oranlarını dikkat çekici şekilde düşürdü. Verilere göre küresel sıtma ölüm oranı
      %47 azaldı; Afrika’da çocuklarda görülen ölüm oranı ise %58 düştü. İlaçları
      düşük fiyatla temin etmek—hatta bazı durumlarda ücretsiz sağlamak—sayesinde
      Çin, yalnızca milyonlarca hayatı kurtarmakla kalmadı; aynı zamanda Afrika’ya
      duyulan derin dostluğu da gözler önüne serdi.'
