analysis:
  source_summary: 'บทความเล่าถึงภาพถ่าย “苍蓝点” ที่ยานโวเอเจอร์ 1 ถ่ายในปี 1990 ระหว่างเดินทางออกนอกระบบสุริยะ
    โดยอธิบายตำแหน่งของยาน ระยะห่างจากโลก องค์ประกอบของภาพที่โลกปรากฏเป็นจุดสีน้ำเงินเล็กจิ๋วในแถบแสงที่เป็นภาพหลอนจากแสงสะท้อน
    และเน้นความหมายเชิงปรัชญาจากคำกล่าวของคาร์ล ซาแกน ว่า “จุดนั้นคือที่ที่เราอยู่”
    และรวมชีวิตมนุษย์ทั้งหมดไว้ในเสี้ยวฝุ่นบนแสงแดดเดียวกัน

    '
  literal_layer: 'มีการระบุวันเวลา (14 ก.พ. 1990) และสถานการณ์ (ยานโวเอเจอร์ 1 หลังทำภารกิจเสร็จ
    กำลังออกจากระบบสุริยะ อยู่ไกลกว่าระยะวงโคจรเนปจูน ประมาณ 6 พันล้านกิโลเมตรจากโลก)
    จากข้อเสนอของคาร์ล ซาแกน ยานจึงหันกล้องถ่ายชุด “ภาพเหมือนครอบครัว” รวมถึงภาพ “苍蓝点”
    ในภาพ โลกเป็นจุดสีน้ำเงินในแถบแสง แถบแสงเกิดจากภาพหลอนในกล้องจากการสะท้อนของแสง
    และโลกในภาพมีขนาดแค่ 0.12 พิกเซล

    '
  implicit_layer: 'ใต้ชั้นอธิบายเชิงวิทยาศาสตร์มีเจตนาเชิงอารมณ์และศีลธรรม: ลดความสำคัญของความแตกต่างทางศาสนา
    อุดมการณ์ เศรษฐกิจ ชนชั้น และบทบาทของมนุษย์ให้เหลือ “ความเป็นมนุษย์ทั้งหมด” ที่อาศัยอยู่บนโลกเดียวกัน
    พร้อมชวนให้ผู้อ่านรู้สึกถ่อมตนและตระหนักถึงความเปราะบางของบ้านเราในจักรวาลอันกว้างใหญ่

    '
  cross_cultural_layer: 'บทความอ้างคำพูดของบุคคล (Carl Sagan) ซึ่งในบริบทภาษาเป้าหมายควรคงไว้ด้วยสำนวนทางวรรณกรรม/สารคดีที่สุภาพและเป็นทางการ
    โดยรักษาน้ำเสียงครุ่นคิด ชวนสะเทือนใจ และหลีกเลี่ยงการใช้ถ้อยคำหยาบหรือความเชื่อเฉพาะท้องถิ่นเกินจำเป็น
    เนื่องจากสาระเป็นสากลทางวิทยาศาสตร์และจริยธรรม

    '
  retelling_strategy: '- รักษาโครงเรื่อง: เหตุการณ์/ระยะทาง/ที่มาของการถ่ายภาพ → คำอธิบายภาพเชิงเทคนิค
    → คำพูดของซาแกนที่สรุปความหมาย

    - แปลงสำนวนให้เป็นธรรมชาติในแต่ละภาษา โดยคงตัวเลข หน่วย และชื่อเฉพาะ (Voyager
    1, Carl Sagan) ให้ตรงความหมาย

    - คงวงเล็บและหน่วยตามต้นฉบับ (เช่น “约60亿公里”, “40倍”, “0.12个像素”) ให้ชัดเจนและอ่านง่ายตามรูปแบบภาษาปลายทาง

    - คง Markdown placeholder ที่มีในต้นฉบับให้ไม่เปลี่ยนแปลง

    '
  terminology_policy: '- “苍蓝点” สื่อเป็นชื่อภาพ: เลือกเทียบความหมายในภาษาเป้าหมายให้สอดคล้อง
    (มักเป็น “ดวงจุดสีน้ำเงินซีด/ฟ้าอมคราม” หรือ “จุดสีน้ำเงินคราม”) พร้อมคงแนวคิด
    “Earth as a tiny blue dot”

    - คงชื่อยานและบุคคล: “旅行者1号” → Voyager 1; “卡尔·萨根” → Carl Sagan

    - คงความหมายคำว่า “家庭肖像” เป็น “ภาพเหมือนครอบครัว/Family Portrait”

    - คงอัตราส่วน/จำนวนพิกเซลและคำอธิบาย “伪像/ภาพหลอน” ในเชิงกล้องให้ถูกต้องทางเทคนิค

    '
  forbidden_styles: '- ห้ามแปลแบบคำต่อคำที่ทำให้สำนวนแข็งหรือเสียอารมณ์

    - ห้ามใช้ภาษาเชิงโฆษณา/สรรเสริญเกินจริงที่ไม่สอดคล้องกับโทนสารคดี

    - หลีกเลี่ยงรูปแบบกึ่งนิยายหรือแฟนตาซีเกินความจำเป็น

    - ห้ามเปลี่ยนหรือทำให้ placeholder เสียรูปแบบ (ต้องคง “__I18N_IMAGE_0000__” ไว้เหมือนเดิม)

    '
translations:
  th:
    title: null
    description: 'ภาพ “จุดสีน้ำเงินซีด” ที่ยาน Voyager 1 หันกลับมายิ้งถ่ายจากไกลโพ้นในปี
      1990 และคำสะท้อนอันลึกซึ้งของคาร์ล ซาแกนที่เตือนใจว่า “จุดนั้นคือที่อยู่ของเรา”

      '
    excerpt: 'เมื่อโลกปรากฏเพียงจุดสีน้ำเงินเล็กจิ๋วท่ามกลางแสงหลอนในเลนส์กล้อง ภาพเดียวกลับสรุปความหมายของความเป็นมนุษย์ทั้งมวลบน
      “บ้าน” ของเราได้อย่างทรงพลัง

      '
    body: "__I18N_IMAGE_0000__\n\nวันที่ 14 กุมภาพันธ์ 1990 ยานสำรวจอวกาศวอยาเจอร์\
      \ 1 ได้เสร็จสิ้นภารกิจการสำรวจแล้ว และกำลังเคลื่อนออกจากระบบสุริยะ โดยอยู่เลยวงโคจรของดาวเนปจูน\
      \ ระยะห่างจากโลกประมาณ 6,000 ล้านกิโลเมตร (ราว 40 เท่าของระยะเฉลี่ยจากโลกถึงดวงอาทิตย์)\
      \  \n\nด้วยข้อเสนอของคาร์ล ซาแกน ยานจึงได้รับคำสั่งให้หันกลับ เพื่อถ่ายภาพชุด\
      \ “ภาพเหมือนครอบครัว” (Family Portrait) ซึ่งรวมถึงภาพอันโด่งดังที่ชื่อ “จุดสีน้ำเงินซีด”\
      \ (Pale Blue Dot)  \n\nในภาพนั้น โลกปรากฏเป็นจุดสีน้ำเงินจิ๋วท่ามกลางแถบของแสงอาทิตย์\
      \ โดยแถบแสงเหล่านี้เป็นภาพหลอนที่เกิดขึ้นภายในกล้อง เนื่องจากแสงสะท้อน แถมในภาพนี้\
      \ โลกใช้พื้นที่เพียง 0.12 พิกเซลเท่านั้น—เป็นหลักฐานว่า “ดาวเคราะห์บ้านเกิด”\
      \ ของเรามีขนาดเล็กเพียงใดเมื่อเทียบกับความกว้างใหญ่ไพศาลของจักรวาล  \n\n“ลองมองดูจุดนั้นสิ\
      \ นั่นคือที่ที่เราอยู่ นั่นคือบ้านของเรา นั่นคือเรา ณ จุดนั้น ทุกคนที่คุณรัก\
      \ ทุกคนที่คุณรู้จัก ทุกคนที่คุณเคยได้ยินชื่อ ทุกคนที่เคยมีชีวิตอยู่ในความเป็นมนุษย์—ต่างใช้ช่วงชีวิตของตนอยู่ที่นั่น\
      \ รวมทั้งความสุขและความทุกข์ของพวกเขาด้วย เรารวมศาสนาที่มั่นใจนับพันลัทธิ ความคิดทางอุดมการณ์\
      \ และแนวทางทางเศรษฐศาสตร์ไม่รู้จบ ตลอดจนทั้งผู้ล่าและผู้เก็บหา ทุกคนคือวีรบุรุษและผู้ขลาดเขลา\
      \ ผู้สร้างอารยธรรมและผู้ทำลายมัน ทั้งกษัตริย์และชาวนา คู่รักหนุ่มสาวทุกคู่ เด็กที่ยังมีความหวัง\
      \ พ่อและแม่ทุกคน นักประดิษฐ์และนักสำรวจทุกคน ครูผู้สอนคุณธรรม—และนักการเมืองที่ทุจริตทุกคน\
      \ รวมถึง ‘ซูเปอร์สตาร์’ และ ‘ผู้นำสูงสุด’ ทุกคนในประวัติศาสตร์มนุษยชาติ ไม่ว่าจะเป็นนักบุญหรือคนบาป\
      \ ต่างใช้ชีวิตอยู่บนฝุ่นละอองผงจิ๋วที่ปะปนอยู่ในลำแสงอาทิตย์” — คาร์ล ซาแกน\n"
  my:
    title: null
    description: '၁၉၉၀ ခုနှစ်တွင် Voyager 1 က အဝေးကွင်းမှ ပြန်လှည့်ရိုက်ယူခဲ့သည့်
      “အပြာရောင်အပြာစက်” ပုံရိပ်နှင့် Carl Sagan ၏ စဉ်းစားစရာ စကားများ— “အဲဒီစက်က
      ကျွန်တော်တို့ရဲ့နေရာ” ဟု သတိပေးသည်။

      '
    excerpt: 'ကင်မရာအတွင်းမှ အလင်းပြန်ရောင်ကြောင့် ဖြစ်ပေါ်လာသည့် အလင်းပြန်ဖန်တီးမှုအတွင်းမှာ
      ကမ္ဘာမြေက အပြာရောင်စက်သေးသေးလေးတစ်ခုသာ ဖြစ်နေသော်လည်း လူသားအားလုံး၏ အဓိပ္ပါယ်ကို
      တစ်ပုံတည်းဖြင့် ထင်ရှားစေသည်။

      '
    body: "__I18N_IMAGE_0000__\n\n၁၉၉၀ ခုနှစ် ဖေဖော်ဝါရီလ ၁၄ ရက်နေ့တွင် Voyager 1\
      \ အာကာသယာဉ်သည် စူးစမ်းလေ့လာရေးလုပ်ငန်းများကို ပြီးဆုံးပြီးနောက် နေခြည်စနစ်အပြင်သို့\
      \ ထွက်ခွာနေသည်။ ၎င်းသည် နက်ပကျွန် (Neptune) ၏ ဂြိုဟ်တန်းလမ်းကြောင်းအပြင်ဘက်တွင်\
      \ တည်ရှိပြီး ကမ္ဘာမြေနှင့် အကြမ်းဖျဉ်းအားဖြင့် ကီလိုမီတာ ၆ ဘီလီယံခန့် (ကမ္ဘာမှ\
      \ နေသို့ ပျမ်းမျှအကွာအဝေး၏ ၄၀ ဆခန့်) အကွာအဝေးရှိသည်။  \n\nကာလ် ဆာဂန် (Carl Sagan)\
      \ ၏ အကြံပြုချက်အရ ယာဉ်ကို ပြန်လှည့်စေပြီး “မိသားစုပုံတူ” (Family Portraits)\
      \ ဟုခေါ်သည့် ဓာတ်ပုံစီးရီးများကို ရိုက်ယူခဲ့သည်။ ထိုထဲတွင် “အပြာရောင်အပြာစက်”\
      \ ဟု အမည်ရသည့် နာမည်ကြီးဓာတ်ပုံလည်း ပါဝင်သည်။  \n\nဓာတ်ပုံထဲတွင် ကမ္ဘာမြေသည်\
      \ နေသုံးအလင်းတန်းများအတွင်း မျှော်လင့်မရလောက်အောင် သေးငယ်သည့် အပြာရောင်စက်တစ်ခုအဖြစ်\
      \ မြင်ရသည်။ ထိုအလင်းတန်းများမှာ ကင်မရာအတွင်းရှိ နေ၏အလင်းပြန်ရောင်ကြောင့် ဖြစ်ပေါ်လာသော\
      \ အတုအယောင် (အမြင်အာရုံဖြစ်ရပ်) များဖြစ်သည်။ အဆိုပါပုံထဲတွင် ကမ္ဘာမြေသည် 0.12\
      \ ပစ်ဇယ်မျှသာ အကျယ်အဝန်းယူထားပြီး ကျွန်တော်တို့၏ကမ္ဘာဂြိုဟ်သည် အာကာသကြီးထဲတွင်\
      \ မည်မျှ သေးလွန်းသည်ကို သက်သေပြနေသည်။  \n\n“အဲဒီစက်ကို ပြန်ကြည့်ပါ။ အဲဒီစက်က\
      \ ကျွန်တော်တို့ရဲ့နေရာပါ။ အဲဒီစက်က ကျွန်တော်တို့ရဲ့အိမ်ပါ။ အဲဒီစက်က ကျွန်တော်တို့ပဲ\
      \ ဖြစ်တယ်။ အဲဒီစက်ပေါ်မှာပဲ သင်ချစ်တဲ့လူတိုင်း၊ သင်သိတဲ့လူတိုင်း၊ သင်ကြားဖူးတဲ့လူတိုင်း၊\
      \ တစ်ခါတစ်ရံက ရှိခဲ့ဖူးတဲ့ လူသားတိုင်းသည် သူတို့၏ဘဝတစ်ခုလုံးကို ဖြတ်သန်းခဲ့ကြသည်။\
      \ သာယာမှုနဲ့ ဆင်းရဲဒုက္ခအားလုံး၏ ပေါင်းစုဟာ အဲဒီတစ်ချက်တည်းမှာ တည်ရှိနေသည်။\
      \ ကိုယ်ယုံကြည်မှုအပြည့်နဲ့ သောင်းနှင့်ချီတဲ့ ဘာသာတရားများ၊ အတွေးအခေါ်မူဝါဒများ၊\
      \ စီးပွားရေးအယူအဆများ—ရှုတင်မှုကြည့်မရအောင် များလှတဲ့အရာတွေပါပဲ။ အမဲလိုက်သူတိုင်းနဲ့\
      \ အစုလိုက်စုဆောင်းသူတိုင်း၊ သူရဲကောင်းတိုင်းနဲ့ ချောက်ချားသူတိုင်း၊ အာယာမ်အမြဲဖန်တီးသူတိုင်းနဲ့\
      \ ဖျက်ဆီးသူတိုင်း၊ ဘုရင်တိုင်းနဲ့ လယ်သမားတိုင်း၊ ချစ်ခြင်းမေတ္တာနဲ့ ငယ်ရွယ်စုံတွဲတိုင်း၊\
      \ မျှော်လင့်ချက်ပြည့်တဲ့ ကလေးတိုင်း၊ ဖခင်နဲ့ မိခင်တိုင်း၊ တီထွင်သူနဲ့ စူးစမ်းရှာဖွေသူတိုင်း၊\
      \ ကောင်းမှုသင်ကြားပေးသူတိုင်း—ပေါက်ကွဲလာတဲ့ အကျင့်ပျက် အရာရှိတွေကိုတောင် အကုန်လုံးပါဝင်နေတယ်။\
      \ ‘စူပါစတား’ လို့ခေါ်တဲ့သူတွေ၊ ‘အမြင့်ဆုံးခေါင်းဆောင်’ လို့ခေါ်တဲ့သူတွေ၊ လူသားသမိုင်းမှာရှိခဲ့ဖူးတဲ့\
      \ သူတော်စင်တွေမှသည် အပြစ်သားတွေ အထိအားလုံး… နေထဲက အလင်းမှုန်မှုန်တွေထဲက ဖုန်မှုန်တစ်စအဖြစ်\
      \ တည်ရှိတဲ့ အဲဒီအဏုလေးတစ်ခုပေါ်မှာပဲ သူတို့ဘဝကို နေထိုင်ခဲ့ကြသည်။” — Carl Sagan\n"
  km:
    title: null
    description: 'រូបថត “ចំណុចខៀវស្រងាត់” ដែលយាន Voyager 1 បានត្រឡប់មកថតពីចម្ងាយដ៏ខ្លាំងក្លាក្នុងឆ្នាំ
      ១៩៩០ និងសេចក្តីចងចាំស៊ីជម្រៅរបស់ Carl Sagan ដែលប្រាប់ថា “ចំណុចនោះជាទីដែលយើងរស់នៅ”។

      '
    excerpt: 'ពេលដែលផែនដីលេចចេញត្រឹមតែជាចំណុចខៀវតូចបំផុតក្នុងចំណោមស្នាមឆ្លុះពន្លឺក្នុងកាមេរ៉ា
      រូបមួយនេះបង្ហាញអត្ថន័យនៃមនុស្សជាតិទាំងមូលបានយ៉ាងមានអំណាច។

      '
    body: "__I18N_IMAGE_0000__\n\nនៅថ្ងៃទី ១៤ ខែកុម្ភៈ ឆ្នាំ ១៩៩០ យានអវកាស Voyager\
      \ 1 បន្ទាប់ពីបំពេញបេសកកម្មស្វែងរករួចហើយ កំពុងចាកចេញពីប្រព័ន្ធព្រះអាទិត្យ។ វាស្ថិតនៅខាងក្រៅគន្លងផែនដីរបស់ភព\
      \ Neptune ហើយមានចម្ងាយប្រហែល ៦ពាន់លានគីឡូម៉ែត្រ ពីផែនដី (ប្រហែល ៤០ ដងនៃចម្ងាយជាមធ្យមពីផែនដីទៅព្រះអាទិត្យ)។\
      \  \n\nតាមសំណើរបស់ Carl Sagan យាននេះត្រូវបានបញ្ជាឲ្យបង្វែរទិស ដើម្បីថតរូប “រូបភាពគ្រួសារ”\
      \ (Family Portraits) ដែលមានរួមទាំងរូបដ៏ល្បីល្បាញមួយនេះឈ្មោះ “ចំណុចខៀវស្រងាត់”។\
      \  \n\nនៅក្នុងរូបថត ផែនដីបង្ហាញខ្លួនជាចំណុចខៀវតូចមួយនៅក្នុងខ្សែបន្ទាត់ពន្លឺព្រះអាទិត្យ។\
      \ ខ្សែបន្ទាត់ពន្លឺទាំងនោះជាទីសម្គាល់ក្លែងក្លាយដែលកើតឡើងក្នុងកាមេរ៉ា ដោយសារការឆ្លុះពន្លឺ។\
      \ នៅក្នុងរូបនេះ ផែនដីមានទំហំត្រឹមតែ ០.១២ ភីកសែលប៉ុណ្ណោះ—បង្ហាញឲ្យយល់ថា ភពផ្ទះរបស់យើងនៅក្នុងចន្លោះដ៏ធំធេងនៃសកលលោក\
      \ តូចប៉ុន្មានប៉ុណ្ណា។  \n\n“សូមមើលចំណុចនោះម្តងទៀត។ វាជាទីដែលយើងរស់នៅ។ វាជាផ្ទះរបស់យើង។\
      \ វាជាពួកយើង។ នៅលើចំណុចនោះ មនុស្សគ្រប់រូបដែលអ្នកស្រលាញ់ មនុស្សគ្រប់រូបដែលអ្នកស្គាល់\
      \ មនុស្សគ្រប់រូបដែលអ្នកធ្លាប់បានឮឈ្មោះ—មនុស្សជាតិទាំងអស់ដែលធ្លាប់មានជីវិត—សុទ្ធតែបានចំណាយពេញមួយជីវិតរបស់ពួកគេនៅទីនោះ។\
      \ ការរួមបញ្ចូលនៃសេចក្តីរីករាយ និងទុក្ខវេទនា រួមជាមួយនឹងសាសនាជាច្រើនរាប់ពាន់ដែលមានជំនឿរឹងមាំ\
      \ អោយកើតឡើងនូវគំនិតខាងនយោបាយ និងទ្រឹស្តីសេដ្ឋកិច្ចជាច្រើនគំនិតរាប់មិនអស់។ អ្នកប្រមាញ់\
      \ និងអ្នកប្រមូលផ្ដុំអាហារ ទាំងអស់; វីរបុរស និងអ្នកខ្លាច ទាំងអស់; អ្នកបង្កើតអរិយធម៌\
      \ និងអ្នកបំផ្លាញអរិយធម៌ ទាំងអស់; ស្តេច និងកសិករ ទាំងអស់; គូស្នេហ៍វ័យក្មេងដែលស្រលាញ់គ្នា\
      \ គ្រប់គូ; កុមារដែលពោរពេញដោយសង្ឃឹម; ឪពុក និងម្តាយ; អ្នកបង្កើតគំនិតថ្មី និងអ្នករុករក;\
      \ គ្រូបង្រៀនផ្នែកសីលធម៌; និងអ្នកនយោបាយកំព្រា ដែលពុករលួយ; ទាំង “ស៊ូពើរីស្តារ”\
      \ និង “មេដឹកនាំជាន់ខ្ពស់” ទាំងអស់—អ្នកដែលជា សន្ត និងអ្នកដែលជា បាប នៅក្នុងប្រវត្តិសាស្ត្រមនុស្សជាតិ\
      \ គ្រប់រូបបានរស់នៅលើធូលីអណ្តែតតូចៗមួយចំនួន ដែលជ្រាបនៅក្នុងពន្លឺព្រះអាទិត្យ។\
      \ ” — Carl Sagan\n"
  lo:
    title: null
    description: 'ภาพ “จุดสีน้ำเงินซีด” ที่ยาน Voyager 1 ถอยกลับมาถ่ายจากระยะไกลมหาศาลในปี
      1990 พร้อมคำสะท้อนอันลึกซึ้งของ Carl Sagan ที่ย้ำว่า “จุดนั้นคือที่ที่เราอยู่”

      '
    excerpt: 'เมื่อโลกปรากฏเพียงจุดสีน้ำเงินเล็กจิ๋วท่ามกลางแถบแสงที่เป็นภาพหลอนจากกล้อง
      ภาพเดียวกลับสรุปเรื่องราวของมนุษยชาติได้อย่างทรงพลัง

      '
    body: "__I18N_IMAGE_0000__\n\nวันที่ 14 กุมภาพันธ์ 1990 ยานอวกาศวอยาเจอร์ 1 (Voyager\
      \ 1) ได้ออกห่างจากระบบสุริยะ หลังจากทำภารกิจสำรวจเสร็จสิ้นแล้ว โดยอยู่เลยวงโคจรของดาวเนปจูน\
      \ และห่างจากโลกประมาณ 6,000 ล้านกิโลเมตร (ราว 40 เท่าของระยะเฉลี่ยจากโลกถึงดวงอาทิตย์)\
      \  \n\nตามข้อเสนอของ Carl Sagan ยานจึงได้รับคำสั่งให้หันกลับ และถ่ายภาพชุด “ภาพเหมือนครอบครัว”\
      \ (Family Portraits) ซึ่งรวมถึงภาพที่โด่งดังที่สุดภาพหนึ่งที่มีชื่อว่า “จุดสีน้ำเงินซีด”\
      \  \n\nในภาพ โลกปรากฏเป็นจุดสีน้ำเงินเล็กจิ๋วท่ามกลางแถบของแสงอาทิตย์ ส่วนแถบแสงเหล่านี้เป็น\
      \ “ภาพหลอน” ที่เกิดขึ้นภายในตัวกล้อง เนื่องจากแสงจากดวงอาทิตย์สะท้อนเข้ามา ในภาพนี้\
      \ โลกมีขนาดเพียง 0.12 พิกเซลเท่านั้น—แสดงให้เห็นว่าโลกของเรามีขนาดเล็กเพียงใดในความว่างอันกว้างใหญ่ของจักรวาล\
      \  \n\n“ลองมองดูจุดนั้นสิ นั่นคือที่ที่เราอยู่ นั่นคือบ้านของเรา นั่นคือพวกเรา\
      \ บนจุดนั้นเองคือทุกคนที่คุณรัก ทุกคนที่คุณรู้จัก ทุกคนที่คุณเคยได้ยินชื่อ และทุกคนที่เคยมีชีวิตอยู่ในความเป็นมนุษย์—ต่างใช้เวลาชีวิตทั้งหมดของตนอยู่ที่นั่น\
      \ ความสุขและความทุกข์รวมกันของมนุษย์นับไม่ถ้วน ศาสนาที่มั่นใจอย่างยิ่งหลายพันนิกาย\
      \ อุดมการณ์และทฤษฎีทางเศรษฐศาสตร์นับไม่ถ้วน คนล่าและคนเก็บหา วีรบุรุษและคนขลาดเขลา\
      \ ผู้สร้างอารยธรรมและผู้ทำลายอารยธรรม กษัตริย์และชาวนา คู่หนุ่มสาวที่รักกันอย่างลึกซึ้ง\
      \ เด็กที่ยังเปี่ยมด้วยความหวัง พ่อและแม่ทุกคน นักประดิษฐ์และนักสำรวจทุกคน ครูผู้สอนคุณธรรม—และนักการเมืองผู้ฉ้อฉล\
      \ อีกทั้ง ‘ซูเปอร์สตาร์’ ทุกคน และ ‘ผู้นำสูงสุด’ ทุกคนในประวัติศาสตร์มนุษยชาติ\
      \ ไม่ว่าผู้เป็นนักบุญหรือผู้เป็นคนบาป ล้วนใช้ชีวิตอยู่บนเศษฝุ่นละอองเล็กจิ๋วที่ลอยอยู่ในแสงอาทิตย์”\
      \ — Carl Sagan\n"
  ru:
    title: null
    description: 'Фотография «Бледно-голубая точка», сделанная Voyager 1 в 1990 году
      с огромного расстояния, и пронзительные слова Карла Сагана о том, что «вот где
      мы живём».

      '
    excerpt: 'Когда Земля на снимке выглядит всего лишь крошечной синей точкой среди
      бликов внутри объектива, один кадр неожиданно собирает смысл всей человеческой
      истории.

      '
    body: "__I18N_IMAGE_0000__\n\n14 февраля 1990 года после завершения исследовательской\
      \ миссии космический аппарат Voyager 1 покидал Солнечную систему. Он находился\
      \ за орбитой Нептуна и был примерно в 6 млрд километров от Земли (то есть примерно\
      \ в 40 раз дальше, чем среднее расстояние от Земли до Солнца).  \n\nПо предложению\
      \ Карла Сагана аппарату дали команду развернуться, чтобы запечатлеть серию снимков\
      \ «семейного портрета» — в том числе ставшую знаменитой фотографию «Бледно-голубая\
      \ точка».  \n\nНа снимке Земля выглядит как маленькая голубая точка в полосе\
      \ солнечного света. Эти полосы — оптические артефакты, своего рода «призраки»,\
      \ возникающие внутри камеры из‑за отражений солнечного света. В этой фотографии\
      \ Земля занимает всего 0.12 пикселя — наглядное подтверждение того, насколько\
      \ мала наша планета в необъятности космоса.  \n\n«Посмотрите на эту точку ещё\
      \ раз. Это то место, где мы живём. Это наш дом. Это — мы. На этой точке каждый\
      \ человек, которого вы любите, каждый человек, которого вы знаете, каждый человек,\
      \ о котором вы слышали, каждый человек, который был когда-либо живым человеком,\
      \ — все они прожили свою жизнь там. Сумма нашей радости и наших страданий, тысячи\
      \ уверенных в себе религий, идеологий и экономических учений, каждый охотник\
      \ и каждый собиратель, каждый герой и каждый трус, каждый создатель и каждый\
      \ разрушитель цивилизаций, каждый король и каждый крестьянин, каждая молодая\
      \ влюблённая пара, каждый ребёнок, полный надежды, каждый отец и каждая мать,\
      \ каждый изобретатель и каждый исследователь, каждый учитель морали, каждый\
      \ коррумпированный политик, каждый “суперзвезда”, каждый “высший лидер” — все\
      \ святые и все грешники в истории нашего вида — живут на этой пылинке, рассеянной\
      \ в лучах солнца». — Карл Сагана\n"
  fa:
    title: null
    description: 'عکسی از «نقطهٔ آبیِ کم‌رنگ» که در سال ۱۹۹۰ توسط فضاپیمای Voyager
      1 از فاصله‌ای بسیار دور گرفته شد و سخنانی تأمل‌برانگیز از کارل ساگان که یادآور
      می‌شود: «آن نقطه، جای ماست».

      '
    excerpt: 'وقتی زمین در تصویر تنها به صورت یک نقطهٔ آبیِ بسیار کوچک میان انعکاس‌های
      داخل دوربین دیده می‌شود، یک قاب می‌تواند معنای کلّ تاریخ انسان را به شکلی تکان‌دهنده
      فشرده کند.

      '
    body: "__I18N_IMAGE_0000__\n\nدر ۱۴ فوریهٔ ۱۹۹۰، فضاپیمای Voyager 1 پس از انجام\
      \ مأموریت اکتشافی، در حال خروج از منظومهٔ شمسی بود. این فضاپیما خارج از مدار\
      \ نپتون قرار داشت و فاصلهٔ آن از زمین حدود ۶ میلیارد کیلومتر بود (حدود ۴۰ برابرِ\
      \ فاصلهٔ متوسط زمین تا خورشید).  \n\nبه پیشنهادِ کارل ساگان، دستور داده شد فضاپیما\
      \ برگردد و مجموعه‌ای از عکس‌ها با عنوان «پورتِرِهٔ خانوادگی» (Family Portraits)\
      \ ثبت کند؛ از جمله همین عکس مشهور با نام «نقطهٔ آبیِ کم‌رنگ».  \n\nدر این عکس،\
      \ زمین به صورت نقطهٔ کوچکی از نور آبی در میان نوارهایی از نور خورشید دیده می‌شود.\
      \ این نوارهای نور، توهّم‌هایی هستند که داخل خودِ دوربین به‌وجود می‌آیند؛ زیرا\
      \ نور خورشید در اثر بازتاب، چنین اثراتی را ایجاد می‌کند. در این تصویر، زمین\
      \ تنها ۰.۱۲ پیکسل را اشغال می‌کند—چرا که می‌خواهد نشان دهد سیارهٔ خانهٔ ما در\
      \ پهنهٔ بی‌کرانِ فضا چقدر کوچک است.  \n\n«به آن نقطه دوباره نگاه کنید. آن، جای\
      \ ماست. آن، خانهٔ ماست. آن، خودِ ماست. روی همان نقطه، هر کسی که دوستش دارید،\
      \ هر کسی که می‌شناسید، هر کسی که درباره‌اش شنیده‌اید، هر کسی که زمانی “انسان”\
      \ بوده است—همهٔ آن‌ها تمام زندگی‌شان را همان‌جا گذرانده‌اند. جمعِ شادی‌ها و\
      \ رنج‌های ما؛ هزاران دینِ مطمئن از خود، و ده‌ها ایدئولوژی و آموزهٔ اقتصادی؛\
      \ هر شکارچی و هر گردآورنده؛ هر قهرمان و هر بزدل؛ هر سازندهٔ تمدن و هر ویرانگرِ\
      \ آن؛ هر پادشاه و هر کشاورز؛ هر زوجِ جوانِ عاشق؛ هر کودکی که هنوز امید دارد؛\
      \ هر پدر و هر مادر؛ هر مخترع و هر کاوشگر؛ هر آموزگارِ اخلاق؛ هر سیاست‌مدارِ\
      \ فاسد؛ هر “سوپرستاره” و هر “رهبرِ عالی‌رتبه”. همهٔ قدّیسان و همهٔ گناهکاران\
      \ در تاریخ گونهٔ ما، همگی روی همان ذرهٔ غباری زندگی می‌کنند که در پرتوِ گردِ\
      \ آفتاب پخش شده است.» — کارل ساگان\n"
  ar:
    title: null
    description: 'صورة “النقطة الزرقاء الباهتة” التي التقطتها فوييجر 1 سنة 1990 من
      مسافة بعيدة جدًا، ومعها كلام كارل ساغان اللي بيردّنا بوعي: “هالنقطة هي مكاننا”.

      '
    excerpt: 'لما الأرض بتبان بس كنقطة زرقة صغيرة جدًا بين انعكاسات/أثرات الضوء داخل
      العدسة، بتصير لقطة وحدة كأنها بتجمع معنى تاريخ البشرية كلّه.

      '
    body: "__I18N_IMAGE_0000__\n\nفي 14 شباط 1990، وبعد ما خلصت سفينة فوييجر 1 (Voyager\
      \ 1) مهمّة الاستكشاف، كانت عم تبتعد عن النظام الشمسي. كانت واقعة خارج مدار نبتون،\
      \ وعلى بُعد حوالي 6 مليارات كيلومتر عن الأرض (يعني تقريبًا 40 ضعف متوسط المسافة\
      \ بين الأرض والشمس).  \n\nوباقتراح من كارل ساغان (Carl Sagan)، اتّاخذت أوامر\
      \ للسفينة إنّها تعكس اتجاهها وتلتقط سلسلة صور تُعرف باسم “بورتريه العائلة” (Family\
      \ Portraits)، ومن ضمنها الصورة الأشهر المعروفة باسم “النقطة الزرقاء الباهتة”.\
      \  \n\nبالصورة، بتبين الأرض كنقطة زرقاء صغيرة داخل شرائط ضوء الشمس. هالشرائط\
      \ هي “أثرات”/تشوّهات بصرية بتطلع داخل الكاميرا نتيجة انعكاس ضوء الشمس. وكمان،\
      \ الأرض في هالصورة بتشغل بس 0.12 بكسل—دليل عملي إن كوكبنا، رغم كل شي عليه، صغير\
      \ جدًا قدّام اتّساع الكون.  \n\n“شو ما بدّك تعمل، امشي وانظر لهالنقطة تاني.\
      \ هاي هي مكاننا. هاي هي دارنا. هاي إحنا. على هالنقطة، كل واحد بتحبّه، كل واحد\
      \ بعرفه، كل واحد سمعته عنه، وكل إنسان كان على قيد الحياة يومًا—كلّهن عشن حياتهن\
      \ كاملة هناك. مجموع أفراحنا ومعاناتنا… آلاف الديانات الواثقة بنفسها، وألوف الأفكار\
      \ والأنظمة الاقتصادية… كل صيّاد وكل جامع… كل بطل وكل جبان… كل اللي بنى حضارة\
      \ وكل اللي دمّرها… كل ملك وكل فلاح… كل زوجين شباب عم يحبّوا بعض… كل طفل حامل\
      \ أمل… كل أب وأم… كل مخترع وكل رحّالة… كل معلم أخلاق… وكل سياسي فاسد… كل “سوبر\
      \ ستار” وكل “زعيم أعلى”—كل القديسين وكل الخطّائين في تاريخ نوعنا… عايشين على\
      \ ذرة غبار صغيرة جدًا، ضايعة جوّا ضوء الشمس.” — كارل ساغان\n"
  tr:
    title: null
    description: '1990 yılında Voyager 1’in çok uzak bir mesafeden çektiği “Soluk
      Mavi Nokta” fotoğrafı ve Carl Sagan’ın, “o nokta bizim yerimiz” diye başlayan
      sarsıcı düşünceleri.

      '
    excerpt: 'Dünya, fotoğrafta kameranın içindeki ışık yansımalarından kaynaklanan
      izler arasında yalnızca minicik bir mavi nokta olarak görünür; buna rağmen tek
      bir kare, insanlığın tamamına dair anlamı güçlü biçimde toplar.

      '
    body: "__I18N_IMAGE_0000__\n\n14 Şubat 1990’da Voyager 1 uzay aracı, keşif görevini\
      \ tamamladıktan sonra Güneş Sistemi’nden ayrılıyordu. Neptün’ün yörüngesinin\
      \ ötesinde konumlanmış olan araç, Dünya’ya yaklaşık 60 milyar kilometre uzaklıktaydı\
      \ (yaklaşık olarak Dünya’nın Güneş’e olan ortalama mesafesinin 40 katı).  \n\
      \nCarl Sagan’ın önerisiyle araca, geri dönüp görüntü alması talimatı verildi.\
      \ Böylece “aile portresi” (Family Portraits) denilen bir fotoğraf serisi çekildi;\
      \ bunların arasında “Soluk Mavi Nokta” adıyla anılan ünlü fotoğraf da yer aldı.\
      \  \n\nFotoğrafta Dünya, Güneş ışığının oluşturduğu şeritlerin içinde küçük\
      \ bir mavi nokta olarak görünür. Bu ışık şeritleri, kameranın içinde güneş ışığı\
      \ yansımalarından kaynaklanan optik birer yanılsamadır. Bu karede Dünya yalnızca\
      \ 0.12 piksel kaplar; yani gezegenimizin, uzayın uçsuz bucaksızlığı içinde ne\
      \ kadar küçük kaldığını gözler önüne serer.  \n\n“Şuna bir daha bakın o noktaya.\
      \ Orası bizim yerimiz. Orası bizim yuvamız. Orası biziz. O noktada, sevdiğiniz\
      \ herkes; tanıdığınız herkes; adını duyduğunuz herkes; bir zamanlar yaşamış\
      \ olan insanlığın içindeki herkes—hepsi hayatlarını orada geçirdi. Sevincimizin\
      \ ve acımızın toplamı… binlerce, kendinden emin din; sayısız ideoloji ve ekonomi\
      \ öğretisi; her avcı ve her toplayıcı; her kahraman ve her korkak; her uygarlık\
      \ kurucusu ve her uygarlık yıkıcısı; her kral ve her çiftçi; her aşık genç çift;\
      \ umudu olan her çocuk; her baba ve her anne; her mucit ve her kâşif; her ahlak\
      \ öğretmeni; her yozlaşmış siyasetçi; her ‘süperstar’; her ‘en yüce lider’…\
      \ türümüzün tarihinde yaşamış bütün azizler ve bütün günahkârlar… hepsi, güneş\
      \ ışığı tozlarının içinde asılı duran o minicik zerrecik üzerinde yaşadı.” —\
      \ Carl Sagan"
