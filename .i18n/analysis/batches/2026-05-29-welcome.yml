analysis:
  source_summary: 'المنشور الصيني الأول يقدّم هدف المدونة: ليست مجرد صفحة عرض، بل
    مساحة لتجميع ملاحظات هندسة البرمجيات وتوثيق تجارب أدوات الذكاء الاصطناعي وتأملات
    شخصية طويلة الأمد. كذلك يطلب أن تتم مزامنة النسخ المترجمة تلقائيًا عند تغيير المقالات
    الصينية، مع التأكيد أن الترجمة ليست حرفية بل إعادة سرد تعكس المعنى المقصود بشكل
    طبيعي في لغة الهدف.

    '
  literal_layer: 'النص يقول: "هذه أول مشاركة كمصدر صيني في هذا نظام المدونات." ثم
    يعبّر عن رغبة: أن يكون الموقع مكانًا للتراكم طويل المدى لمذكرات برمجية وتجارب
    أدوات AI وأفكار شخصية. ثم يذكر: عند تغيّر المقالات الصينية يجب أن تتزامن النسخ
    الأخرى تلقائيًا، وأن لا تكون الترجمة مجرد استبدال كلمة بكلمة؛ بل فهم المقصود ثم
    إعادة صياغته طبيعيًا. يوجد عنصر وصفي داخل صيغة Markdown، وموضع placeholder: __I18N_CODE_BLOCK_0000__
    ويجب إبقاؤه كما هو.

    '
  implicit_layer: 'النبرة تحمل نية لاختبار/تحسين نظام الترجمة متعدد اللغات: توجيه
    للمحرّك أو المترجم ليعطي ترجمة "مناسبة ثقافيًا" وليس مجرد مطابقة لغوية. كما يوحي
    بأن المحتوى يجب أن يحافظ على هدف المؤسسة (تجميع المعرفة) وأن تُراعي الترجمات أسلوب
    المدونات في كل لغة.

    '
  cross_cultural_layer: 'المطلوب هو إعادة صياغة أسلوب تقني/مدون طبيعي في كل لغة:  -
    الروسية بصياغة تقنية مألوفة وإيقاع رسمي. - الفارسية بروح نشر رسمية وطبيعية مع
    تعبيرات شائعة في المدونات التقنية. - العربية باللهجة الشامية (دمشق) وبأسلوب مدونة
    محلي، مع تجنّب العربية الفصحى القياسية. - التركية بلغة تقنية سلسة. كما يجب المحافظة
    على اصطلاحات مثل "مذكرات/ملاحظات هندسة البرمجيات" و"أدوات الذكاء الاصطناعي" بصياغة
    تعكس الاستخدام الشائع في كل ثقافة.

    '
  retelling_strategy: 'استخدام إعادة سرد بمعنى متسق:  أ) الحفاظ على بنيّة Markdown
    كما في المصدر (السطور والفاصل والمسافة البادئة) ب) ترجمة المعاني العامة (هدف المدونة
    + مبدأ التزامن + عدم الحرفية) ج) صياغة جمل افتتاحية وخاتمية بأسلوب طبيعي في كل
    لغة د) إبقاء placeholder __I18N_CODE_BLOCK_0000__ دون تغيير حرفي هـ) عدم إنشاء
    محتوى إضافي أو تغيير نية الطلبات.

    '
  terminology_policy: '- "软件工程笔记" تُترجم إلى مكافئ طبيعي: ملاحظات/دفاتر/Notlar في
    كل لغة. - "AI 工具实践记录" تُترجم كممارسة/تجارب أدوات الذكاء الاصطناعي/AI. - "个人思考空间"
    تُترجم كمساحة للتأملات الشخصية/الأفكار. - "自动同步" تُترجم كمزامنة تلقائية عند التغيّر.
    - "逐字替换" تُترجم كمطابقة حرفية/استبدال كلمة بكلمة/حرفيًا. - لا تُغيَّر المعرّفات
    التقنية أو placeholder.

    '
  forbidden_styles: 'ممنوع: - الترجمة الحرفية حرفًا-بحرف التي تضر بأسلوب المدونات.
    - استخدام العربية الفصحى القياسية أو اللهجة السعودية في قسم ar. - إدخال عبارات
    ترويجية أو دينية أو سياسية غير موجودة. - كسر Markdown أو تعديل placeholder __I18N_CODE_BLOCK_0000__
    أو تغيير هيكله.

    '
translations:
  ru:
    title: Добро пожаловать в мой персональный блог
    description: Это статья на китайском языке, предназначенная для проверки системы
      многоязычного блога.
    excerpt: null
    body: 'Это первая статья на китайском языке в моём блоге.


      Я хочу, чтобы этот сайт был не просто витриной, а местом, где со временем накапливаются
      заметки по инженерии ПО, практические записи по инструментам на базе AI и личные
      размышления.


      Когда китайские статьи изменяются, версии на других языках должны автоматически
      синхронизироваться. Перевод — это не просто замена слов один-в-один: сначала
      нужно понять, что именно хотел донести автор, а затем уже естественно пересказать
      это в языке назначения.


      __I18N_CODE_BLOCK_0000__


      Этот код-блок должен оставаться неизменным в процессе перевода.

      '
  fa:
    title: به وبلاگ شخصی من خوش آمدید
    description: این یک مقالهٔ منبع چینی است که برای اعتبارسنجی سامانهٔ وبلاگ چندزبانه
      نوشته شده است.
    excerpt: null
    body: 'این اولین مقالهٔ منبع چینی در این سیستم وبلاگی است.


      دوست دارم این سایت فقط یک صفحهٔ نمایشی نباشد، بلکه جایی باشد که در طول زمان،
      یادداشت‌های مهندسی نرم‌افزار، ثبت تجربه‌های عملی ابزارهای هوش مصنوعی (AI) و
      فضای اندیشیدن و تفکر شخصی در آن جمع و نگهداری شود.


      وقتی مقاله‌های چینی تغییر می‌کنند، نسخه‌های سایر زبان‌ها باید به‌صورت خودکار
      همگام شوند. ترجمه نباید صرفاً «جایگزینی کلمه‌به‌کلمه» باشد؛ باید منظور واقعی
      متن را فهمید و سپس آن را با نثری طبیعی در زبان مقصد دوباره روایت کرد.


      __I18N_CODE_BLOCK_0000__


      این بلوک کد باید در روند ترجمه بدون تغییر باقی بماند.

      '
  ar:
    title: أهلًا وسهلًا بمدونتي الشخصية
    description: هاد المقالة هي نص صيني مُخصّص لعمل اختبار على نظام التدوين متعدد
      اللغات.
    excerpt: null
    body: 'هادي أول مقالة مصدرها صيني بهالـنظام تبع المدونات.


      حابّ يكون هالموقع أكتر من مجرد صفحة عرض؛ بدّو يكون مكان بتتراكم فيه على المدى
      الطويل ملاحظات هندسة البرمجيات، وتوثيق تجارب أدوات الذكاء الاصطناعي (AI)، وكمان
      مساحة لأفكاري وتأملاتي الشخصية.


      لما المقالات الصينية بصير فيها تعديل، المفروض إن النسخ بلغات تانية بتتزامن تلقائيًا.
      والترجمة ما لازم تكون بس تبديل كلمة بكلمة؛ لازم نفهم شو كان المقصود جوّاه النص
      فعليًا، وبعدين نحكيه من جديد بصياغة طبيعية تناسب لغة الهدف.


      __I18N_CODE_BLOCK_0000__


      هالبلوك تبع الكود لازم يضل كما هو بدون أي تغيير أثناء عملية الترجمة.

      '
  tr:
    title: Kişisel bloguma hoş geldiniz
    description: Bu, çok dilli blog sistemini doğrulamak için kullanılan Çince kaynak
      bir yazıdır.
    excerpt: null
    body: 'Bu blog sistemindeki ilk Çince kaynak yazım.


      Bu sitenin yalnızca bir gösterim sayfası olmasını istemiyorum; yazılım mühendisliği
      notlarının, AI (yapay zekâ) araçlarına dair pratik deneyim kayıtlarının ve kişisel
      düşüncelerime ayırdığım bir alanın zamanla biriktiği uzun soluklu bir yer olmasını
      istiyorum.


      Çince yazılar güncellendiğinde, diğer dil sürümleri de otomatik olarak senkronize
      edilmelidir. Çeviri sadece kelime kelime değiştirme işi olmamalı; metnin asıl
      olarak anlatmak istediğini anlamak, ardından da hedef dilde doğal bir şekilde
      yeniden anlatmak gerekir.


      __I18N_CODE_BLOCK_0000__


      Bu kod bloğu, çeviri sürecinde aynen korunmalı.'
