analysis:
  source_summary: 'ผู้เขียนเล่าว่าใช่มะนาวที่ตัวใหญ่มากใส่ไป 2 ลูกจนเปรี้ยวเกินไป
    ครั้งหน้าจะใส่มะนาวเพียงครึ่งลูกเท่านั้น ส่วนกลิ่น/รสของสะระแหน่สดชื่นมาก และผู้เขียนชอบมาก

    '
  literal_layer: '“柠檬很大，放了2个，实在太酸了。下次我只能放半个柠檬。” คือสรุปประสบการณ์การใส่มะนาว 2 ลูกแล้วเปรี้ยวมาก
    จึงปรับเป็นครึ่งลูกในครั้งหน้า

    “薄荷的味道非常清新，我很喜欢。” คือชื่นชมรส/กลิ่นของมินต์ว่าให้ความสดชื่นและตนชอบ

    '
  implicit_layer: 'ตั้งใจสื่อสารคำแนะนำเชิงประสบการณ์ (ปรับปริมาณให้พอดี) และให้ความรู้สึกเชิงบวกต่อมินต์
    โดยน้ำเสียงเป็นส่วนตัวแบบบันทึกเล็ก ๆ ไม่ได้ลงรายละเอียดทางเทคนิค

    '
  cross_cultural_layer: 'ในภาษาเป้าหมายควรรักษาโทนเป็นบล็อกส่วนตัวที่สุภาพและธรรมชาติ
    รวมถึงปรับถ้อยคำให้สอดคล้องกับธรรมเนียมการเขียนบล็อกในแต่ละภาษา (เช่น การใช้ถ้อยคำให้คำแนะนำแบบ
    “ครั้งหน้า…คงจะ…” และการชมความสดชื่นของมินต์)

    มักไม่จำเป็นต้องแปลคำว่า “味道” แบบเทคนิคเกินไป สามารถเลือกคำที่สื่อ “กลิ่น/รส/รสสัมผัส”
    ตามธรรมชาติของภาษา

    '
  retelling_strategy: '- คงโครงเรื่องเดิมเป็น 2 ย่อหน้า: (1) ปริมาณมะนาวกับความเปรี้ยว
    + แผนครั้งหน้า (2) ชื่นชมมินต์ว่าฉุนสดชื่น

    - คง placeholder แบบไม่เปลี่ยน: `__I18N_IMAGE_0000__`

    - เลือกสำนวนทางธรรมชาติของแต่ละภาษา โดยรักษาเจตนา “ประสบการณ์ส่วนตัว + ข้อแนะนำ”

    '
  terminology_policy: '- ใช้คำเรียกผลไม้/สมุนไพรให้ตรงและเป็นที่คุ้น: มะนาว (lemon),
    สะระแหน่/มินต์ (mint)

    - แปล “清新” ให้เป็นคำที่สื่อ “สดชื่น/หอมสด/โปร่งเบา” ตามธรรมชาติของภาษาเป้าหมาย

    - ไม่เพิ่มคำใหม่ที่เปลี่ยนความหมาย และไม่ทำให้เป็นคำเฉพาะทางเกินจำเป็น

    '
  forbidden_styles: '- ห้ามแปลแบบคำต่อคำ

    - ห้ามเปลี่ยนโทนให้เป็นวิชาการหรือเชิงโฆษณาเกินจริง

    - ห้ามเพิ่มรายละเอียดที่ไม่มีในต้นฉบับ (ปริมาณเป็น “ครึ่งลูก” เท่านั้น ไม่กล่าวอย่างอื่น)

    - ห้ามแก้ไขหรือแทนที่ placeholder: `__I18N_IMAGE_0000__`

    '
translations:
  th:
    title: มะนาวกับสะระแหน่
    description: null
    excerpt: null
    body: '__I18N_IMAGE_0000__


      มะนาวของฉันลูกใหญ่มาก ใส่ไป 2 ลูกแล้วเปรี้ยวเกินจริง ๆ ครั้งหน้าฉันคงใส่แค่ครึ่งลูกเท่านั้น


      กลิ่นของสะระแหน่นั้นสดชื่นมาก ฉันชอบมันจริง ๆ

      '
  my:
    title: သံပုရာသီးနှင့် ပူဒီ (မင်္ဂလာရွက်)
    description: null
    excerpt: null
    body: '__I18N_IMAGE_0000__


      ကျွန်မရဲ့ သံပုရာသီးက အလွန်ကြီးပါတယ်။ ၂ လုံးတင်လိုက်တော့ တကယ်ပဲ အလွန်ချဉ်လွန်းသွားပါတယ်။
      နောက်တစ်ခါတော့ သံပုရာသီးကို တစ်လုံးရဲ့ တစ်ဝက်လောက်ပဲ ထည့်နိုင်တော့မယ်။


      ပူဒီရဲ့ အရသာ/အနံ့က အရမ်းကို လတ်ဆတ်ပြီး ကျွန်မကတော့ အထူးပဲ ကြိုက်ပါတယ်။

      '
  km:
    title: ក្រូចឆ្មា និងជីអង្កាម
    description: null
    excerpt: null
    body: '__I18N_IMAGE_0000__


      ក្រូចឆ្មារបស់ខ្ញុំធំខ្លាំងណាស់ ដាក់ចូលទៅ ២ ផ្លែ ទៅដល់ថ្នាក់ថ្លៃពិតៗថា ជូរពេក។
      លើកក្រោយ ខ្ញុំគ្រាន់តែដាក់ក្រូចឆ្មា “ពាក់កណ្តាល” តែប៉ុណ្ណោះ។


      រសជាតិជីអង្កាមមានភាពស្រស់ស្រាយណាស់ ខ្ញុំចូលចិត្តវាខ្លាំង។

      '
  lo:
    title: ນ້ຳຂອງໝາກນາວ ແລະ ກະທຽມ (ໝາກມິນ)
    description: null
    excerpt: null
    body: '__I18N_IMAGE_0000__


      ໝາກນາວຂອງຂ້ອຍໃຫຍ່ຫຼາຍ ພໍ່ຈະໃສ່ເຂົ້າໄປ 2 ໜ່ວຍ ກໍຈືດຈົນຂີ້ຝືດເກີນໄປ ແຊບປຽບໆກໍ່ຂຶ້ນມາວ່າຂົມຊົມຫຼາຍ.
      ຄັ້ງຕໍ່ໄປ ຂ້ອຍຄົງໄດ້ໃສ່ແຕ່ຄຶ່ງໜ່ວຍຂອງໝາກນາວເທົ່ານັ້ນ.


      ກິ່ນ/ລົດຂອງມິນ (ສະໝັກ) ສົດຊື່ນຫຼາຍ ຂ້ອຍຖືກໃຈຫຼາຍ.

      '
  ru:
    title: Лимон и мята
    description: null
    excerpt: null
    body: '__I18N_IMAGE_0000__


      Мой лимон оказался очень большим: я положила сразу 2 штуки — в итоге получилось
      просто невероятно кисло. В следующий раз, похоже, смогу добавить только половинку
      лимона.


      А вкус мяты — невероятно свежий, мне очень нравится.

      '
  fa:
    title: لیمو و نعناع
    description: null
    excerpt: null
    body: '__I18N_IMAGE_0000__


      لیموی من خیلی بزرگ بود؛ دو عدد گذاشتم و واقعاً بیش از حد ترش شد. دفعه بعد فقط
      می‌توانم نصفِ یک لیمو بریزم.


      طعمِ نعناع خیلی تازه و دلنشین است، و من خیلی دوستش دارم.

      '
  ar:
    title: ليمون و نعنع
    description: null
    excerpt: null
    body: '__I18N_IMAGE_0000__


      ليموني كان كبير كتير، حطّيت 2 منه… بصراحة طلع حامض زيادة عن اللزوم. المرة الجاية
      ما رح أقدر إلا أحط نص ليمونة.


      ريحة/طعم النعنع طازة كتير، وبصراحة أنا بحبو.

      '
  tr:
    title: Limon ve nane
    description: null
    excerpt: null
    body: '__I18N_IMAGE_0000__


      Limonum çok iri çıktı; iki tane koydum, gerçekten fazla asidik/ekşi oldu. Bir
      dahakine ancak yarım limon koyabilirim.


      Nanenin tadı da çok ferah; gerçekten çok seviyorum.'
