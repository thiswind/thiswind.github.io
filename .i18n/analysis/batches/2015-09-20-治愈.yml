analysis:
  source_summary: 'เมื่ออารมณ์กดดัน ลองดูช่อง CCTV-1 แล้วความรู้สึกจะดีขึ้น และรายการ
    “ข่าวเช้าหลายตอน/Neews Broadcast” (新闻联播) ถูกมองว่าเป็นรายการที่ “บำบัดใจ” ได้มากที่สุด

    '
  literal_layer: 'เนื้อความตรงตัวคือ ช่วงที่ใจไม่ดี ให้เปิดดู CCTV－1 แล้วใจจะดีขึ้น
    ต่อจากนั้นระบุว่า “新闻联播” เป็นรายการที่ “治愈” (เยียวยา/บำบัดใจ) ที่สุด

    '
  implicit_layer: 'ผู้เขียนตั้งใจสื่อว่าเนื้อหาแนวข่าวที่มีจังหวะสม่ำเสมอ ภาพลักษณ์ทางการ
    และความเป็นระเบียบของรายการ ทำหน้าที่เหมือนการผ่อนคลายทางใจในวันที่เครียด ไม่ได้หมายถึงการรักษาเชิงการแพทย์

    '
  cross_cultural_layer: 'บริบทจีนเกี่ยวกับ CCTV-1 และ “新闻联播” มีความหมายเชิงวัฒนธรรมว่าเป็นรายการข่าวหลักของรัฐ
    จึงควรถ่ายทอดให้คงภาพ “ทางการ/มั่นคง/เป็นระเบียบ” ในภาษาปลายทาง โดยใช้คำว่า “บำบัด/เยียวยาใจ/ปลอบประโลมใจ”
    ให้เหมาะกับสำนวนสื่อสิ่งพิมพ์แต่ละภาษา

    '
  retelling_strategy: "- คงลำดับความคิดเดิม: (1) เมื่ออัดอั้น/กดดัน (2) ดู CCTV-1\
    \ แล้วอารมณ์ดีขึ้น (3) ยกย่อง “新闻联播” ว่าเป็นรายการเยียวยาใจที่สุด  \n- แปล “治愈”\
    \ เป็นคำในแต่ละภาษาในความหมายเชิงอารมณ์/จิตใจ ไม่ใช่ทางการแพทย์  \n- เก็บสัญลักษณ์และตัวเลข/ชื่อช่อง\
    \ CCTV－1 และชื่อรายการ “新闻联播” ไว้อย่างเหมาะสม\n"
  terminology_policy: "- รักษาอัตลักษณ์เฉพาะ: CCTV－1, 新闻联播  \n- แปลความหมาย “治愈” ด้วยคำที่สื่ออารมณ์\
    \ เช่น “บำบัดใจ/เยียวยาใจ/ปลอบใจ” ตามธรรมชาติของภาษา  \n- ไม่แนะนำชื่อช่อง/รายการให้เป็นการออกเสียงหรือการทับศัพท์ที่อาจทำให้ความหมายคลาดเคลื่อนเกินจำเป็น\
    \ ยังคงใช้ชื่อภาษาจีนเดิมในบริบทสากลได้\n"
  forbidden_styles: "- ไม่ใช้ภาษากึ่งทางการเกินไปหรือกวีนิยมเกินจำเป็น  \n- ไม่เปลี่ยนเจตนาไปเป็นการยืนยันทางการแพทย์\
    \  \n- ไม่ใช้ Markdown structure ที่เปลี่ยน (คงตัวหนา **ข่าว联播** ในทุกภาษาเท่าที่ทำได้)\
    \  \n"
translations:
  th:
    title: 'การเยียวยาใจ

      '
    description: '|

      '
    excerpt: '|

      '
    body: 'เมื่อใดที่ความรู้สึกในใจอัดแน่นหรือกดดัน ลองเปิดดู CCTV－1 แล้วอารมณ์ก็มักจะดีขึ้น


      **ข่าว联播** เป็นหนึ่งในรายการที่เยียวยาใจที่สุด

      '
  my:
    title: 'စိတ်ကို ပြေလျော့စေခြင်း

      '
    description: '|

      '
    excerpt: '|

      '
    body: 'စိတ်ဖိစီးပြီး ခံစားချက် မလှပတော့တဲ့အခါ CCTV－1 ကို ကြည့်လိုက်ပါက စိတ်ကောင်းသွားတတ်ပါတယ်။


      **新闻联播** ကတော့ စိတ်ကို ပြေလျော့စေတဲ့ အစီအစဉ်တွေထဲက အကောင်းဆုံးတစ်ခုပါ။

      '
  km:
    title: 'ការព្យាបាលចិត្ត

      '
    description: '|

      '
    excerpt: '|

      '
    body: 'រាល់ពេលដែលអារម្មណ៍តប់ប្រមល់ ឬតានតឹង សូមមើល CCTV－1 ហើយចិត្តនឹងស្រាលឡើង។


      **新闻联播** គឺជាកម្មវិធីមួយដែលព្យាបាលចិត្តបានជាងគេ

      '
  lo:
    title: 'ການປອບໃຈ

      '
    description: '|

      '
    excerpt: '|

      '
    body: 'ທຸກເທື່ອທີ່ໃຈຖືກກົດດັນ ລອງເບິ່ງ CCTV－1 ເບິ່ງສິ ອາລົມກໍຈະດີຂຶ້ນ


      **新闻联播** ແມ່ນລາຍການທີ່ປອບໃຈທີ່ສຸດ

      '
  ru:
    title: 'Исцеление души

      '
    description: '|

      '
    excerpt: '|

      '
    body: 'Как только на душе становится тяжело, включите CCTV－1 — и настроение обычно
      сразу улучшается.


      **新闻联播** — пожалуй, самый «исцеляющий» из всех выпусков.

      '
  fa:
    title: 'التیام‌بخش

      '
    description: '|

      '
    excerpt: '|

      '
    body: 'هر وقت حال‌وهوای آدم گرفته می‌شود، CCTV－1 را تماشا کنید؛ کم‌کم حالتان بهتر
      می‌شود.


      **新闻联播** یکی از التیام‌بخش‌ترین برنامه‌هاست

      '
  ar:
    title: 'شِفَا

      '
    description: '|

      '
    excerpt: '|

      '
    body: 'كلّ ما بتحسّ إنّ النفس ضاغطة ومضغوطة، شغّل CCTV－1 وخلّيها عليك… وبيّن هيدا
      الشي بيخلّي المزاج يِتحسّن.


      **新闻联播** هي أكتر برنامج “شِفَا” بيناتهم

      '
  tr:
    title: 'Ruhsal İyileşme

      '
    description: '|

      '
    excerpt: '|

      '
    body: 'Canın sıkıldığında, CCTV－1’i izlemeyi dene; insanın içi hemen daha iyi
      hissetmeye başlıyor.


      **新闻联播** bu anlamda en “iyileştirici” programlardan biri.'
