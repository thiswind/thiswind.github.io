      '
    excerpt: 'قوانین چنین است: با مقداری پول و هسته شروع می‌کنید. هر بار می‌توانید
      با پول 1، یک هلو بخرید یا با 3 هسته یک هلو بگیرید. هر بار که یک هلو بخورید،
      1 هسته به دست می‌آورید. در ادامه، ایدهٔ کامل حل و کد آمده است.

      '
    body: 'این یک مسئلهٔ جالب برنامه‌نویسی دربارهٔ هلو و هستهٔ هلو است. قوانین مسئله
      به شرح زیر است:

      - در ابتدا مقدار مشخصی پول و تعدادی هسته دارید.

      - هر بار می‌توانید با 1 واحد پول، یک هلو بخرید؛ یا با 3 هسته، یک هلو معاوضه
      کنید.

      - هرگاه یک هلو بخورید، 1 هسته به دست می‌آورید.


      هدف نهایی این است: تا جای ممکن هلوهای بیشتری بخورید. در ادامه، ایدهٔ کامل حل
      این مسئله و کد آن را می‌بینید.


      ## ایدهٔ حل مسئله


      نکتهٔ اصلی اینجاست که باید از ارزش هسته‌ها به‌خوبی استفاده کنید و از هدررفت
      منابع جلوگیری شود. مراحل کار به این شکل است:

      1. در هر گام، ارزش هسته‌ها را به پول تبدیل کنید تا بیشترین مقدار سرمایه را داشته
      باشید.

      2. اگر پول کافی بود، یک هلو بخرید و آن را مصرف کنید.

      3. وقتی دیگر امکان خرید وجود نداشت، بررسی کنید آیا می‌توانید «یک بار دیگر معاوضه
      کنید» تا استفاده از منابع به حداکثر برسد.


