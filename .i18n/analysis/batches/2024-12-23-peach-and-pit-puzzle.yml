      '
    body: 'ນີ້ແມ່ນໂຈມຂຽນໂປຣແກຣມແບບສົນໃຈກ່ຽວກັບໝາກພີດ ແລະ ແກ່ນໝາກພີດ។ ກົດກາແມ່ນດັ່ງນີ້:

      - ເລີ່ມຕົ້ນດ້ວຍເງິນ ແລະ ແກ່ນໝາກພີດ ຈໍານວນໜຶ່ງ

      - ແຕ່ລະຄັ້ງ ສາມາດໃຊ້ເງິນ 1 ຊື້ໝາກພີດ 1 ລູກ ຫຼື ໃຊ້ແກ່ນໝາກພີດ 3 ແກ່ນແລກເອົາໝາກພີດ
      1 ລູກ

      - ເມື່ອກິນໝາກພີດ 1 ລູກ ຈະໄດ້ແກ່ນໝາກພີດ 1 ແກ່ນ


      ເປົ້າໝາຍສຸດທ້າຍແມ່ນ: ກິນໝາກພີດໃຫ້ໄດ້ຫຼາຍທີ່ສຸດ. ຂ້າງລຸ່ມນີ້ແມ່ນແນວຄິດທັງໝົດ
      ແລະໂຄດສໍາລັບແກ້ບັນຫານີ້


      ## ແນວຄິດໃນການແກ້ໂຈມ


      ຫຼັກສໍາຄັນຂອງໂຈມນີ້ຢູ່ທີ່ການນໍາໃຊ້ຄຸນຄ່າຂອງແກ່ນໝາກພີດໃຫ້ເກີນຄຸ້ມ ແລະຫຼີກລ້ຽງການເສຍປະໂຫຍດ.
      ຂັ້ນຕອນມີດັ່ງນີ້:

      1. ໃນແຕ່ລະຂັ້ນ ປ່ຽນຄຸນຄ່າຂອງແກ່ນໃຫ້ເປັນເງິນ ເພື່ອໃຫ້ມີທຶນຫຼາຍທີ່ສຸດ

      2. ຖ້າເງິນພຽງພໍ ຊື້ໝາກພີດ 1 ລູກ ແລ້ວກິນ

      3. ເມື່ອພະຍາຍາມຊື້ແລ້ວບໍ່ສາມາດດໍາເນີນຕໍ່ໄດ້ ໃຫ້ກວດເບິ່ງວ່າ “ສາມາດແລກເພີ່ມອີກ
      1 ຄັ້ງ” ໄດ້ບໍ ເພື່ອໃຫ້ໃຊ້ທັບພະຍາກອນໄດ້ຄຸ້ມຄ່າທີ່ສຸດ


