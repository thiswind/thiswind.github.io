      '
    excerpt: 'من البداية عندك شوية فلوس وشوية نوى. كل مرة بتقدر تشتري خوخ وحدة بفلوس
      1، أو تبدّل 3 نوى على خوخ وحدة. ولما تاكل خوخ بتاخد نواة 1 زيادة. في الأسفل
      في الفكرة كاملة والحل بالـكود.

      '
    body: 'هيدي مسألة برمجة حلوة وشيّقة عن الخوخ ونواة الخوخ. القواعد هيك:

      - من البداية في عندك عدد معيّن من الفلوس وعدد معيّن من النوى.

      - كل مرة فيك تشتري خوخة واحدة بفلوس 1، أو تِبدّل 3 نوى على خوخة واحدة.

      - كل ما تاكل خوخة وحدة، بصير تربح 1 نواة.


      الهدف النهائي: تاكل أكبر عدد ممكن من الخوخ. يليها بتلاقي الفكرة الكاملة للحل
      والبرنامج كامل.


      ## فكرة الحل


      السر هون إنك تستفيد بأقصى شكل من قيمة النوى وتمنع الهدر. خطوات العمل:

      1. بكل خطوة، حوِّل قيمة النوى على فلوس، حتى تكون الفلوس هي الأكبر.

      2. إذا الفلوس بتكفي، اشترِ خوخة واحدة وخليها تنأكل.

      3. لما تجرّب تشتري وما بقى فيك تكمل، راجع إذا فيك “تبدّل مرة زيادة” حتى تستغل
      الموارد بأقصى قدر.


