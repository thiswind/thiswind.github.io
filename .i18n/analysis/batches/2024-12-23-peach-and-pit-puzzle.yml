      '
  my:
    title: 'ပိန္ကော်နှင့် ပိန္အူပင် စိတ်ဝင်စားဖွယ် ပရိုဂရမ်မင်းမေးခွန်း

      '
    description: 'ပိန္ကော် (peach) နဲ့ အူပင် (peach pit) တွေအကြောင်း စိတ်ဝင်စားဖွယ်
      ပရိုဂရမ်မင်းမေးခွန်းတစ်ခု။ ပိန္အူပင်တွေကို လဲလှယ်ပြီး ပိန္ကော်ကို အများဆုံးစားနိုင်အောင်
      ရှာဖွေရမယ်။

      '
    excerpt: 'စည်းမျဉ်းက ရင်းနှီးငွေတချို့နဲ့ အူပင်တချို့ရှိပြီး ပိန္ကော်ကို ငွေ 1
      နဲ့ 1 လုံး ဝယ်နိုင်သလို အူပင် 3 ခုနဲ့ 1 လုံး လဲလှယ်လည်းရပါတယ်။ စားလိုက်တိုင်း
      အူပင် 1 ခု ပြန်ရတယ်—ပြီးတော့ အကောင်းဆုံးဖြေရှင်းနည်းနဲ့ ကုဒ်ကိုပါ ဖော်ပြထားပါတယ်။

      '
    body: 'ဒါက ပိန္ကော် (peach) နဲ့ ပိန္အူပင် (peach pit) တွေအကြောင်း စိတ်ဝင်စားဖွယ်
      ပရိုဂရမ်မင်းမေးခွန်းတစ်ခုပါ။ စည်းမျဉ်းတွေက အောက်ပါအတိုင်း ဖြစ်ပါတယ်။

      - အစမှာ ငွေအချို့နဲ့ ပိန္အူပင် အချို့ရှိသည်။

      - တစ်ခါတစ်လေမှာ ငွေ 1 နဲ့ ပိန္ကော် 1 လုံး ဝယ်နိုင်သည်၊ သို့မဟုတ် ပိန္အူပင် 3
      ခုကို လဲလှယ်ပြီး ပိန္ကော် 1 လုံး ရယူနိုင်သည်။

      - ပိန္ကော် 1 လုံး စားလိုက်တိုင်း ပိန္အူပင် 1 ခု ရရှိသည်။


      နောက်ဆုံးရည်မှန်းချက်မှာ ပိန္ကော်ကို တတ်နိုင်သမျှ အများဆုံးစားရန် ဖြစ်သည်။ အောက်တွင်
      ဒီမေးခွန်းကို ဖြေရှင်းရန် အပြည့်အစုံ အကြံဉာဏ်နဲ့ ကုဒ်ပါ တင်ပြထားသည်။


      ## ဖြေရှင်းနည်းအကြံဉာဏ်


      ဒီမေးခွန်းရဲ့ အဓိကကတော့ ပိန္အူပင်တွေရဲ့ တန်ဖိုးကို အပြည့်အဝ အသုံးချပြီး အကျိုးမဲ့ဆုံးရှုံးမှုတွေ
      မဖြစ်စေရန် ဖြစ်ပါတယ်။ လုပ်ထုံးလုပ်နည်းကို အောက်ပါအတိုင်း ဆောင်ရွက်ပါ။

      1. အဆင့်တစ်ဆင့်တိုင်းမှာ ပိန္အူပင်ရဲ့တန်ဖိုးကို ငွေအဖြစ် ပြောင်းလဲပြီး ငွေပမာဏကို
      အမြင့်ဆုံးဖြစ်အောင် လုပ်ပါ။

      2. ငွေ လုံလောက်ပါက ပိန္ကော် 1 လုံး ဝယ်ပြီး စားပါ။

      3. ဝယ်ယူခြင်းကို ဆက်မလုပ်နိုင်တော့တဲ့အခါ “နောက်တစ်ကြိမ် ထပ်လဲလှယ်နိုင်မလား”
      ကို စစ်ဆေးပြီး အရင်းအမြစ်ကို အများဆုံး အသုံးချပါ။


      ## ပရိုဂရမ်ကုဒ်


      အောက်ပါကုဒ်သည် Python ဖြင့် အပြည့်အစုံ ရေးထားခြင်း ဖြစ်သည်-


      __I18N_CODE_BLOCK_0000__

      '
  km:
    title: 'បញ្ហាសរសេរកម្មវិធីដ៏គួរឲ្យចាប់អារម្មណ៍៖ ផ្លែប៉ែស និងគ្រាប់ផ្លែប៉ែស

      '
    description: 'បញ្ហាសរសេរកម្មវិធីបែបលេងសប្បាយ ស្តីពីការទិញផ្លែប៉ែស ឬប្តូរគ្រាប់ផ្លែប៉ែស
      ដើម្បីអាចញ៉ាំផ្លែប៉ែសបានច្រើនបំផុត។

      '
    excerpt: 'ច្បាប់គឺចាប់ផ្តើមដោយលុយ និងគ្រាប់ផ្លែប៉ែស បន្ទាប់មកអាចទិញផ្លែប៉ែសដោយលុយ
      1 ឬប្តូរគ្រាប់ 3 គ្រាប់ទៅជាផ្លែប៉ែស 1 ផ្លែ។ ពេលញ៉ាំផ្លែប៉ែសម្តងៗ នឹងទទួលបានគ្រាប់
      1 គ្រាប់បន្ថែម។

      '
    body: 'នេះជាបញ្ហាសរសេរកម្មវិធីបែបលេងសប្បាយ ដែលទាក់ទងនឹងផ្លែប៉ែស និងគ្រាប់ផ្លែប៉ែស។
      ច្បាប់នៃបញ្ហាមានដូចខាងក្រោម៖

      - មានលុយ និងគ្រាប់ផ្លែប៉ែសក្នុងចំនួនមួយដំបូង

      - រាល់លើក អ្នកអាចប្រើលុយ 1 ដើម្បីទិញផ្លែប៉ែស 1 ផ្លែ ឬប្រើគ្រាប់ផ្លែប៉ែស 3 គ្រាប់
      ដើម្បីប្តូរទៅយកផ្លែប៉ែស 1 ផ្លែ

      - រាល់ពេលញ៉ាំផ្លែប៉ែស 1 ផ្លែ នឹងទទួលបានគ្រាប់ផ្លែប៉ែស 1 គ្រាប់


      គោលដៅចុងក្រោយគឺ៖ ញ៉ាំផ្លែប៉ែសឲ្យបានច្រើនតាមដែលអាចធ្វើបាន។ ខាងក្រោមនេះជាគំនិតពេញលេញ
      និងកូដសម្រាប់ដោះស្រាយបញ្ហានេះ។


      ## គំនិតដោះស្រាយបញ្ហា


      ចំណុចសំខាន់នៃបញ្ហានេះ គឺការប្រើប្រាស់តម្លៃរបស់គ្រាប់ផ្លែប៉ែសឲ្យបានពេញលេញ និងជៀសវាងការខ្ជះខ្ជាយ។
      ជំហានអនុវត្តមានដូចជា៖

      1. ក្នុងមួយជំហានៗ បម្លែងតម្លៃរបស់គ្រាប់ផ្លែប៉ែសទៅជាលុយ ដើម្បីឲ្យប្រាក់មានច្រើនបំផុត

      2. ប្រសិនបើលុយគ្រប់គ្រាន់ សូមទិញផ្លែប៉ែស 1 ផ្លែ ហើយញ៉ាំវា

      3. ពេលព្យាយាមទិញហើយមិនអាចបន្តបាន សូមពិនិត្យមើលថា អាច “ប្តូរបន្ថែមម្តងទៀត” បានទេ
      ដើម្បីធានាថាការប្រើប្រាស់ធនធានមានប្រសិទ្ធភាពខ្ពស់បំផុត


      ## កូដកម្មវិធី


      ខាងក្រោមនេះជាកូដពេញលេញដែលអនុវត្តដោយ Python៖


      __I18N_CODE_BLOCK_0000__

