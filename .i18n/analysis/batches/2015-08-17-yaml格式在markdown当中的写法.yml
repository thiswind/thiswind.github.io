analysis:
  source_summary: 'บทความอธิบาย “รูปแบบการเขียน YAML ภายใน Markdown” ซึ่งจากเนื้อหาที่ให้มาเพียงแค่มีการอ้างถึงรูปภาพประกอบด้วยตัวแทน
    i18n: “如图： __I18N_IMAGE_0000__”

    '
  literal_layer: 'ประโยคภาษาจีน “如图：” แปลได้ตรงตัวว่า “ดังที่แสดงในภาพ:” และมีตัวยึดตำแหน่งรูปภาพ/สื่อ
    “__I18N_IMAGE_0000__” โดยไม่มีโค้ดหรือคำอธิบายอื่นเพิ่มเติม

    '
  implicit_layer: 'เจตนาโดยนัยคือให้ผู้อ่านอ้างอิง “ภาพ/ตัวอย่าง” เพื่อดูวิธีการเขียน
    YAML ใน Markdown เนื้อหาจริงอาจอยู่ในภาพนั้น จึงต้องคงท่าที “ดูตามภาพ” และรักษาตัวยึดตำแหน่งไว้ไม่เปลี่ยนแปลง

    '
  cross_cultural_layer: 'ในแต่ละภาษา ควรใช้สำนวนทางการที่เหมาะกับบล็อก/งานสอนเทคนิค
    โดยมักลงท้ายด้วย “ดูภาพ/ดังในภาพ” และคงชื่อหรือเครื่องหมายสำหรับตัวแทนภาพไว้เหมือนเดิม

    '
  retelling_strategy: '- แปลสำนวน “如图：” เป็นสำนวนที่เป็นธรรมชาติของแต่ละภาษาในบริบทบล็อกเทคนิค

    - คงตัวยึดตำแหน่ง __I18N_IMAGE_0000__ ไว้ “เหมือนเดิมทุกภาษา”

    - ไม่เติมเนื้อหาใหม่เพราะแหล่งข้อมูลมีจำกัด

    '
  terminology_policy: 'ใช้คำทั่วไปที่สื่อความหมาย “ดูภาพ” โดยไม่สร้างศัพท์เฉพาะเพิ่ม
    และคง identifier/placeholder เดิมอย่างเคร่งครัด: __I18N_IMAGE_0000__

    '
  forbidden_styles: '- ไม่แปลแบบคำต่อคำตรงเกินไปจนผิดธรรมชาติของภาษาเป้าหมาย

    - ไม่เปลี่ยนรูปแบบหรือคอนเทนต์ของ placeholder

    - ไม่ใส่ Markdown/โครงสร้างเพิ่มที่ไม่ได้มีในต้นฉบับ

    - ไม่ทำสำนวนกึ่งกันเอง/ไม่เป็นทางการเกินไปสำหรับงานบล็อกเชิงเทคนิค

    '
