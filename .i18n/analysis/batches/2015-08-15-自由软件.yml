analysis:
  source_summary: 'ผู้เขียนเล่าว่าเพิ่งพบการ “จี้ 404” ของเราเตอร์ Xiaomi แล้วรู้สึกไม่ดีมาก
    จากนั้นย้ำหลักคิดระหว่าง “เสรี” กับ “ฟรี” ว่าตนเลือก “เสรี” และอธิบายว่าโอเพ่นซอร์ส/ซอฟต์แวร์เสรีสำคัญที่ไม่ซ่อนเล่ห์เหลี่ยม
    แม้ตนจะไม่จำเป็นต้องเข้าใจเชิงเทคนิคทั้งหมด แต่เชื่อว่ามีคนที่อ่านออกอยู่เสมอ

    '
  literal_layer: '“Yesterday discovered Xiaomi router 404 hijacking... Choose freedom
    if freedom and free are two options... Open source is more important not hiding
    tricks... I may not understand but surely someone understands... This is a wonderful
    fantasy.”

    '
  implicit_layer: 'ความไม่ไว้วางใจต่อพฤติกรรมที่ควบคุมหรือดัดแปลงทราฟฟิกผู้ใช้ (404
    hijacking) สื่อถึงปัญหาด้านความโปร่งใสและการใช้อำนาจของผู้ให้บริการ; “เสรีไม่ใช่ฟรี”
    สื่อเจตนารมณ์เชิงปรัชญาของซอฟต์แวร์เสรี: ความเป็นเจ้าของ/ตรวจสอบได้/แก้ไขได้ มากกว่าการไม่มีค่าใช้จ่าย;
    “ความฝันอันงดงาม” แสดงความหวังว่าการเปิดเผยโค้ดจะนำไปสู่การตรวจจับและความรับผิดชอบ
    แม้ในชีวิตจริงอาจไม่ง่าย

    '
  cross_cultural_layer: 'ต้องคงโทนการเขียนแบบบล็อกเชิงเหตุผลและความรู้สึกส่วนตัว โดยใช้คำที่สื่อความเป็น
    “ทางเลือกเชิงคุณค่า” ระหว่างเสรีกับฟรีให้เป็นธรรมชาติในแต่ละภาษา หลีกเลี่ยงสำนวนที่แรงเกินหรือเหมารวมทางศีลธรรมเกินจำเป็น
    และคงการอ้างถึงแนวคิดซอฟต์แวร์เสรี/โอเพ่นซอร์สในบริบทที่ผู้อ่านทั่วไปรับรู้ได้

    '
  retelling_strategy: 'รักษาโครงสร้าง 3 ย่อหน้าเดิม: (1) เหตุการณ์ที่เจอและความรู้สึกไม่ดี
    (2) ประกาศเลือก “เสรี” เมื่อเทียบกับ “ฟรี” (3) อธิบายเหตุผลเชิงหลักการของซอฟต์แวร์เปิด/เสรี
    และปิดท้ายด้วย “ความฝันอันงดงาม” ในสำนวนที่เป็นธรรมชาติของแต่ละภาษา

    '
  terminology_policy: 'รักษาความหมายของ “自由” เป็น “เสรี/ความเป็นอิสระ” และ “免费” เป็น
    “ฟรี/ไม่เสียค่าใช้จ่าย”; “开源” ใช้คำเทียบเท่าที่สื่อถึงการเปิดโค้ดและความตรวจสอบได้ในแต่ละภาษา
    ไม่จำเป็นต้องใช้คำว่าโอเพ่นซอร์สทุกแห่ง แต่ต้องคงเจตนาว่า “ไม่ซ่อนเล่ห์เหลี่ยม”;
    ชื่อ “Xiaomi” และ “404” คงรูปเดิม; “404劫持” แปลเชิงบรรยายว่า hijacking/การจี้/การดัดแปลงเส้นทางเพื่อทำให้หน้า
    404 ไม่เป็นจริง

    '
  forbidden_styles: 'หลีกเลี่ยงการแปลแบบคำต่อคำที่ทำให้สำนวนไม่เป็นธรรมชาติ; หลีกเลี่ยงการใช้น้ำเสียงก้าวร้าวเชิงกล่าวโทษแบบรุนแรงเกิน;
    หลีกเลี่ยงการใส่ข้อมูลใหม่ที่ไม่ได้อยู่ในต้นฉบับ; ไม่เปลี่ยนรูปแบบ Markdown (คงการทำตัวหนาและบรรทัดว่าง)

    '
translations:
  th:
    title: 'เสรีภาพซอฟต์แวร์

      '
    description: null
    excerpt: null
    body: 'เมื่อวานเพิ่งไปเจอว่าเราเตอร์ของ Xiaomi มีการ “จี้ 404” ทำให้ผมรู้สึกไม่สบายใจอย่างยิ่ง


      ถ้ามีให้เลือกเพียงอย่างใดอย่างหนึ่งระหว่าง **เสรี** กับ **ฟรี** ผมขอเลือก **เสรี**


      สิ่งที่สำคัญกว่าคือโอเพ่นซอร์สไม่ใช่การซ่อนเล่ห์เหลี่ยม ถึงผมอาจไม่เข้าใจทั้งหมด
      แต่ก็ต้องมีคนที่เข้าใจได้ นี่ช่างเป็นความหวังที่งดงามจริง ๆ

      '
  my:
    title: 'လွတ်လပ်သော ဆော့ဖ်ဝဲ

      '
    description: null
    excerpt: null
    body: 'မနေ့က Xiaomi router မှာ 404 ကို “လွှဲယူ/ဟိုင်ဂျက်” လုပ်နေတဲ့အရာကို တွေ့လိုက်ရတော့
      တော်တော်လေး စိတ်မကောင်းဖြစ်သွားပါတယ်။


      “လွတ်လပ်မှု” နဲ့ “အခမဲ့” ဆိုတာ နှစ်ခုပဲ ရွေးချယ်စရာရှိမယ်ဆိုရင် ကျွန်တော်က **လွတ်လပ်မှု**
      ကိုပဲ ရွေးမယ်


      Open source ဆိုတာက လျှို့ဝှက်ကိစ္စတွေ ဖုံးကွယ်မထားဘဲ ရှိနေဖို့က အရေးကြီးပါတယ်။
      ကျွန်တော်တော့ သေချာပေါက် နားမလည်နိုင်ပေမယ့် အနည်းဆုံးတော့ တစ်ယောက်ယောက်က နားလည်နိုင်မယ်ဆိုတာ
      သေချာပါတယ်။ ဒီလိုအမြင်က တကယ့်ကို လှပတဲ့ အိမ်မက်တစ်ခုပါပဲ။

      '
  km:
    title: 'កម្មវិធីសេរី

      '
    description: null
    excerpt: null
    body: 'កាលពីម្សិលមិញ ខ្ញុំបានរកឃើញថា រ៉ូទ័រ Xiaomi មានការចាប់យក 404 (404 hijacking)
      ហើយខ្ញុំទាំងមូលក៏មានអារម្មណ៍មិនល្អខ្លាំងៗ។


      ប្រសិនបើមានជម្រើសតែពីរប៉ុណ្ណោះ គឺ **សេរីភាព** និង **ឥតគិតថ្លៃ** ខ្ញុំជ្រើសរើស
      **សេរីភាព**


      អ្វីដែលសំខាន់ជាង “កូដបើកចំហ” គឺមិនត្រូវលាក់បាំងល្បិចកលឡើយ។ ថ្វីបើខ្ញុំមិនប្រាកដថាអាចយល់បានទាំងអស់ក៏ដោយ
      តែប្រាកដថាមានអ្នកណាម្នាក់អាចយល់បាន។ នេះជាក្តីស្រមៃដ៏ស្រស់ស្អាតពិតៗ។

      '
  lo:
    title: 'ຊອບແວເສรี

      '
    description: null
    excerpt: null
    body: 'ມື້ວານນີ້ ຂ້ອຍໄດ້ພົບວ່າ router ຂອງ Xiaomi ມີການ “ຈີ້ 404” ຂຶ້ນ—ແລ້ວຂ້ອຍກໍຮູ້ສຶກແບບບໍ່ດີເຕັມໆທັງໝົດຈິງໆ.


      ຖ້າ **ເສລີ** ແລະ **ຟຣີ** ເລືອກໄດ້ພຽງຢ່າງໃດຢ່າງໜຶ່ງ ຂ້ອຍຂໍເລືອກ **ເສລີ**


      ສິ່ງທີ່ສຳຄັນຂອງການເປີດໂຄດ ບໍ່ແມ່ນການຈຳນວນຄ່າໃຊ້ຈ່າຍ ແຕ່ແມ່ນຕ້ອງບໍ່ຊ່ອນ “ລົດຫຼີກ”
      ຫຼື ກົນລະຍຸດໄວ້. ຂ້ອຍອາດຈະບໍ່ເຂົ້າໃຈທັງໝົດ ແຕ່ຂ້ອຍແນ່ໃຈວ່າຕ້ອງມີຄົນທີ່ເຂົ້າໃຈໄດ້.
      ນີ້ຊ່າງເປັນ “ຄວາມຝັນອັນງົດງາມ” ຈິງໆ.

      '
  ru:
    title: 'Свободное программное обеспечение

      '
    description: null
    excerpt: null
    body: 'Вчера я обнаружил 404 hijacking у роутера Xiaomi — и меня просто неприятно
      это поразило.


      Если **свобода** и **бесплатно** — это два варианта на выбор, я выбираю **свободу**


      Open source важнее всего тем, что нельзя прятать подвохи. Я, возможно, не разберусь
      во всём, но точно найдётся кто-то, кто сможет. Это ведь прекрасная фантазия.

      '
  fa:
    title: 'نرم‌افزار آزاد

      '
    description: null
    excerpt: null
    body: 'دیشب متوجه شدم که روی روتر شیائومی «ربایش 404» انجام می‌شود و یک‌دفعه کاملاً
      حالم بد شد.


      اگر بین **آزادی** و **رایگان** فقط یکی را بتوان انتخاب کرد، من **آزادی** را
      انتخاب می‌کنم


      مهم‌تر از خودِ متن‌باز این است که چیزی را پشت پرده پنهان نکنند و ترفند نگذارند.
      شاید من همه‌چیز را نفهمم، اما مطمئنم حتماً کسی هست که می‌فهمد. این واقعاً یک
      خیالِ قشنگ است.

      '
  ar:
    title: 'برمجيات حُرّة

      '
    description: null
    excerpt: null
    body: 'بالأمس اكتشفت إنّ راوتر Xiaomi عامل “حجز/اختطاف 404” وخلّاني أحسّ بضيق
      واضح من جدّ.


      إذا في خيار بين **الحرّيّة** و **المجّان**، أنا باختار **الحرّيّة**


      الأهم في البرمجيات المفتوحة مش بس إنّها منشورة—الأهم إنّها ما تخبّي الحكي و
      ما يكون فيها شي “وراء الستار”. يمكن أنا ما بفهم كل التفاصيل، بس أكيد في ناس
      بتفهم. وهيك بتصير… هاي فعلاً فكرة/حُلم جميلة.

      '
  tr:
    title: 'Özgür Yazılım

      '
    description: null
    excerpt: null
    body: 'Dün Xiaomi yönlendiricisinde 404 yönlendirme/“hijacking” olduğunu fark
      ettim; içim tamamen rahatsız oldu.


      **Özgürlük** ve **ücretsiz** arasında yalnızca biri seçilecekse, ben **özgürlüğü**
      seçerim


      Açık kaynakta en önemli şey, kimsenin oyuna gelmek için “püf noktaları” saklamaması.
      Belki teknik olarak her şeyi anlamayabilirim ama kesinlikle anlayacak birileri
      vardır. Gerçekten de harika bir hayal bu.'
