analysis:
  source_summary: 'คนคนหนึ่งมีคุณค่าไม่ได้อยู่ที่เขามีอะไรมากแค่ไหน แต่ขึ้นอยู่กับว่าเขาสามารถมอบให้ผู้อื่นได้มากเพียงใด

    '
  literal_layer: '“คุณค่าของคนไม่ได้วัดจากจำนวนสิ่งที่เขามี” และ “วัดจากจำนวนที่เขาให้ได้”

    '
  implicit_layer: 'ผู้เขียนต้องการสื่อถึงทัศนคติเรื่องคุณค่าเชิงจิตใจและการเอื้อเฟื้อ
    โดยชี้ว่าการให้/การช่วยเหลือผู้อื่นสำคัญกว่าสิ่งของหรือความมั่งคั่ง และเชื่อมโยงกับแรงจูงใจเชิงประสบการณ์ส่วนตัว
    (เคยถูกฝนสาด) ในการอยากคอยคุ้มครองคนอื่น

    '
  cross_cultural_layer: 'แนวคิดเรื่อง “ความหมายของการให้” เป็นสากลและเหมาะกับงานเขียนเชิงให้กำลังใจ/คุณธรรมในหลายวัฒนธรรม
    จำเป็นต้องเรียบเรียงให้เป็นภาษาทางการนุ่มนวลในแต่ละภาษา โดยยังคงโครงสร้างเปรียบเทียบ
    (คุณค่าอยู่ที่การให้) ให้ชัดเจน

    '
  retelling_strategy: 'รักษาแก่นให้เหมือนเดิม: (1) ปฏิเสธการนิยามคุณค่าด้วยสิ่งที่มี
    (2) ยืนยันคุณค่าด้วยสิ่งที่สามารถมอบให้ผู้อื่นได้มากเพียงใด และ (3) ใช้ถ้อยคำทางการที่ลื่นไหลตามสำนวนของแต่ละภาษา

    '
  terminology_policy: '- ไม่ใช้คำเฉพาะทางหรือคำยืมเทคนิค

    - ใช้คำเทียบเท่าทั่วไปสำหรับ “คุณค่า/ความหมาย/การมี” และ “ให้/มอบให้” ในแต่ละภาษา

    - คงรูปแบบบรรทัด/ย่อหน้าใน Markdown body ตามต้นฉบับ (สองประโยค)

    '
  forbidden_styles: '- หลีกเลี่ยงโทนก้าวร้าว เย้ยหยัน หรือการบรรยายเชิงตลกประชด

    - หลีกเลี่ยงการใช้ภาษาศาสนาหนักเกินจำเป็นหรือถ้อยคำที่อาจตีความได้เฉพาะนิกาย

    - หลีกเลี่ยงการแปลแบบตรงตัวคำต่อคำที่ทำให้สำนวนไม่เป็นธรรมชาติในภาษาเป้าหมาย

    '
translations:
  th:
    title: 'เพราะเคยโดนฝนชะล้าง จึงอยากให้ร่มกับคนอื่น

      '
    description: 'คุณค่าของคนไม่ได้ขึ้นกับว่าเขามีมากเพียงใด แต่ขึ้นกับว่าเขาสามารถมอบให้ผู้อื่นได้มากเพียงใด

      '
    excerpt: 'คุณค่าของคนไม่ได้อยู่ที่สิ่งที่เขามี หากอยู่ที่สิ่งที่เขาให้ได้

      '
    body: 'บุคคลหนึ่งมีคุณค่าไม่ได้ตัดสินจากว่าเขามีมากเท่าใด

      หากแต่อยู่ที่ว่าเขาสามารถมอบให้ได้มากเพียงใด

      '
  my:
    title: 'ကိုယ်တိုင်မိုးရေရွာခံဖူးလို့ တခြားသူတွေကို ရွာကာတဲ့ထီးတစ်စွာပေးချင်တယ်

      '
    description: 'လူတစ်ယောက်၏တန်ဖိုးသည် သူ၌ မည်မျှရှိသည်ဆိုသည့်အပေါ်မူတည်မနေဘဲ သူက
      မည်မျှ ပေးနိုင်သည်ဆိုသည့်အပေါ်မူတည်သည်။

      '
    excerpt: 'လူတစ်ယောက်၏တန်ဖိုးသည် သူ၌ရှိတာထက် သူပေးနိုင်တာပေါ်မှာပဲ တည်ရှိသည်။

      '
    body: 'လူတစ်ယောက်၏တန်ဖိုးသည် သူ၌ ဘယ်လောက်ရှိသည်ဆိုသည့်အပေါ်မှာ မဟုတ်ပါ။

      သူက ဘယ်လောက်ပမာဏနဲ့ ပေးနိုင်သည်ဆိုသည့်အပေါ်မှာပဲ တည်ရှိပါသည်။

      '
  km:
    title: 'ព្រោះខ្លួនឯងធ្លាប់ស្រក់ដោយភ្លៀង ទើបចង់ឲ្យអ្នកដទៃមានឆ័ត្រការពារ

      '
    description: 'តម្លៃរបស់មនុស្សម្នាក់ មិនមែនអាស្រ័យថា គេមានច្រើនប៉ុណ្ណានោះទេ ប៉ុន្តែអាស្រ័យថា
      គេអាចផ្តល់ឲ្យអ្នកដទៃបានច្រើនប៉ុណ្ណា។

      '
    excerpt: 'តម្លៃរបស់មនុស្សមិនស្ថិតនៅអ្វីដែលគេមាន ប៉ុន្តែស្ថិតនៅអ្វីដែលគេអាចផ្តល់បាន។

      '
    body: 'តម្លៃរបស់មនុស្សម្នាក់ មិនមែនអាស្រ័យថា គេមានច្រើនប៉ុណ្ណាទេ។

      តែវាអាស្រ័យថា គេអាចផ្តល់ឲ្យបានច្រើនប៉ុណ្ណា។

      '
  lo:
    title: 'เพราะตัวเองเคยโดนฝน ดังนั้นจึงอยากยื่นร่มให้คนอื่น

      '
    description: 'คุณค่าของคนไม่ได้วัดจากเขามีมากเพียงใด แต่อยู่ที่เขาสามารถมอบให้ผู้อื่นได้มากเพียงใด

      '
    excerpt: 'คุณค่าของคนไม่ได้อยู่ที่สิ่งที่เขามี หากอยู่ที่สิ่งที่เขาสามารถให้ได้

      '
    body: 'คุณค่าของคนหนึ่งคน ไม่ได้อยู่ที่ว่าเขามีมากเพียงใด

      แต่ขึ้นอยู่กับว่าเขาสามารถให้กับผู้อื่นได้มากเพียงใด

      '
  ru:
    title: 'Поскольку сам промок под дождём, я хочу поддержать других зонтом

      '
    description: 'Ценность человека не в том, сколько у него есть. Она в том, сколько
      он способен дать другим.

      '
    excerpt: 'Ценность человека определяется не тем, что у него есть, а тем, сколько
      он способен дать.

      '
    body: 'Ценность человека не в том, сколько у него есть.

      А в том, сколько он способен дать другим.

      '
  fa:
    title: 'چون خودم زیر باران خیس شدم، می‌خواهم برای دیگران چتر بگیرم

      '
    description: 'ارزشِ انسان به این نیست که چقدر دارد؛ به این است که چقدر می‌تواند
      به دیگران ببخشد.

      '
    excerpt: 'ارزشِ انسان نه به داشته‌هایش، بلکه به میزانِ بخششی است که می‌تواند انجام
      دهد.

      '
    body: 'ارزشِ یک انسان به این نیست که چقدر دارد.

      بلکه به این است که چقدر می‌تواند به دیگران بدهد.

      '
  ar:
    title: 'لأنّي تَبَلّلتُ من المطر لحالي، حبيت أمدّ للناس شمسية

      '
    description: 'قيمة الواحد ما بتنقاس بكم شي عنده، بل بتنقاس بكم شي بيقدر يعطّي
      غيره.

      '
    excerpt: 'قيمة الواحد مش في اللي بيملكه، قيمة الواحد في اللي بيقدر يقدّمه للناس.

      '
    body: 'قيمة الواحد مش بكم شي عنده.

      القيمة بتكون بكم شي بيقدر يعطيه لغيره.

      '
  tr:
    title: 'Çünkü ben de yağmur yedim; o yüzden başkasına şemsiye tutmak istiyorum

      '
    description: 'Bir insanın değeri, sahip olduklarıyla ölçülmez. Asıl mesele, başkalarına
      ne kadar verebildiğidir.

      '
    excerpt: 'Değer, kişinin elindekilerde değil; başkalarına verebildiğindedir.

      '
    body: 'Bir insanın değeri, sahip olduğu şeylerin miktarıyla belirlenmez.

      Değeri, başkalarına ne kadar verebildiğindedir.'
