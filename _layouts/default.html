<!DOCTYPE html>
<html lang="zh-CN" dir="ltr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Tailwind CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/dist.css' | relative_url }}">

  <!-- 阿拉伯字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="RSS" href="{{ '/feed.xml' | relative_url }}">

  <!-- 图标 -->
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/apple-touch-icon.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/favicon-16x16.png' | relative_url }}">
</head>
<body class="pb-24 lang-both"> <!-- 默认双语模式 -->

  <!-- 主题切换按钮 -->
  <button id="theme-toggle" class="theme-toggle" aria-label="切换主题">
    <svg id="icon-sun" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
    <svg id="icon-moon" class="w-5 h-5 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>

  <!-- 顶部标题栏 -->
  <header class="site-header">
    <div class="max-w-md mx-auto px-4 py-3 flex items-center justify-between">
      <div>
        <a href="{{ '/' | relative_url }}" style="color: var(--accent);" class="text-xl font-bold">
          {{ site.title }}
        </a>
        <p class="text-xs mt-0.5" style="color: var(--text-muted);">{{ site.description }}</p>
      </div>
    </div>
  </header>

  <!-- 主要内容区 -->
  <main class="max-w-md mx-auto px-4 py-6 article-content">
    {{ content }}
  </main>

  <!-- 底部导航 -->
  {% include mobile-nav.html %}

  <!-- 返回顶部按钮 -->
  <button id="back-to-top" class="back-to-top opacity-0">
    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M5 15l7-7 7 7" />
    </svg>
  </button>

  <script>
    // ============================================
    // 1. 主题自动切换（根据时区时间）
    // ============================================
    function getThemeByTimezone() {
      const now = new Date();
      const hour = now.getHours();
      // 早上7点到晚上7点：浅色主题
      // 晚上7点到早上7点：深色主题
      if (hour >= 7 && hour < 19) {
        return 'light';
      } else {
        return 'dark';
      }
    }

    function setTheme(theme) {
      const html = document.documentElement;
      html.setAttribute('data-theme', theme);
      
      // 切换图标
      const sunIcon = document.getElementById('icon-sun');
      const moonIcon = document.getElementById('icon-moon');
      
      if (theme === 'dark') {
        sunIcon.classList.add('hidden');
        moonIcon.classList.remove('hidden');
      } else {
        sunIcon.classList.remove('hidden');
        moonIcon.classList.add('hidden');
      }
      
      // 保存到 localStorage
      localStorage.setItem('preferred-theme', theme);
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      setTheme(newTheme);
    }

    // 初始化主题
    function initTheme() {
      // 先检查用户是否有手动保存的偏好
      const savedTheme = localStorage.getItem('preferred-theme');
      if (savedTheme) {
        setTheme(savedTheme);
      } else {
        // 没有手动设置，用时区时间自动判断
        const autoTheme = getThemeByTimezone();
        setTheme(autoTheme);
      }
    }

    // 主题切换按钮事件
    document.getElementById('theme-toggle').addEventListener('click', toggleTheme);


    // ============================================
    // 2. 语言自动检测与切换
    // ============================================
    function getBrowserLanguage() {
      const lang = navigator.language || navigator.userLanguage;
      // 检测阿拉伯语
      if (lang.startsWith('ar')) {
        return 'ar';
      }
      // 默认中文
      return 'zh';
    }

    function setLanguage(lang) {
      const body = document.body;
      const html = document.documentElement;
      
      // 移除旧的语言类
      body.classList.remove('lang-both', 'lang-zh', 'lang-ar');
      // 添加新的语言类
      body.classList.add('lang-' + lang);
      
      // 设置 HTML 标签属性
      if (lang === 'ar') {
        html.setAttribute('dir', 'rtl');
        html.setAttribute('lang', 'ar');
      } else {
        html.setAttribute('dir', 'ltr');
        html.setAttribute('lang', 'zh-CN');
      }
      
      // 更新按钮状态
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      
      const activeBtn = document.getElementById('lang-' + lang);
      if (activeBtn) {
        activeBtn.classList.add('active');
      }
      
      // 保存到 localStorage
      localStorage.setItem('preferred-language', lang);
    }


    // ============================================
    // 3. 返回顶部按钮
    // ============================================
    function initBackToTop() {
      const backToTopBtn = document.getElementById('back-to-top');
      
      window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
          backToTopBtn.classList.remove('opacity-0');
          backToTopBtn.classList.add('opacity-100');
        } else {
          backToTopBtn.classList.remove('opacity-100');
          backToTopBtn.classList.add('opacity-0');
        }
      });
      
      backToTopBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }


    // ============================================
    // 页面初始化
    // ============================================
    document.addEventListener('DOMContentLoaded', () => {
      // 初始化主题
      initTheme();
      
      // 初始化语言（优先用保存的，否则用浏览器检测）
      const savedLang = localStorage.getItem('preferred-language');
      if (savedLang) {
        setLanguage(savedLang);
      } else {
        // 自动检测浏览器语言
        const browserLang = getBrowserLanguage();
        // 如果是阿拉伯语浏览器，默认只显示阿拉伯语；否则默认只显示中文
        setLanguage(browserLang);
      }
      
      // 初始化返回顶部
      initBackToTop();
    });
  </script>

  <!-- Plausible 统计 -->
  <script defer data-domain="myblog.thiswind.work" src="https://plausible.io/js/script.js"></script>
</body>
</html>
