<!DOCTYPE html>
<html lang="zh-CN" dir="ltr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Tailwind CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/dist.css' | relative_url }}">

  <!-- 阿拉伯字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="RSS" href="{{ '/feed.xml' | relative_url }}">

  <!-- 图标 -->
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/apple-touch-icon.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/favicon-16x16.png' | relative_url }}">
</head>
<body>

  <!-- 顶部固定导航栏（完整版） -->
  <header class="site-header">
    <div class="site-header-inner">
      <!-- Logo & 标题 -->
      <div class="site-brand">
        <a href="{{ '/' | relative_url }}" class="site-title">
          {{ site.title }}
        </a>
        <p class="site-subtitle">
          <span class="ui-zh">Thinking in my way.</span>
          <span class="ui-ar">أفكاري بطريقتي.</span>
        </p>
      </div>

      <!-- 导航菜单 -->
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">
          <span class="ui-zh">🏠 博客</span>
          <span class="ui-ar">🏠 المدونة</span>
        </a>
        <a href="{{ '/mygpts/' | relative_url }}" class="nav-link {% if page.url == '/mygpts/' %}active{% endif %}">
          <span class="ui-zh">🤖 GPTs</span>
          <span class="ui-ar">🤖 الذكاء الاصطناعي</span>
        </a>
        <a href="{{ '/post/about/' | relative_url }}" class="nav-link {% if page.url == '/post/about/' %}active{% endif %}">
          <span class="ui-zh">👤 关于</span>
          <span class="ui-ar">👤 حول</span>
        </a>
      </nav>
    </div>
  </header>

  <!-- 主要内容区 -->
  <main class="max-w-md mx-auto px-4 py-6">
    {{ content }}
  </main>

  <!-- 底部胶囊工具条（精巧版） -->
  <div class="tool-bar-wrapper">
    <div class="tool-bar">
      <!-- 中文 -->
      <button id="btn-zh" class="tool-btn active" onclick="setLanguage('zh')">
        <span class="tool-btn-icon">🇨🇳</span>
        <span class="ui-zh">中文</span>
        <span class="ui-ar">الصينية</span>
      </button>

      <!-- 阿拉伯语 -->
      <button id="btn-ar" class="tool-btn" onclick="setLanguage('ar')">
        <span class="tool-btn-icon">🇵🇸</span>
        <span class="ui-zh">عربي</span>
        <span class="ui-ar">العربية</span>
      </button>

      <!-- 分隔线 -->
      <div class="w-px h-5 mx-1" style="background-color: var(--border-color);"></div>

      <!-- 主题切换 -->
      <button id="theme-toggle" class="tool-btn" onclick="toggleTheme()">
        <span id="icon-sun">☀️</span>
        <span id="icon-moon" class="hidden">🌙</span>
      </button>
    </div>
  </div>

  <!-- 返回顶部按钮 -->
  <button id="back-to-top" class="back-to-top opacity-0" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    ↑
  </button>

  <script>
    // ============================================
    // 1. 主题自动切换（根据时区时间）
    // ============================================
    function getThemeByTimezone() {
      const now = new Date();
      const hour = now.getHours();
      return (hour >= 7 && hour < 19) ? 'light' : 'dark';
    }

    function setTheme(theme) {
      const html = document.documentElement;
      html.setAttribute('data-theme', theme);
      
      const sunIcon = document.getElementById('icon-sun');
      const moonIcon = document.getElementById('icon-moon');
      
      if (theme === 'dark') {
        sunIcon.classList.add('hidden');
        moonIcon.classList.remove('hidden');
      } else {
        sunIcon.classList.remove('hidden');
        moonIcon.classList.add('hidden');
      }
      
      localStorage.setItem('preferred-theme', theme);
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      setTheme(newTheme);
    }

    function initTheme() {
      const savedTheme = localStorage.getItem('preferred-theme');
      if (savedTheme) {
        setTheme(savedTheme);
      } else {
        const autoTheme = getThemeByTimezone();
        setTheme(autoTheme);
      }
    }


    // ============================================
    // 2. 语言自动检测与切换（包含所有框架 UI）
    // ============================================
    function getBrowserLanguage() {
      const lang = navigator.language || navigator.userLanguage;
      if (lang.startsWith('ar')) {
        return 'ar';
      }
      return 'zh';
    }

    function setLanguage(lang) {
      const html = document.documentElement;
      
      // 更新按钮状态
      document.getElementById('btn-zh').classList.remove('active');
      document.getElementById('btn-ar').classList.remove('active');
      document.getElementById('btn-' + lang).classList.add('active');
      
      // 设置 HTML 标签属性
      if (lang === 'ar') {
        html.setAttribute('dir', 'rtl');
        html.setAttribute('lang', 'ar');
        // 显示阿拉伯语 UI，隐藏中文 UI
        document.querySelectorAll('.ui-zh').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.ui-ar').forEach(el => el.style.display = 'inline');
      } else {
        html.setAttribute('dir', 'ltr');
        html.setAttribute('lang', 'zh-CN');
        // 显示中文 UI，隐藏阿拉伯语 UI
        document.querySelectorAll('.ui-ar').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.ui-zh').forEach(el => el.style.display = 'inline');
      }
      
      localStorage.setItem('preferred-language', lang);
    }


    // ============================================
    // 3. 返回顶部按钮显示控制
    // ============================================
    function initBackToTop() {
      const backToTopBtn = document.getElementById('back-to-top');
      
      window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
          backToTopBtn.classList.remove('opacity-0');
          backToTopBtn.classList.add('opacity-100');
        } else {
          backToTopBtn.classList.remove('opacity-100');
          backToTopBtn.classList.add('opacity-0');
        }
      });
    }


    // ============================================
    // 页面初始化
    // ============================================
    document.addEventListener('DOMContentLoaded', () => {
      initTheme();
      
      const savedLang = localStorage.getItem('preferred-language');
      if (savedLang) {
        setLanguage(savedLang);
      } else {
        const browserLang = getBrowserLanguage();
        setLanguage(browserLang);
      }
      
      initBackToTop();
    });
  </script>

  <!-- Plausible 统计 -->
  <script defer data-domain="myblog.thiswind.work" src="https://plausible.io/js/script.js"></script>
</body>
</html>
