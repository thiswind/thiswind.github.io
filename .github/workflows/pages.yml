name: Build multilingual blog

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      translate:
        description: Run LLM translation before build
        required: false
        default: true
        type: boolean
      lang:
        description: Optional single language code for translation smoke tests
        required: false
        default: ""
        type: choice
        options:
          - ""
          - en
          - th
          - my
          - km
          - lo
          - ru
          - fa
          - ar
          - tr
      source:
        description: Optional source_id for targeted translation reruns
        required: false
        default: ""
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r tools/requirements.txt

      - name: Restore generated translations cache
        uses: actions/cache@v4
        with:
          path: |
            _posts_en
            _posts_th
            _posts_my
            _posts_km
            _posts_lo
            _posts_ru
            _posts_fa
            _posts_ar
            _posts_tr
            .i18n/analysis
          key: i18n-generated-${{ runner.os }}-${{ hashFiles('_posts/**/*.md') }}
          restore-keys: |
            i18n-generated-${{ runner.os }}-

      - name: Sync source posts
        run: python tools/i18n/sync_posts.py

      - name: Check translation secret
        if: ${{ github.event_name == 'push' || github.event.inputs.translate == 'true' }}
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          test -n "$LLM_API_KEY" || { echo "LLM_API_KEY repository secret is required for translation"; exit 1; }

      - name: Translate posts
        if: ${{ github.event_name == 'push' || github.event.inputs.translate == 'true' }}
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          TRANSLATE_LANG: ${{ github.event.inputs.lang || '' }}
          TRANSLATE_SOURCE: ${{ github.event.inputs.source || '' }}
        run: |
          args=()
          if [ -n "$TRANSLATE_LANG" ]; then
            args+=(--lang "$TRANSLATE_LANG")
          fi
          if [ -n "$TRANSLATE_SOURCE" ]; then
            args+=(--source "$TRANSLATE_SOURCE")
          fi
          set +e
          python tools/i18n/translate_posts.py "${args[@]}"
          status=$?
          set -e
          echo "TRANSLATE_STATUS=$status" >> "$GITHUB_ENV"

      - name: Commit translated posts
        if: ${{ github.event_name == 'push' || github.event.inputs.translate == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts_en _posts_th _posts_my _posts_km _posts_lo _posts_ru _posts_fa _posts_ar _posts_tr .i18n/manifest.yml
          if git diff --cached --quiet; then
            echo "No translation changes to commit."
          else
            git commit -m "chore: update translated posts [skip ci]"
            git push
          fi

      - name: Check translation result
        if: ${{ github.event_name == 'push' || github.event.inputs.translate == 'true' }}
        run: exit "$TRANSLATE_STATUS"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll
        run: bundle exec jekyll build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
