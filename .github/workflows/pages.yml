name: Build multilingual blog

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      translate:
        description: Run LLM translation before build
        required: false
        default: true
        type: boolean
      lang:
        description: Optional single language code for translation smoke tests
        required: false
        default: ""
        type: choice
        options:
          - ""
          - th
          - my
          - km
          - lo
          - ru
          - fa
          - ar
          - tr

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r tools/requirements.txt

      - name: Sync source posts
        run: python tools/i18n/sync_posts.py

      - name: Check translation secret
        if: ${{ github.event_name == 'push' || inputs.translate }}
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          test -n "$LLM_API_KEY" || { echo "LLM_API_KEY repository secret is required for translation"; exit 1; }

      - name: Translate posts
        if: ${{ github.event_name == 'push' || inputs.translate }}
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          TRANSLATE_LANG: ${{ inputs.lang }}
        run: |
          if [ -n "$TRANSLATE_LANG" ]; then
            python tools/i18n/translate_posts.py --lang "$TRANSLATE_LANG"
          else
            python tools/i18n/translate_posts.py
          fi

      - name: Commit generated translations
        if: ${{ github.event_name == 'push' || inputs.translate }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for path in _posts_th _posts_my _posts_km _posts_lo _posts_ru _posts_fa _posts_ar _posts_tr .i18n; do
            test -e "$path" && git add "$path"
          done
          git diff --cached --quiet || git commit -m "Update generated translations [skip ci]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll
        run: bundle exec jekyll build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
