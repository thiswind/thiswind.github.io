<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% seo title=false %}
  <link rel="stylesheet" href="{{ '/assets/vendor/augmented-ui/augmented-ui.min.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% if page.math %}
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['\\(', '\\)']],
          displayMath: [['\\[', '\\]'], ['$$', '$$']]
        }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  {% endif %}
  {% feed_meta %}
  {% if page.url == '/' %}
  <script>
    (function () {
      if (sessionStorage.getItem('lang_redirected')) return;
      sessionStorage.setItem('lang_redirected', '1');
      var map = {
        'zh': '/', 'zh-tw': '/', 'zh-hk': '/', 'zh-sg': '/',
        'ar': '/ar/', 'fa': '/fa/', 'th': '/th/',
        'my': '/my/', 'km': '/km/', 'lo': '/lo/',
        'ru': '/ru/', 'tr': '/tr/'
      };
      var langs = navigator.languages || [navigator.language || 'en'];
      for (var i = 0; i < langs.length; i++) {
        var full = langs[i].toLowerCase();
        var code = full.split('-')[0];
        if (map[full] !== undefined) {
          if (map[full] !== '/') window.location.replace(map[full]);
          return;
        }
        if (map[code] !== undefined) {
          if (map[code] !== '/') window.location.replace(map[code]);
          return;
        }
      }
      // 默认：未匹配任何语言 → 英文版
      window.location.replace('/en/');
    })();
  </script>
  {% endif %}
</head>
