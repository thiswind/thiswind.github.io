<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% seo title=false %}
  <link rel="stylesheet" href="{{ '/assets/vendor/augmented-ui/augmented-ui.min.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% if page.math %}
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['\\(', '\\)']],
          displayMath: [['\\[', '\\]'], ['$$', '$$']]
        }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  {% endif %}
  {% feed_meta %}
  {% if page.url == '/' %}
  <script>
    (function () {
      var redirected = sessionStorage.getItem('lang_redirected');
      if (redirected) return;
      sessionStorage.setItem('lang_redirected', '1');
      var map = {
        'ar': '/ar/', 'fa': '/fa/', 'th': '/th/',
        'my': '/my/', 'km': '/km/', 'lo': '/lo/',
        'ru': '/ru/', 'tr': '/tr/'
      };
      var langs = (navigator.languages || [navigator.language || '']);
      for (var i = 0; i < langs.length; i++) {
        var code = langs[i].toLowerCase().split('-')[0];
        if (map[code]) { window.location.replace(map[code]); return; }
      }
    })();
  </script>
  {% endif %}
</head>
